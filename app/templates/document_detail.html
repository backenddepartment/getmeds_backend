{% include 'components/head.html' %}
<body class="bg-[#F8FAFC] min-h-screen flex flex-col">

<!-- ===== TOP NAV BAR ===== -->
<header class="bg-white border-b border-slate-100 shadow-sm sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <a href="/admin" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 transition text-slate-500">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </a>
            <div class="h-5 w-px bg-slate-200"></div>
            <nav class="flex items-center text-xs font-semibold text-slate-400 gap-1.5">
                <a href="/admin" class="hover:text-slate-700 transition">Admin Console</a>
                <i class="fa-solid fa-chevron-right text-[8px] text-slate-300"></i>
                <span id="nav-collection" class="hover:text-slate-700 transition cursor-pointer">Collection</span>
                <i class="fa-solid fa-chevron-right text-[8px] text-slate-300"></i>
                <span class="text-slate-800 font-bold truncate max-w-[200px]" id="nav-doc-title">Loading...</span>
            </nav>
        </div>
        <div class="flex items-center gap-2">
            <span id="header-type-badge" class="text-[9px] font-extrabold px-2.5 py-1 rounded-full border bg-slate-50 text-slate-600 border-slate-200"></span>
            <button onclick="deleteDocument()" id="btn-delete"
                class="px-3 py-1.5 rounded-lg border border-rose-200 text-rose-500 hover:bg-rose-500 hover:text-white text-xs font-bold transition-all flex items-center gap-1.5">
                <i class="fa-solid fa-trash-can text-[10px]"></i> Delete
            </button>
            <button onclick="saveDocument()" id="btn-save"
                class="px-4 py-1.5 rounded-lg bg-gradient-to-r from-[#61A644] to-[#0D99FF] text-white text-xs font-bold shadow-md hover:shadow-lg transition-all flex items-center gap-1.5">
                <i class="fa-solid fa-floppy-disk text-[10px]"></i> Save Changes
            </button>
        </div>
    </div>
</header>

<!-- ===== MAIN CONTENT ===== -->
<main class="flex-1 max-w-7xl mx-auto w-full px-6 py-8">

    <!-- Loading skeleton -->
    <div id="page-skeleton" class="grid grid-cols-1 lg:grid-cols-5 gap-6 animate-pulse">
        <div class="lg:col-span-3 flex flex-col gap-4">
            <div class="bg-white rounded-2xl border border-slate-100 p-6 flex flex-col gap-4">
                <div class="w-32 h-4 skeleton rounded-md"></div>
                <div class="w-full h-10 skeleton rounded-lg"></div>
                <div class="w-full h-10 skeleton rounded-lg"></div>
                <div class="w-full h-24 skeleton rounded-lg"></div>
                <div class="w-full h-10 skeleton rounded-lg"></div>
            </div>
        </div>
        <div class="lg:col-span-2 flex flex-col gap-4">
            <div class="bg-white rounded-2xl border border-slate-100 p-6">
                <div class="w-full h-48 skeleton rounded-xl"></div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-100 p-6 flex flex-col gap-3">
                <div class="w-24 h-3 skeleton rounded-md"></div>
                <div class="w-full h-4 skeleton rounded-md"></div>
                <div class="w-full h-4 skeleton rounded-md"></div>
            </div>
        </div>
    </div>

    <!-- Actual content (hidden until loaded) -->
    <div id="page-content" class="hidden grid grid-cols-1 lg:grid-cols-5 gap-6">

        <!-- LEFT: Editable Fields -->
        <div class="lg:col-span-3 flex flex-col gap-6">
            <div class="bg-white rounded-2xl border border-slate-100 shadow-[0_4px_24px_rgba(0,0,0,0.03)] p-6">
                <div class="flex items-center gap-2 mb-6">
                    <i class="fa-solid fa-pen-to-square text-slate-400 text-sm"></i>
                    <h2 class="text-sm font-extrabold text-slate-800">Document Fields</h2>
                </div>
                <div id="fields-container" class="flex flex-col gap-5"></div>
            </div>
        </div>

        <!-- RIGHT: Image + Metadata -->
        <div class="lg:col-span-2 flex flex-col gap-5">

            <!-- Dynamic Media Fields Container -->
            <div id="media-fields-container" class="flex flex-col gap-5"></div>

            <!-- Document Metadata Card -->
            <div class="bg-white rounded-2xl border border-slate-100 shadow-[0_4px_24px_rgba(0,0,0,0.03)] p-6">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-circle-info text-slate-400 text-sm"></i>
                    <h3 class="text-sm font-extrabold text-slate-800">Metadata</h3>
                </div>
                <div class="flex flex-col gap-3" id="metadata-container"></div>
            </div>

        </div>
    </div>

    <!-- Error state -->
    <div id="page-error" class="hidden flex flex-col items-center justify-center py-24 gap-4 text-slate-400">
        <i class="fa-solid fa-triangle-exclamation text-4xl text-rose-300"></i>
        <p class="text-sm font-bold text-slate-500" id="error-msg">Failed to load document.</p>
        <a href="/admin" class="text-xs font-bold text-blue-500 hover:underline">← Back to Console</a>
    </div>

</main>

<script>
    const DOC_ID = "{{ doc_id }}";
    const SANITY_PROJECT_ID = "{{ sanity_project_id }}";
    const SANITY_DATASET = "{{ sanity_dataset }}";

    let FIELD_SCHEMAS = {};
    let COLLECTION_META = {};
    let IMAGE_COLLECTIONS = [];

    let currentDoc = null;
    let adminToken = '';

    const ICON_PRESETS = [
        { value: 'fa-pills', label: 'Pills (fa-pills)' },
        { value: 'fa-capsules', label: 'Capsules (fa-capsules)' },
        { value: 'fa-tags', label: 'Tags (fa-tags)' },
        { value: 'fa-images', label: 'Images (fa-images)' },
        { value: 'fa-stethoscope', label: 'Stethoscope (fa-stethoscope)' },
        { value: 'fa-tag', label: 'Tag (fa-tag)' },
        { value: 'fa-rectangle-ad', label: 'Ad Banner (fa-rectangle-ad)' },
        { value: 'fa-user-doctor', label: 'Doctor (fa-user-doctor)' },
        { value: 'fa-circle-question', label: 'Question (fa-circle-question)' },
        { value: 'fa-comments', label: 'Comments (fa-comments)' },
        { value: 'fa-truck-medical', label: 'Medical Truck (fa-truck-medical)' },
        { value: 'fa-heart-pulse', label: 'Heart Pulse (fa-heart-pulse)' },
        { value: 'fa-prescription-bottle-medical', label: 'Prescription Bottle (fa-prescription-bottle-medical)' },
        { value: 'fa-hospital', label: 'Hospital (fa-hospital)' },
        { value: 'fa-briefcase-medical', label: 'Medical Briefcase (fa-briefcase-medical)' },
        { value: 'fa-handshake', label: 'Handshake (fa-handshake)' },
        { value: 'fa-shield-halved', label: 'Shield (fa-shield-halved)' },
        { value: 'fa-star', label: 'Star (fa-star)' },
        { value: 'fa-notes-medical', label: 'Medical Notes (fa-notes-medical)' },
        { value: 'fa-user-shield', label: 'User Shield (fa-user-shield)' },
        { value: 'fa-lock', label: 'Lock (fa-lock)' },
        { value: 'fa-gear', label: 'Gear (fa-gear)' },
        { value: 'fa-chart-line', label: 'Chart Line (fa-chart-line)' },
        { value: 'fa-file-invoice-dollar', label: 'Invoice (fa-file-invoice-dollar)' }
    ];

    async function uploadAssetFile(file, progressCallback) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/admin/assets/upload', true);
            
            const session = JSON.parse(localStorage.getItem('getmeds_admin_session') || '{}');
            const token = session.token || adminToken || '';
            if (token) {
                xhr.setRequestHeader('X-Admin-Token', token);
            }
            xhr.setRequestHeader('Content-Type', file.type || 'image/jpeg');

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable && progressCallback) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressCallback(percent);
                }
            };

            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (data.status === 'success' && data.assetRef) {
                            resolve(data.assetRef);
                        } else {
                            reject(new Error(data.detail || 'Asset upload failed.'));
                        }
                    } catch (err) {
                        reject(err);
                    }
                } else {
                    reject(new Error(`Server error: ${xhr.status}`));
                }
            };

            xhr.onerror = () => reject(new Error('Network error.'));
            xhr.send(file);
        });
    }

    window.addEventListener('DOMContentLoaded', async () => {
        const session = localStorage.getItem('getmeds_admin_session');
        if (session) {
            try { adminToken = JSON.parse(session).token || 'getmeds-admin-secret-key'; }
            catch(e) { adminToken = 'getmeds-admin-secret-key'; }
        } else { adminToken = 'getmeds-admin-secret-key'; }

        try {
            const res = await fetch('/api/admin/schemas', {
                headers: { 'X-Admin-Token': adminToken }
            });
            if (res.ok) {
                const data = await res.json();
                FIELD_SCHEMAS = data.field_schemas || {};
                const rawMeta = data.collection_meta || {};
                COLLECTION_META = {};
                Object.keys(rawMeta).forEach(k => {
                    COLLECTION_META[k] = rawMeta[k].label || k;
                });
                if (!COLLECTION_META['adminUser']) COLLECTION_META['adminUser'] = 'Admin Users';
                if (!COLLECTION_META['accessPoint']) COLLECTION_META['accessPoint'] = 'Access Policies';
                
                IMAGE_COLLECTIONS = data.image_collections || [];
            }
        } catch(e) {
            console.error("Failed to load schemas dynamically:", e);
        }

        await fetchRoles();
        await loadDocument();
    });

    let fetchedCategories = [];
    async function fetchCategories() {
        try {
            const res = await fetch(`/api/admin/documents?collection=category&page=1&limit=100`, {
                headers: { 'X-Admin-Token': adminToken }
            });
            if (res.ok) {
                const data = await res.json();
                fetchedCategories = data.documents || [];
            }
        } catch(e) {
            console.error('Failed to load categories', e);
        }
    }

    let fetchedRoles = [];
    async function fetchRoles() {
        try {
            const res = await fetch('/api/admin/security/role-permissions', {
                headers: { 'X-Admin-Token': adminToken }
            });
            if (res.ok) {
                const data = await res.json();
                fetchedRoles = data.roles || [];
            }
        } catch(e) {
            console.error('Failed to load roles', e);
        }
    }

    async function populateReferenceSelect(selectEl, refCollection, selectedVal) {
        try {
            const res = await fetch(`/api/admin/documents?collection=${refCollection}&page=1&limit=200`, {
                headers: { 'X-Admin-Token': adminToken }
            });
            if (res.ok) {
                const data = await res.json();
                const docs = data.documents || [];
                let html = '<option value="">— Select a Reference —</option>';
                docs.forEach(doc => {
                    const label = doc.name || doc.title || doc.question || doc.sessionId || doc._id;
                    html += `<option value="${doc._id}" ${doc._id === selectedVal ? 'selected' : ''}>${escHtml(label)}</option>`;
                });
                selectEl.innerHTML = html;
            }
        } catch(e) {
            console.error("Failed to fetch reference options for " + refCollection, e);
            selectEl.innerHTML = '<option value="">— Failed to load options —</option>';
        }
    }

    async function loadDocument() {
        try {
            const res = await fetch(`/api/admin/document/${DOC_ID}`, {
                headers: { 'X-Admin-Token': adminToken }
            });
            if (!res.ok) throw new Error(`${res.status}: ${(await res.json()).detail}`);
            const data = await res.json();
            currentDoc = data.document;
            if (currentDoc._type === 'product') await fetchCategories();
            renderPage(currentDoc);
        } catch(e) {
            document.getElementById('page-skeleton').classList.add('hidden');
            document.getElementById('page-error').classList.remove('hidden');
            document.getElementById('error-msg').textContent = e.message;
        }
    }

    function renderPage(doc) {
        const type = doc._type;
        const collectionLabel = COLLECTION_META[type] || type;
        const primaryLabel = doc.name || doc.title || doc.question || doc.sessionId || doc._id;

        document.getElementById('nav-collection').textContent = collectionLabel;
        document.getElementById('nav-collection').onclick = () => window.location.href = `/admin?collection=${type}`;
        document.getElementById('nav-doc-title').textContent = primaryLabel;
        document.title = `${primaryLabel} — GetMEDS Console`;

        const badge = document.getElementById('header-type-badge');
        badge.textContent = collectionLabel;

        const fields = FIELD_SCHEMAS[type] || [];
        const leftFields = fields.filter(f => !isMediaField(f));
        const mediaFields = fields.filter(f => isMediaField(f));

        const container = document.getElementById('fields-container');
        container.innerHTML = leftFields.map(f => renderField(f, doc[f.name])).join('');
        evaluateHiddenFields();
        container.addEventListener('input', evaluateHiddenFields);
        container.addEventListener('change', evaluateHiddenFields);

        if (type === 'product') {
            const catSelect = document.getElementById('product-category-select');
            const subSelect = document.getElementById('product-subcategory-select');
            if (catSelect && subSelect) {
                catSelect.addEventListener('change', (e) => {
                    const catId = e.target.value;
                    if (!catId) {
                        subSelect.innerHTML = '<option value="">— Select a Category first —</option>';
                        subSelect.disabled = true;
                        return;
                    }
                    const selectedCat = fetchedCategories.find(c => c._id === catId);
                    const subs = selectedCat?.subcategory || selectedCat?.subCategories || [];
                    if (subs.length === 0) {
                        subSelect.innerHTML = '<option value="">— No sub-categories available —</option>';
                        subSelect.disabled = false;
                    } else {
                        subSelect.innerHTML = '<option value="">— Select a Sub-Category —</option>' +
                            subs.map(s => `<option value="${s}">${escHtml(s)}</option>`).join('');
                        subSelect.disabled = false;
                    }
                });
            }
        }

        const mediaContainer = document.getElementById('media-fields-container');
        if (mediaContainer) {
            mediaContainer.innerHTML = mediaFields.map(f => {
                const icon = f.type === 'image' ? 'fa-image' : 'fa-images';
                return `
                <div class="bg-white rounded-2xl border border-slate-100 shadow-[0_4px_24px_rgba(0,0,0,0.03)] p-6" id="card-wrapper-${f.name}">
                    <div class="flex items-center gap-2 mb-4 border-b border-slate-50 pb-3">
                        <i class="fa-solid ${icon} text-slate-400 text-sm"></i>
                        <h3 class="text-sm font-extrabold text-slate-800">${f.label}</h3>
                    </div>
                    ${renderField(f, doc[f.name])}
                </div>`;
            }).join('');
        }

        document.getElementById('metadata-container').innerHTML = [
            { label:'Document ID', value:`<span class="font-mono text-[10px] text-slate-700 break-all">${doc._id}</span>` },
            { label:'Type', value:`<span class="text-xs font-semibold text-slate-700">${doc._type}</span>` },
            { label:'Created', value:`<span class="text-xs text-slate-600">${formatDate(doc._createdAt)}</span>` },
            { label:'Updated', value:`<span class="text-xs text-slate-600">${formatDate(doc._updatedAt)}</span>` },
        ].map(m => `
            <div class="flex flex-col gap-0.5 border-b border-slate-50 pb-2.5">
                <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest">${m.label}</span>
                <div>${m.value}</div>
            </div>`
        ).join('');

        document.getElementById('page-skeleton').classList.add('hidden');
        document.getElementById('page-content').classList.remove('hidden');
        document.getElementById('page-content').style.display = 'grid';

        setTimeout(() => {
            setupImageDropzones();
            if (mediaContainer) {
                mediaContainer.addEventListener('input', evaluateHiddenFields);
                mediaContainer.addEventListener('change', evaluateHiddenFields);
            }
        }, 150);
    }

    function isMediaField(field) {
        if (field.type === 'image') return true;
        if (field.type === 'object_array' && field.fields) {
            return field.fields.some(sf => sf.type === 'image');
        }
        return false;
    }

    function evaluateHiddenFields() {
        const type = currentDoc?._type || COLLECTION;
        const fields = FIELD_SCHEMAS[type] || [];
        const currentValues = {};
        fields.forEach(f => {
            const el = document.querySelector(`[name="${f.name}"]`);
            if (el) {
                if (el.tagName === 'SELECT' && (el.value === 'true' || el.value === 'false')) {
                    currentValues[f.name] = el.value === 'true';
                } else if (el.type === 'checkbox') {
                    currentValues[f.name] = el.checked;
                } else {
                    currentValues[f.name] = el.value;
                }
            } else {
                const imgVal = document.getElementById(`img-value-${f.name}`);
                if (imgVal) {
                    currentValues[f.name] = imgVal.value;
                }
            }
        });

        fields.forEach(f => {
            const wrapper = document.getElementById(`field-wrapper-${f.name}`);
            const cardWrapper = document.getElementById(`card-wrapper-${f.name}`);
            if (!wrapper) return;
            
            const targetEl = cardWrapper || wrapper;

            if (f.hidden_condition) {
                const cond = f.hidden_condition;
                const parentVal = currentValues[cond.field];
                let isHidden = false;
                if (cond.operator === 'eq') {
                    isHidden = (parentVal === cond.value);
                } else if (cond.operator === 'neq') {
                    isHidden = (parentVal !== cond.value);
                }

                if (isHidden) {
                    targetEl.classList.add('hidden');
                    const inputEl = wrapper.querySelector('input, select, textarea');
                    if (inputEl) inputEl.removeAttribute('required');
                } else {
                    targetEl.classList.remove('hidden');
                    if (f.required) {
                        const inputEl = wrapper.querySelector('input, select, textarea');
                        if (inputEl) inputEl.setAttribute('required', 'required');
                    }
                }
            }
        });
    }

    function renderField(field, value) {
        const req = field.required ? '<span class="text-rose-400 ml-0.5">*</span>' : '';
        const base = 'w-full border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 focus:outline-none rounded-xl px-4 py-2.5 text-xs text-slate-700 bg-white transition';

        let input = '';
        if (field.name === 'icon' || field.name.toLowerCase().includes('icon')) {
            const opts = ICON_PRESETS.map(ico => `<option value="${ico.value}" ${value === ico.value ? 'selected' : ''}>${ico.label}</option>`).join('');
            input = `<select name="${field.name}" class="${base}">
                <option value="">— Select an Icon Preset —</option>
                ${opts}
            </select>`;
        } else if (field.type === 'image') {
            const imgRef = value?.asset?._ref || '';
            const hasImg = !!imgRef;
            
            input = `
            <div class="border border-dashed border-slate-200 hover:border-blue-400 rounded-xl p-4 bg-slate-50/50 flex flex-col items-center justify-center gap-2 transition relative" id="img-dropzone-container-${field.name}">
                <input type="hidden" name="${field.name}" id="img-value-${field.name}" value="${imgRef}">
                
                <div id="img-empty-${field.name}" class="${hasImg ? 'hidden' : ''} flex flex-col items-center gap-1.5 cursor-pointer w-full text-center" onclick="document.getElementById('file-input-${field.name}').click()">
                    <div class="w-10 h-10 rounded-lg bg-white shadow-sm flex items-center justify-center text-slate-400 hover:text-blue-500 transition">
                        <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
                    </div>
                    <p class="text-[10px] font-bold text-slate-700">Drag & drop or click to upload</p>
                    <p class="text-[8px] text-slate-400">JPG, PNG, WebP — max 10MB</p>
                </div>

                <button type="button" onclick="event.stopPropagation(); chooseImageFromLibrary('${field.name}')" class="px-3 py-1.5 bg-white hover:bg-slate-50 border border-slate-200 rounded-lg text-[9px] font-extrabold text-blue-500 shadow-sm transition flex items-center gap-1.5 z-10 ${hasImg ? 'hidden' : ''}" id="img-lib-btn-${field.name}">
                    <i class="fa-solid fa-images text-[9px]"></i> Select from Library
                </button>

                <div id="img-progress-container-${field.name}" class="hidden w-full flex flex-col gap-1 px-4">
                    <div class="flex justify-between text-[8px] font-extrabold text-blue-500 uppercase tracking-wide">
                        <span>Uploading to Sanity...</span>
                        <span id="img-progress-text-${field.name}">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                        <div id="img-progress-bar-${field.name}" class="bg-gradient-to-r from-blue-400 to-indigo-500 h-1.5 rounded-full transition-all duration-150" style="width: 0%"></div>
                    </div>
                </div>

                <div id="img-filled-${field.name}" class="${hasImg ? '' : 'hidden'} flex items-center gap-3 w-full bg-white p-2 rounded-lg border border-slate-100 shadow-sm relative">
                    <div class="relative group cursor-pointer" onclick="document.getElementById('file-input-${field.name}').click()">
                        <img id="img-preview-${field.name}" src="${hasImg ? buildSanityImageUrl(imgRef) : ''}" class="w-12 h-12 object-cover rounded-md border border-slate-100 group-hover:opacity-75 transition">
                        <div class="absolute inset-0 bg-black/40 rounded-md opacity-0 group-hover:opacity-100 transition flex items-center justify-center text-white text-[8px] font-bold">
                            <i class="fa-solid fa-camera"></i>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[10px] font-bold text-slate-700 truncate" id="img-filename-${field.name}">Uploaded Image</p>
                        <div class="flex items-center gap-2">
                            <p class="text-[8px] text-green-500 font-bold uppercase tracking-wider flex items-center gap-1">
                                <i class="fa-solid fa-circle-check"></i> Ready in Sanity
                            </p>
                            <button type="button" onclick="event.stopPropagation(); chooseImageFromLibrary('${field.name}')" class="text-[8px] font-extrabold text-blue-500 hover:underline">
                                Change from Library
                            </button>
                        </div>
                    </div>
                    <button type="button" onclick="clearImageField('${field.name}')" class="text-slate-300 hover:text-rose-500 p-1.5 rounded-md hover:bg-slate-50 transition">
                        <i class="fa-solid fa-trash-can text-[10px]"></i>
                    </button>
                </div>

                <input type="file" id="file-input-${field.name}" accept="image/*" class="hidden" onchange="handleImageFieldChange(event, '${field.name}')">
            </div>`;
        } else if (field.type === 'slug') {
            const rawVal = value?.current || value || '';
            input = `<div class="relative flex items-center">
                <input type="text" name="${field.name}" value="${escHtml(String(rawVal))}" ${field.required?'required':''} class="${base} pr-16" placeholder="${field.placeholder||'auto-generated-slug'}">
                <button type="button" onclick="regenerateSlug('${field.name}', '${field.source || 'name'}')" class="absolute right-2 px-2 py-1 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-lg text-[9px] font-extrabold text-slate-500 shadow-sm transition">
                    Auto
                </button>
            </div>`;
            setTimeout(() => {
                const sourceEl = document.querySelector(`[name="${field.source || 'name'}"]`);
                const slugEl = document.querySelector(`[name="${field.name}"]`);
                if (sourceEl && slugEl) {
                    sourceEl.addEventListener('input', (e) => {
                        slugEl.value = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                    });
                }
            }, 100);
        } else if (field.type === 'object_array') {
            input = `
            <div class="border border-slate-100 rounded-2xl bg-slate-50/30 p-4 flex flex-col gap-3" id="array-container-${field.name}">
                <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                    <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider">Array Items</span>
                    <button type="button" onclick="addArrayItem('${field.name}')" class="px-2 py-1 bg-white hover:bg-slate-50 border border-slate-200 rounded-lg text-[9px] font-extrabold text-blue-500 shadow-sm transition flex items-center gap-1">
                        <i class="fa-solid fa-plus text-[8px]"></i> Add Item
                    </button>
                </div>
                
                <div id="array-items-list-${field.name}" class="flex flex-col gap-3">
                    <!-- Dynamic array items -->
                </div>
            </div>`;
            
            setTimeout(() => {
                const items = Array.isArray(value) ? value : [];
                items.forEach((item, idx) => {
                    addArrayItem(field.name, item);
                });
            }, 100);
        } else if (field.type === 'textarea') {
            input = `<textarea name="${field.name}" rows="4" class="${base} resize-none" placeholder="${field.placeholder||''}">${escHtml(String(value??''))}</textarea>`;
        } else if (field.type === 'select') {
            const opts = field.options.map(o => `<option value="${o.value}" ${String(value)===String(o.value)?'selected':''}>${o.label}</option>`).join('');
            input = `<select name="${field.name}" class="${base}">${opts}</select>`;
        } else if (field.type === 'category_select') {
            const selectedCatId = value?._ref || value || '';
            const catSelectOpts = fetchedCategories.map(c => 
                `<option value="${c._id}" ${c._id === selectedCatId ? 'selected' : ''}>${escHtml(c.category || c.title || c.name || c._id)}</option>`
            ).join('');
            input = `<select name="${field.name}" id="product-category-select" class="${base}">
                <option value="">— Select a Category —</option>
                ${catSelectOpts}
            </select>`;
        } else if (field.type === 'role_select') {
            const selectedRole = value || '';
            const roleOpts = fetchedRoles.map(r => 
                `<option value="${r}" ${r === selectedRole ? 'selected' : ''}>${escHtml(r)}</option>`
            ).join('');
            input = `<select name="${field.name}" class="${base}">
                <option value="">— Select a Role —</option>
                ${roleOpts}
            </select>`;
        } else if (field.type === 'subcategory_select') {
            const activeCatId = currentDoc.category?._ref || currentDoc.category || '';
            const activeCat = fetchedCategories.find(c => c._id === activeCatId);
            const subs = activeCat?.subcategory || activeCat?.subCategories || [];
            const subSelectOpts = subs.map(s => 
                `<option value="${s}" ${s === value ? 'selected' : ''}>${escHtml(s)}</option>`
            ).join('');
            const isDisabled = !activeCatId ? 'disabled' : '';
            const defaultText = !activeCatId ? '— Select a Category first —' : '— Select a Sub-Category —';
            input = `<select name="${field.name}" id="product-subcategory-select" ${isDisabled} class="${base}">
                <option value="">${defaultText}</option>
                ${subSelectOpts}
            </select>`;
        } else if (field.type === 'reference_select') {
            const selectedVal = value?._ref || value || '';
            input = `<select name="${field.name}" id="ref-select-${field.name}" class="${base}"><option value="">— Loading Referenced Options... —</option></select>`;
            setTimeout(() => {
                const el = document.getElementById(`ref-select-${field.name}`);
                if (el) populateReferenceSelect(el, field.to, selectedVal);
            }, 50);
        } else if (field.type === 'datetime') {
            let formattedDate = '';
            if (value) {
                try {
                    formattedDate = new Date(value).toISOString().slice(0, 16);
                } catch (e) {
                    formattedDate = value;
                }
            }
            input = `<input type="datetime-local" name="${field.name}" value="${escHtml(formattedDate)}" ${field.required?'required':''} class="${base}">`;
        } else {
            const stepAttr = field.step ? `step="${field.step}"` : '';
            const displayVal = (field.name === 'subCategories' && Array.isArray(value)) ? value.join(', ') : (value ?? '');
            input = `<input type="${field.type}" name="${field.name}" value="${escHtml(String(displayVal))}" ${field.required?'required':''} ${stepAttr} class="${base}" placeholder="${field.placeholder||''}">`;
        }

        return `<div class="flex flex-col gap-1.5" id="field-wrapper-${field.name}">
            <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-wider">${field.label}${req}</label>
            ${input}
        </div>`;
    }

    function regenerateSlug(slugFieldName, sourceFieldName) {
        const sourceEl = document.querySelector(`[name="${sourceFieldName}"]`);
        const slugEl = document.querySelector(`[name="${slugFieldName}"]`);
        if (sourceEl && slugEl) {
            slugEl.value = sourceEl.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }
    }

    async function handleImageFieldChange(event, fieldName) {
        const file = event.target.files[0];
        if (!file) return;
        
        const emptyState = document.getElementById(`img-empty-${fieldName}`);
        const progContainer = document.getElementById(`img-progress-container-${fieldName}`);
        const progBar = document.getElementById(`img-progress-bar-${fieldName}`);
        const progText = document.getElementById(`img-progress-text-${fieldName}`);
        const filledState = document.getElementById(`img-filled-${fieldName}`);
        const previewImg = document.getElementById(`img-preview-${fieldName}`);
        const filenameText = document.getElementById(`img-filename-${fieldName}`);
        const inputVal = document.getElementById(`img-value-${fieldName}`);

        emptyState.classList.add('hidden');
        progContainer.classList.remove('hidden');
        progBar.style.width = '0%';
        progText.textContent = '0%';

        try {
            const assetRef = await uploadAssetFile(file, (percent) => {
                progBar.style.width = `${percent}%`;
                progText.textContent = `${percent}%`;
            });
            
            inputVal.value = assetRef;
            previewImg.src = buildSanityImageUrl(assetRef);
            filenameText.textContent = file.name;

            filledState.classList.remove('hidden');

        } catch (err) {

    function setupImageDropzones() {
        document.querySelectorAll('[id^="img-dropzone-container-"]').forEach(dropzone => {
            if (dropzone.id.includes('-slides-')) return;
            const fieldName = dropzone.id.replace('img-dropzone-container-', '');
            
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('border-blue-400', 'bg-blue-50/20');
            });
            dropzone.addEventListener('dragleave', (e) => {
                dropzone.classList.remove('border-blue-400', 'bg-blue-50/20');
            });
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('border-blue-400', 'bg-blue-50/20');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const inputEl = document.getElementById(`file-input-${fieldName}`);
                    if (inputEl) {
                        const dt = new DataTransfer();
                        dt.items.add(file);

                    }
                }
            });

    async function saveDocument() {
        const btn = document.getElementById('btn-save');
        setBtn(btn, true, '<i class="fa-solid fa-spinner fa-spin text-[10px]"></i> Saving...');
        GlobalLoader.start();

        const fields = FIELD_SCHEMAS[currentDoc._type] || [];
        const payload = {};
        
        let hasErrors = false;
        fields.filter(f => f.required).forEach(f => {
            if (f.type === 'object_array') return;
            const el = document.querySelector(`[name="${f.name}"]`);
            if (f.type === 'image') {
                const imgVal = document.getElementById(`img-value-${f.name}`);
                if (!imgVal || !imgVal.value.trim()) {
                    document.getElementById(`img-dropzone-container-${f.name}`)?.classList.add('border-rose-400', 'bg-rose-50/10');
                    hasErrors = true;
                } else {
                    document.getElementById(`img-dropzone-container-${f.name}`)?.classList.remove('border-rose-400', 'bg-rose-50/10');
                }
                return;
            }
            if (!el || !el.value.trim()) {
                el?.classList.add('border-rose-400', 'ring-2', 'ring-rose-100');
                hasErrors = true;
            } else {
                el?.classList.remove('border-rose-400', 'ring-2', 'ring-rose-100');
            }
        });
        if (hasErrors) {
            showToast('Please fill in all required fields.', 'warning');
            GlobalLoader.fail();
            setBtn(btn, false);
            return;
        }

        fields.forEach(f => {
            if (f.type === 'object_array') {
                const listContainer = document.getElementById(`array-items-list-${f.name}`);
                const items = [];
                if (listContainer) {
                    const blocks = listContainer.querySelectorAll('.array-item-block');
                    blocks.forEach(blk => {
                        const itemKey = blk.getAttribute('data-key') || '';
                        const realKey = (itemKey && !itemKey.startsWith('item-')) ? itemKey : Math.random().toString(36).substring(2, 11);
                        const itemObj = { _key: realKey };
                        const inputs = blk.querySelectorAll('.array-field-val');
                        inputs.forEach(inp => {
                            const fieldName = inp.getAttribute('data-field');
                            const val = inp.value;
                            
                            const subFieldDef = f.fields.find(sf => sf.name === fieldName);
                            if (subFieldDef) {
                                if (subFieldDef.type === 'image') {
                                    itemObj[fieldName] = val ? { _type: 'image', asset: { _type: 'reference', _ref: val } } : null;
                                } else if (subFieldDef.type === 'reference_select') {
                                    itemObj[fieldName] = val ? { _type: 'reference', _ref: val } : null;
                                } else if (subFieldDef.type === 'number') {
                                    itemObj[fieldName] = val !== '' ? parseFloat(val) : null;
                                } else if (subFieldDef.type === 'select' && (val === 'true' || val === 'false')) {
                                    itemObj[fieldName] = val === 'true';
                                } else {
                                    itemObj[fieldName] = val;
                                }
                            } else {
                                itemObj[fieldName] = val;
                            }
                        });
                        items.push(itemObj);
                    });
                }
                payload[f.name] = items;
                return;
            }

            const el = document.querySelector(`[name="${f.name}"]`);
            if (f.type === 'image') {
                const imgVal = document.getElementById(`img-value-${f.name}`);
                payload[f.name] = imgVal && imgVal.value ? { _type: 'image', asset: { _type: 'reference', _ref: imgVal.value } } : null;
                return;
            }

            if (!el) return;
            if (f.type === 'select' && (el.value === 'true' || el.value === 'false')) payload[f.name] = el.value === 'true';
            else if (f.name === 'availability') payload[f.name] = el.value === 'true';
            else if (f.type === 'number') payload[f.name] = el.value !== '' ? parseFloat(el.value) : null;
            else if (f.is_array || f.name === 'keywords' || f.name === 'subCategories') payload[f.name] = el.value.split(',').map(k=>k.trim()).filter(Boolean);
            else if (f.type === 'category_select' || f.type === 'reference_select') payload[f.name] = el.value ? { _type: 'reference', _ref: el.value } : null;
            else if (f.type === 'slug') {
                payload[f.name] = { _type: 'slug', current: el.value };
            }
            else payload[f.name] = el.value;
        });

        let shouldLogoutAfterSave = false;
        if (currentDoc && currentDoc._type === 'adminUser') {
            const currentSessionStr = localStorage.getItem('getmeds_admin_session');
            if (currentSessionStr) {
                try {
                    const sessionObj = JSON.parse(currentSessionStr);
                    const newRole = payload.role;
                    if (newRole && newRole !== currentDoc.role) {
                        if (currentDoc.username === sessionObj.username) {
                            const confirmed = await customConfirm({
                                title: 'Warning: Role Change',
                                message: `You are changing your own role from "${currentDoc.role}" to "${newRole}". You will be logged out of your current session. Do you want to proceed?`,
                                confirmText: 'Proceed and Log Out',
                                cancelText: 'Cancel'
                            });
                            if (!confirmed) {
                                setBtn(btn, false);
                                GlobalLoader.fail();
                                return;
                            }
                            shouldLogoutAfterSave = true;
                        } else if (currentDoc.role === sessionObj.role) {
                            const confirmed = await customConfirm({
                                title: 'Warning: Role Change',
                                message: `This user shares the same role ("${currentDoc.role}") as you. Changing their role will cause their active session to be logged out. Do you want to proceed?`,
                                confirmText: 'Proceed',
                                cancelText: 'Cancel'
                            });
                            if (!confirmed) {
                                setBtn(btn, false);
                                GlobalLoader.fail();
                                return;
                            }
                        }
                    }
                } catch(e) {
                    console.error(e);
                }
            }
        }

        try {
            const res = await fetch(`/api/admin/document/${DOC_ID}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminToken },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error((await res.json()).detail);
            GlobalLoader.done();
            showToast('Changes saved successfully!', 'success');
            if (shouldLogoutAfterSave) {
                localStorage.removeItem('getmeds_admin_session');
                setTimeout(() => {
                    window.location.href = '/admin/login';
                }, 1000);
            } else {
                setTimeout(() => {
                    loadDocument();
                }, 800);
            }
        } catch(e) {
            GlobalLoader.fail();
            showToast(e.message || 'Failed to save.', 'error');
        } finally {
            setBtn(btn, false);
        }
    }

    async function deleteDocument() {
        if (!await customConfirm({
            title: 'Delete Document',
            message: `Are you sure you want to delete "${currentDoc?.name || currentDoc?.title || DOC_ID}"? This action cannot be undone.`,
            confirmText: 'Yes, Delete'
        })) return;
        const btn = document.getElementById('btn-delete');
        setBtn(btn, true, '<i class="fa-solid fa-spinner fa-spin text-[10px]"></i> Deleting...');
        GlobalLoader.start();
        try {
            const res = await fetch(`/api/admin/document/${DOC_ID}`, {
                method: 'DELETE', headers: { 'X-Admin-Token': adminToken }
            });
            if (!res.ok) throw new Error((await res.json()).detail);
            GlobalLoader.done();
            showToast('Document deleted. Redirecting...', 'success');
            const targetCollection = (currentDoc._type === 'adminUser' || currentDoc._type === 'accessPoint') ? 'security' : currentDoc._type;
            setTimeout(() => window.location.href = `/admin?collection=${targetCollection}`, 1200);
            setBtn(btn, false);
        } catch(e) {
            GlobalLoader.fail();
            showToast(e.message, 'error');
            setBtn(btn, false);
        }
    }

    function buildSanityImageUrl(ref) {
        if (!ref || !ref.startsWith('image-')) return null;
        const withoutPrefix = ref.replace(/^image-/, '');
        const lastDash = withoutPrefix.lastIndexOf('-');
        const ext = withoutPrefix.substring(lastDash + 1);
        const rest = withoutPrefix.substring(0, lastDash);
        return `https://cdn.sanity.io/images/${SANITY_PROJECT_ID}/${SANITY_DATASET}/${rest}.${ext}`;
    }

    // ---- HELPERS ----
    function formatDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function escHtml(v) {
        return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Use global showToast, setBtn and GlobalLoader from head.html
</script>
