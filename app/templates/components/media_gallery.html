<!-- Media Gallery Workspace Panel -->
<div id="media-gallery-panel" class="hidden flex-col h-full overflow-hidden">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8 shrink-0">
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight flex items-center gap-3">
                <i class="fa-solid fa-images text-blue-500"></i> Media Gallery
            </h1>
            <p class="text-sm text-slate-500 font-medium mt-1">Manage files and images uploaded to the database</p>
        </div>
        <button onclick="loadMediaGallery()" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 hover:text-slate-800 transition font-semibold text-xs shadow-sm flex items-center gap-2">
            <i class="fa-solid fa-rotate-right"></i> Refresh
        </button>
    </div>

    <!-- Media Grid Container -->
    <div class="flex-1 overflow-y-auto custom-scrollbar relative pr-2">
        <div id="media-loading-indicator" class="hidden absolute inset-0 bg-white/50 backdrop-blur-sm z-10 flex flex-col items-center justify-center">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <span class="text-sm font-bold text-slate-600">Loading Media Assets...</span>
        </div>
        
        <div id="media-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            <!-- Asset cards will be injected here via JS -->
        </div>
        
        <div id="media-empty-state" class="hidden flex-col items-center justify-center h-64 text-center">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-slate-300 mb-4">
                <i class="fa-solid fa-folder-open text-2xl"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-700">No media found</h3>
            <p class="text-sm text-slate-500 mt-1 max-w-sm">Files and images uploaded to the Sanity database will appear here.</p>
        </div>
    </div>
</div>
