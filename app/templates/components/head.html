<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetMEDS Active Console - Mockup Perfect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0D99FF',
                        success: '#61A644',
                        dark: '#0F172A',
                        sidebarbg: '#FFFFFF',
                        dashboardbg: '#F8FAFC',
                        mockRed: '#E11D48',
                        mockRedHover: '#BE123C'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F8FAFC;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        .admin-tab-btn.active {
            background: linear-gradient(135deg, #61A644 0%, #0D99FF 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(13, 153, 255, 0.2);
        }

        .sec-tab-btn.active {
            border-color: #0D99FF;
            color: #0D99FF;
        }

        .modal-active {
            animation: modalFadeIn 0.3s ease-in-out forwards;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Premium Shimmering Skeleton Loader Styles */
        .skeleton {
            background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ===== GLOBAL PROGRESS BAR ===== */
        #gp-bar {
            position: fixed;
            top: 0; left: 0;
            height: 3px;
            width: 0%;
            z-index: 9999;
            background: linear-gradient(90deg, #61A644, #0D99FF, #E11D48, #0D99FF, #61A644);
            background-size: 300% 100%;
            animation: gp-shimmer 1.5s linear infinite;
            transition: width 0.25s ease-out, opacity 0.3s ease;
            opacity: 0;
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 8px rgba(13,153,255,0.6);
        }
        @keyframes gp-shimmer {
            0% { background-position: 0% 0; }
            100% { background-position: 300% 0; }
        }

        /* ===== STATUS TOAST QUEUE ===== */
        #toast-queue {
            position: fixed;
            bottom: 24px; right: 24px;
            z-index: 9998;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        #toast-queue .toast-item {
            pointer-events: all;
            animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        #toast-queue .toast-item.toast-out {
            animation: toastOut 0.25s ease-in forwards;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to   { opacity: 0; transform: translateY(8px) scale(0.95); }
        }

        /* ===== BUTTON LOADING DISABLED STATE ===== */
        button:disabled { cursor: not-allowed; opacity: 0.65; }
    </style>
</head>

<!-- Global Progress Bar (always visible layer) -->
<div id="gp-bar"></div>
<!-- Toast Queue -->
<div id="toast-queue"></div>

<!-- Custom Confirmation Modal -->
<div id="confirm-modal" class="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-2xl max-w-sm w-full mx-4 p-6 scale-95 transition-all duration-300 transform" id="confirm-modal-card">
        <div class="flex flex-col items-center text-center gap-4">
            <div class="w-12 h-12 rounded-full bg-rose-50 flex items-center justify-center text-rose-500">
                <i class="fa-solid fa-triangle-exclamation text-xl"></i>
            </div>
            <div>
                <h3 class="text-sm font-extrabold text-slate-800" id="confirm-modal-title">Confirm Deletion</h3>
                <p class="text-xs text-slate-400 mt-2" id="confirm-modal-message">Are you sure you want to delete this? This action cannot be undone.</p>
            </div>
            <div class="flex items-center gap-2 w-full mt-2">
                <button id="confirm-modal-cancel" class="flex-1 py-2 rounded-xl border border-slate-200 text-xs font-bold text-slate-500 hover:bg-slate-50 transition">
                    Cancel
                </button>
                <button id="confirm-modal-confirm" class="flex-1 py-2 rounded-xl bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold transition shadow-md hover:shadow-lg">
                    Yes, Delete
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  GLOBAL LOADING SYSTEM
    // ============================================================
    const GlobalLoader = (() => {
        let _active = 0, _timer = null, _pct = 0;
        const bar = () => document.getElementById('gp-bar');
        return {
            start() {
                _active++;
                const b = bar(); if (!b) return;
                clearInterval(_timer);
                _pct = 15;
                b.style.opacity = '1';
                b.style.width = '15%';
                b.style.background = 'linear-gradient(90deg,#61A644,#0D99FF,#E11D48,#0D99FF,#61A644)';
                b.style.backgroundSize = '300% 100%';
                _timer = setInterval(() => {
                    if (_pct < 80) { _pct += Math.random() * 6 + 2; b.style.width = _pct + '%'; }
                }, 300);
            },
            done() {
                _active = Math.max(0, _active - 1);
                if (_active > 0) return;
                const b = bar(); if (!b) return;
                clearInterval(_timer);
                b.style.width = '100%';
                setTimeout(() => { b.style.opacity = '0'; setTimeout(() => { b.style.width = '0'; _pct = 0; }, 300); }, 350);
            },
            fail() {
                _active = 0;
                const b = bar(); if (!b) return;
                clearInterval(_timer);
                b.style.background = '#E11D48';
                b.style.width = '100%';
                setTimeout(() => { b.style.opacity = '0'; setTimeout(() => { b.style.width = '0'; _pct = 0; }, 300); }, 600);
            }
        };
    })();

    // Queue-based toast system
    function showToast(msg, type = 'info', duration = 4000) {
        const queue = document.getElementById('toast-queue');
        if (!queue) { console.log('[Toast]', msg); return; }
        const icons = { success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info', warning:'fa-triangle-exclamation' };
        const colors = {
            success: 'bg-white border-green-200 text-green-700',
            error:   'bg-white border-rose-200 text-rose-600',
            info:    'bg-white border-blue-200 text-blue-600',
            warning: 'bg-white border-amber-200 text-amber-600'
        };
        const iconColors = { success:'text-green-500', error:'text-rose-500', info:'text-blue-500', warning:'text-amber-500' };
        const el = document.createElement('div');
        el.className = `toast-item flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg border text-xs font-bold min-w-[240px] max-w-[340px] ${colors[type] || colors.info}`;
        el.innerHTML = `<i class="fa-solid ${icons[type] || icons.info} text-sm ${iconColors[type] || iconColors.info} shrink-0"></i><span class="flex-1">${String(msg).replace(/</g,'&lt;')}</span><button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-slate-500 transition"><i class="fa-solid fa-xmark text-[10px]"></i></button>`;
        queue.appendChild(el);
        setTimeout(() => {
            el.classList.add('toast-out');
            setTimeout(() => el.remove(), 260);
        }, duration);
    }

    // Unified button loading state manager
    function setBtn(btn, loading, overrideHTML = null) {
        if (!btn) return;
        if (loading) {
            btn._savedHTML = btn.innerHTML;
            btn._savedDisabled = btn.disabled;
            btn.disabled = true;
            const label = overrideHTML || `<i class="fa-solid fa-spinner fa-spin text-[10px]"></i> <span>${btn.textContent.trim() || 'Loading...'}</span>`;
            btn.innerHTML = label;
        } else {
            btn.disabled = btn._savedDisabled || false;
            btn.innerHTML = btn._savedHTML || btn.innerHTML;
        }
    }

    // Promise-based async Custom Confirmation Modal Dialog
    function customConfirm({ title = 'Confirm Deletion', message = 'Are you sure you want to delete this? This action cannot be undone.', confirmText = 'Yes, Delete', cancelText = 'Cancel' } = {}) {
        return new Promise((resolve) => {
            const modal = document.getElementById('confirm-modal');
            const card = document.getElementById('confirm-modal-card');
            const titleEl = document.getElementById('confirm-modal-title');
            const msgEl = document.getElementById('confirm-modal-message');
            const cancelBtn = document.getElementById('confirm-modal-cancel');
            const confirmBtn = document.getElementById('confirm-modal-confirm');

            titleEl.textContent = title;
            msgEl.textContent = message;
            confirmBtn.textContent = confirmText;
            cancelBtn.textContent = cancelText;

            // Show modal
            modal.classList.remove('opacity-0', 'pointer-events-none');
            card.classList.remove('scale-95');
            card.classList.add('scale-100');

            const cleanup = (value) => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                card.classList.remove('scale-100');
                card.classList.add('scale-95');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
                resolve(value);
            };

            confirmBtn.onclick = () => cleanup(true);
            cancelBtn.onclick = () => cleanup(false);
        });
    }
</script>
