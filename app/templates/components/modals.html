<!-- Forms Creator modal dialog - DRY Unified Dynamic Workspace -->
<div id="forms-creator-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center transition-all duration-300 opacity-0 pointer-events-none">
    <div class="w-full max-w-[580px] bg-white rounded-xl p-6 shadow-2xl border border-slate-100 transform transition-all duration-300 scale-95 modal-active flex flex-col gap-5">
        
        <div class="flex items-center justify-between border-b border-slate-100 pb-3">
            <h3 class="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-circle-plus text-primary text-base"></i> Add Custom Data
            </h3>
            <button onclick="closeFormModal()" class="text-slate-400 hover:text-slate-600 transition">
                <i class="fa-solid fa-xmark text-base"></i>
            </button>
        </div>

        <!-- Dynamic Schema Collection Selector Tab Buttons -->
        <div class="grid grid-cols-5 bg-slate-100 rounded-md p-1 gap-1" id="modal-tab-container">
            <!-- Tabs are dynamically generated here -->
        </div>

        <!-- Alert banner -->
        <div id="form-alert" class="hidden rounded-md p-3 text-[10px] font-semibold flex items-center gap-2"></div>

        <!-- Single Unified Dynamic Form -->
        <form id="unified-dynamic-form" class="flex flex-col gap-4" onsubmit="submitDynamicForm(event)">
            <input type="hidden" id="dynamic-doc-type" name="_type">
            
            <!-- Dynamic Field Container -->
            <div class="overflow-y-auto max-h-[320px] pr-1 flex flex-col gap-3.5" id="dynamic-fields-container">
                <!-- Form input elements are drawn on-the-fly here -->
            </div>

            <button type="submit" class="w-full bg-[#E11D48] hover:bg-[#BE123C] text-white py-3 rounded-md font-bold hover:shadow-lg transition-all duration-300 flex items-center justify-center gap-2 text-xs">
                <i class="fa-solid fa-paper-plane text-[10px]"></i> Add to Database
            </button>
        </form>
    </div>
</div>

<!-- Beautiful Premium Glassmorphism Media Library Modal -->
<div id="media-library-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] flex items-center justify-center transition-all duration-300 opacity-0 pointer-events-none">
    <div class="w-full max-w-[700px] bg-white rounded-2xl p-6 shadow-2xl border border-slate-100 transform transition-all duration-300 scale-95 flex flex-col gap-4 h-[550px]">
        
        <div class="flex items-center justify-between border-b border-slate-100 pb-3">
            <h3 class="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-images text-[#0D99FF] text-base"></i> Sanity Media Asset Library
            </h3>
            <button onclick="closeMediaLibraryModal()" class="text-slate-400 hover:text-slate-600 transition">
                <i class="fa-solid fa-xmark text-base"></i>
            </button>
        </div>

        <!-- Quick filter / search media -->
        <div class="flex items-center border border-slate-200 focus-within:border-slate-400 focus-within:ring-2 focus-within:ring-slate-100 rounded-xl px-3 py-2 text-xs bg-white transition w-full">
            <i class="fa-solid fa-magnifying-glass text-slate-400 mr-2"></i>
            <input type="text" id="media-search" placeholder="Search uploaded images by filename..." oninput="filterMediaLibrary()" class="w-full focus:outline-none text-slate-700 bg-transparent">
        </div>

        <!-- Media Library Grid -->
        <div class="flex-grow overflow-y-auto pr-1" id="media-library-scroll-container">
            <div class="grid grid-cols-4 gap-3" id="media-library-grid">
                <!-- Media files generated here -->
            </div>
            <div id="media-library-empty" class="hidden flex flex-col items-center justify-center py-16 text-slate-400">
                <i class="fa-solid fa-box-open text-2xl mb-2"></i>
                <p class="text-[10px] font-bold">No images found in your Sanity library.</p>
            </div>
            <div id="media-library-loading" class="flex flex-col items-center justify-center py-16 text-slate-400">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2 text-[#0D99FF]"></i>
                <p class="text-[10px] font-bold">Loading media assets...</p>
            </div>
        </div>

        <div class="flex justify-end border-t border-slate-100 pt-3">
            <button type="button" onclick="closeMediaLibraryModal()" class="px-4 py-2 border border-slate-200 text-slate-500 rounded-xl text-xs font-bold hover:bg-slate-50 transition shadow-sm">
                Close
            </button>
        </div>
    </div>
</div>
