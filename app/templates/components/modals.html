<!-- Forms Creator modal dialog - DRY Unified Dynamic Workspace -->
<div id="forms-creator-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center transition-all duration-300 opacity-0 pointer-events-none">
    <div class="w-full max-w-[580px] bg-white rounded-xl p-6 shadow-2xl border border-slate-100 transform transition-all duration-300 scale-95 modal-active flex flex-col gap-5">
        
        <div class="flex items-center justify-between border-b border-slate-100 pb-3">
            <h3 class="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-circle-plus text-primary text-base"></i> Add Custom Data
            </h3>
            <button onclick="closeFormModal()" class="text-slate-400 hover:text-slate-600 transition">
                <i class="fa-solid fa-xmark text-base"></i>
            </button>
        </div>

        <!-- Dynamic Schema Collection Selector Tab Buttons -->
        <div class="grid grid-cols-5 bg-slate-100 rounded-md p-1 gap-1" id="modal-tab-container">
            <!-- Tabs are dynamically generated here -->
        </div>

        <!-- Alert banner -->
        <div id="form-alert" class="hidden rounded-md p-3 text-[10px] font-semibold flex items-center gap-2"></div>

        <!-- Single Unified Dynamic Form -->
        <form id="unified-dynamic-form" class="flex flex-col gap-4" onsubmit="submitDynamicForm(event)">
            <input type="hidden" id="dynamic-doc-type" name="_type">
            
            <!-- Dynamic Field Container -->
            <div class="overflow-y-auto max-h-[320px] pr-1 flex flex-col gap-3.5" id="dynamic-fields-container">
                <!-- Form input elements are drawn on-the-fly here -->
            </div>

            <button type="submit" class="w-full bg-[#E11D48] hover:bg-[#BE123C] text-white py-3 rounded-md font-bold hover:shadow-lg transition-all duration-300 flex items-center justify-center gap-2 text-xs">
                <i class="fa-solid fa-paper-plane text-[10px]"></i> Add to Database
            </button>
        </form>
    </div>
</div>
