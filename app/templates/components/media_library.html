<!-- Beautiful Premium Glassmorphism Media Library Modal -->
<div id="media-library-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center transition-all duration-300 opacity-0 pointer-events-none">
    <div class="w-full max-w-[750px] bg-white rounded-2xl p-6 shadow-2xl border border-slate-100 transform transition-all duration-300 scale-95 flex flex-col gap-4 h-[550px]">
        
        <div class="flex items-center justify-between border-b border-slate-100 pb-3">
            <h3 class="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-images text-[#0D99FF] text-base"></i> Sanity Media Asset Library
            </h3>
            <button onclick="closeMediaLibraryModal()" class="text-slate-400 hover:text-slate-600 transition">
                <i class="fa-solid fa-xmark text-base"></i>
            </button>
        </div>

        <!-- Quick filter / search media -->
        <div class="flex items-center border border-slate-200 focus-within:border-slate-400 focus-within:ring-2 focus-within:ring-slate-100 rounded-xl px-3 py-2 text-xs bg-white transition w-full">
            <i class="fa-solid fa-magnifying-glass text-slate-400 mr-2"></i>
            <input type="text" id="media-search-input" placeholder="Search uploaded images by filename..." oninput="filterMediaLibrary()" class="w-full focus:outline-none text-slate-700 bg-transparent">
        </div>

        <!-- Media Library Grid -->
        <div class="flex-grow overflow-y-auto pr-1" id="media-library-scroll-container">
            <div class="grid grid-cols-4 gap-4" id="media-library-grid">
                <!-- Media files generated here -->
            </div>
            <div id="media-library-empty" class="hidden flex flex-col items-center justify-center py-16 text-slate-400">
                <i class="fa-solid fa-box-open text-2xl mb-2"></i>
                <p class="text-[10px] font-bold">No images found in your Sanity library.</p>
            </div>
            <div id="media-library-loading" class="flex flex-col items-center justify-center py-16 text-slate-400">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2 text-[#0D99FF]"></i>
                <p class="text-[10px] font-bold">Loading media assets...</p>
            </div>
        </div>

        <div class="flex justify-end border-t border-slate-100 pt-3">
            <button type="button" onclick="closeMediaLibraryModal()" class="px-4 py-2 border border-slate-200 text-slate-500 rounded-xl text-xs font-bold hover:bg-slate-50 transition shadow-sm">
                Close
            </button>
        </div>
    </div>
</div>

<script>
    let mediaLibraryAssets = [];
    let mediaSelectCallback = null;

    function openMediaLibrary(onSelect) {
        mediaSelectCallback = onSelect;
        const modal = document.getElementById('media-library-modal');
        modal.classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById('media-search-input').value = '';
        
        loadMediaLibrary();
    }

    function closeMediaLibraryModal() {
        const modal = document.getElementById('media-library-modal');
        modal.classList.add('opacity-0', 'pointer-events-none');
        mediaSelectCallback = null;
    }

    async function loadMediaLibrary() {
        const grid = document.getElementById('media-library-grid');
        const loading = document.getElementById('media-library-loading');
        const empty = document.getElementById('media-library-empty');
        
        grid.innerHTML = '';
        loading.classList.remove('hidden');
        empty.classList.add('hidden');
        
        try {
            // Retrieve token from session
            let token = '';
            try {
                const session = JSON.parse(localStorage.getItem('getmeds_admin_session') || '{}');
                token = session.token || '';
            } catch(e) {}
            
            const res = await fetch('/api/admin/media', {
                headers: { 'X-Admin-Token': token }
            });
            if (!res.ok) throw new Error('Failed to load media assets');
            const data = await res.json();
            
            mediaLibraryAssets = data.media || [];
            renderMediaGrid(mediaLibraryAssets);
        } catch (err) {
            console.error(err);
            loading.classList.add('hidden');
            grid.innerHTML = `<div class="col-span-4 text-center text-rose-500 text-xs font-bold py-12">${err.message || 'Error loading media assets.'}</div>`;
        }
    }

    function renderMediaGrid(assets) {
        const grid = document.getElementById('media-library-grid');
        const loading = document.getElementById('media-library-loading');
        const empty = document.getElementById('media-library-empty');
        
        loading.classList.add('hidden');
        if (assets.length === 0) {
            empty.classList.remove('hidden');
            return;
        }
        empty.classList.add('hidden');
        
        // Helper to construct sanity URL inside modal if needed
        function getModalImageUrl(ref, fallbackUrl) {
            if (fallbackUrl) return fallbackUrl;
            if (!ref) return '';
            const parts = ref.split('-');
            if (parts.length < 4) return '';
            const id = parts[1];
            const dimensions = parts[2];
            const ext = parts[3];
            // Using production dataset defaults
            const proj = window.sanityProjectId || 's7ocz8zp';
            const ds = window.sanityDataset || 'production';
            return `https://cdn.sanity.io/images/${proj}/${ds}/${id}-${dimensions}.${ext}?w=150&h=150&fit=crop`;
        }

        grid.innerHTML = assets.map(item => {
            const imgSrc = getModalImageUrl(item._id, item.url);
            const filename = item.originalFilename || item._id;
            return `
                <div onclick="selectMediaAsset('${item._id}', '${filename.replace(/'/g, "\\'")}')" class="group flex flex-col gap-2 p-2 border border-slate-100 rounded-xl bg-slate-50/50 hover:bg-blue-50/20 hover:border-blue-300 transition duration-200 cursor-pointer text-center relative overflow-hidden shadow-sm">
                    <div class="aspect-square w-full rounded-lg overflow-hidden bg-white border border-slate-100 flex items-center justify-center relative">
                        <img src="${imgSrc}" class="w-full h-full object-cover group-hover:scale-105 transition duration-200" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23cbd5e1%22><path d=%22M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.86 8.86-3 3.87L9 13.14 6 17h12l-3.86-5.14z%22/></svg>'">
                    </div>
                    <p class="text-[9px] font-bold text-slate-700 truncate px-1" title="${filename}">${filename}</p>
                    <p class="text-[7px] text-slate-400">${new Date(item._createdAt).toLocaleDateString()}</p>
                </div>
            `;
        }).join('');
    }

    function filterMediaLibrary() {
        const query = document.getElementById('media-search-input').value.toLowerCase().trim();
        const filtered = mediaLibraryAssets.filter(item => {
            const filename = (item.originalFilename || item._id || '').toLowerCase();
            return filename.includes(query);
        });
        renderMediaGrid(filtered);
    }

    function selectMediaAsset(assetRef, originalFilename) {
        if (mediaSelectCallback) {
            mediaSelectCallback(assetRef, originalFilename);
        }
        closeMediaLibraryModal();
    }
</script>
