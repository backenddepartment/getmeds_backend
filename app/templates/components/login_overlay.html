<!-- Beautiful Premium Glassmorphism Admin Login Overlay -->
<div id="admin-login-overlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-950/80 backdrop-blur-xl transition duration-500 opacity-100">
    <!-- Glowing gradient backgrounds behind the card -->
    <div class="absolute w-96 h-96 bg-[#0D99FF]/10 rounded-full blur-[120px] top-12 left-12"></div>
    <div class="absolute w-96 h-96 bg-purple-500/10 rounded-full blur-[120px] bottom-12 right-12"></div>
    
    <!-- Elegant Card Container -->
    <div class="relative w-full max-w-[420px] mx-4 bg-slate-900/90 border border-slate-800/80 rounded-xl p-8 shadow-2xl flex flex-col gap-6 text-center transform transition duration-500 scale-100">
        <!-- Brand Logo Header -->
        <div class="flex flex-col items-center gap-2">
            <div class="w-12 h-12 rounded-lg bg-gradient-to-tr from-[#0D99FF] to-indigo-500 flex items-center justify-center text-white text-xl shadow-lg shadow-[#0D99FF]/20">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="text-lg font-extrabold text-white tracking-wide mt-2">GetMEDS Secure Hub</h1>
            <p class="text-[11px] text-slate-400 font-semibold uppercase tracking-wider">Administrative Access Portal</p>
        </div>
        
        <!-- Warning / Alert Display inside overlay -->
        <div id="login-alert-box" class="hidden text-[11px] font-bold p-3 rounded-lg border text-left flex items-start gap-2.5 transition"></div>

        <!-- Login Credentials Form -->
        <form id="admin-login-form" onsubmit="handleLoginSubmit(event)" class="flex flex-col gap-4 text-left">
            <!-- Passcode Input Field -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Enter Passcode / Secret Key</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                        <i class="fa-solid fa-key text-xs"></i>
                    </span>
                    <input id="login-passcode" type="password" required placeholder="GMP-XXXX-XXXX" class="w-full bg-slate-950 border border-slate-800 focus:border-[#0D99FF] focus:ring-1 focus:ring-[#0D99FF] text-white text-xs font-semibold rounded-lg pl-9 pr-10 py-2.5 transition outline-none">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-500 hover:text-white transition">
                        <i id="password-toggle-icon" class="fa-solid fa-eye text-xs"></i>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="login-btn-submit" class="w-full bg-gradient-to-r from-[#0D99FF] to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-2.5 rounded-lg text-xs shadow-lg shadow-[#0D99FF]/10 transition flex items-center justify-center gap-2 mt-2">
                <span>Authenticate & Access</span> <i class="fa-solid fa-arrow-right-to-bracket text-xs"></i>
            </button>
        </form>
        
        <div class="text-[10px] text-slate-500 font-medium">
            Protected by Decoupled Security Microservice &bull; Port 3334
        </div>
    </div>
</div>
