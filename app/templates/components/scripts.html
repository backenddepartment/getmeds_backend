    function changeSecurityPage(page) {
        if (page < 1 || page > Math.ceil(totalSecurityLogs / securityPageSize)) return;
        currentSecurityPage = page;
        refreshSecurityDashboard();
    }

    function renderSecurityLogsPagination() {
        const infoSpan = document.getElementById('sec-pagination-info');
        const pagesDiv = document.getElementById('sec-pagination-pages');
        if (!infoSpan || !pagesDiv) return;

        if (totalSecurityLogs === 0) {
            infoSpan.innerText = "Showing 0 to 0 of 0 entries";
            pagesDiv.innerHTML = "";
            return;
        }

        const startIdx = (currentSecurityPage - 1) * securityPageSize + 1;
        const endIdx = Math.min(currentSecurityPage * securityPageSize, totalSecurityLogs);
        infoSpan.innerText = `Showing ${startIdx} to ${endIdx} of ${totalSecurityLogs} entries`;

        const totalPages = Math.ceil(totalSecurityLogs / securityPageSize);
        let html = ``;

        // Prev Button
        const prevDisabled = currentSecurityPage === 1;
        html += `
            <button onclick="changeSecurityPage(${currentSecurityPage - 1})" ${prevDisabled ? 'disabled' : ''} class="px-2.5 py-1.5 rounded-lg border border-slate-200 text-[10px] font-extrabold ${prevDisabled ? 'text-slate-300 bg-slate-50/50 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 transition'}">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
        `;

        // Page numbers with ellipses
        const pageRange = getPageRange(currentSecurityPage, totalPages);
        for (const item of pageRange) {
            if (item === '...') {
                html += `
                    <span class="w-8 h-8 flex items-center justify-center text-[10px] font-extrabold text-slate-400">
                        ...
                    </span>
                `;
            } else {
                const isActive = currentSecurityPage === item;
                html += `
                    <button onclick="changeSecurityPage(${item})" class="w-8 h-8 flex items-center justify-center rounded-lg text-[10px] font-extrabold transition border ${isActive
                        ? 'bg-gradient-to-tr from-[#0D99FF] to-indigo-600 border-indigo-600 text-white shadow-md shadow-[#0D99FF]/10'
                        : 'border-slate-200 text-slate-600 hover:bg-slate-50'
                    }">
                        ${item}
                    </button>
                `;
            }
        }

        // Next Button
        const nextDisabled = currentSecurityPage === totalPages;
        html += `
            <button onclick="changeSecurityPage(${currentSecurityPage + 1})" ${nextDisabled ? 'disabled' : ''} class="px-2.5 py-1.5 rounded-lg border border-slate-200 text-[10px] font-extrabold ${nextDisabled ? 'text-slate-300 bg-slate-50/50 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 transition'}">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        `;

        pagesDiv.innerHTML = html;
    }

    // Intercept native fetch globally — auto-injects auth token + drives GlobalLoader
    const originalFetch = window.fetch;
    window.fetch = async function (url, options = {}) {
        const isAdminApi = typeof url === 'string' && url.startsWith('/api/admin/');

        if (isAdminApi) {
            GlobalLoader.start();
            const session = localStorage.getItem('getmeds_admin_session');
            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    if (sessionData.token) {
                        options.headers = options.headers || {};
                        options.headers['X-Admin-Token'] = sessionData.token;
                    }
                } catch (e) { }
            }
        }

        let response;
        try {
            response = await originalFetch(url, options);
        } catch (netErr) {
            if (isAdminApi) GlobalLoader.fail();
            throw netErr;
        }

        if (isAdminApi) {
            if (response.ok || response.status === 404) GlobalLoader.done();
            else GlobalLoader.fail();
        }

        // If access token is expired (401), execute transparent silent token refresh rotation
        if (response.status === 401 && !url.includes('/auth/login') && !url.includes('/auth/refresh')) {
            try {
                const refreshRes = await originalFetch('/api/admin/auth/refresh', { method: 'POST' });
                if (refreshRes.ok) {
                    const refreshData = await refreshRes.json();
                    const session = localStorage.getItem('getmeds_admin_session');
                    if (session) {
                        const sessionData = JSON.parse(session);
                        sessionData.token = refreshData.token;
                        if (refreshData.allowedCollections) {
                            sessionData.allowedCollections = refreshData.allowedCollections;
                        }
                        if (refreshData.roleActionPerms) {
                            sessionData.roleActionPerms = refreshData.roleActionPerms;
                        }
                        localStorage.setItem('getmeds_admin_session', JSON.stringify(sessionData));
                        const tokenInput = document.getElementById('admin-secret-token');
                        if (tokenInput) tokenInput.value = refreshData.token;
                        options.headers = options.headers || {};
                        options.headers['X-Admin-Token'] = refreshData.token;
                        response = await originalFetch(url, options);
                    }
                } else {
                    showToast('Session expired — please log in again.', 'warning');
                    await handleLogout();
                }
            } catch (err) {
                await handleLogout();
            }
        }
        return response;
    };

    async function handleLoginSubmit(event) {
        event.preventDefault();
        const passcode = document.getElementById('login-passcode').value;
        const alertBox = document.getElementById('login-alert-box');
        const submitBtn = document.getElementById('login-btn-submit');

        if (!passcode) {
            showLoginAlert("Please enter your secret passcode key.", "error");
            return;
        }

        setBtn(submitBtn, true, '<i class="fa-solid fa-spinner fa-spin text-xs"></i> <span>Verifying identity...</span>');
        alertBox.classList.add('hidden');
        GlobalLoader.start();

        try {
            const res = await originalFetch('/api/admin/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ passcode })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.detail || "Authentication failed.");
            }

            const sessionData = {
                username: data.username,
                role: data.role,
                permissions: data.permissions,
                allowedCollections: data.allowedCollections || [],
                roleActionPerms: data.roleActionPerms || null,
                token: data.token
            };
            localStorage.setItem('getmeds_admin_session', JSON.stringify(sessionData));
            personalizeOperatorUI(sessionData);

            showLoginAlert("Authentication successful! Loading console...", "success");
            GlobalLoader.done();

            setTimeout(() => {
                hideLoginOverlay();
                setBtn(submitBtn, false);
                refreshAdminDashboard();
            }, 900);

        } catch (err) {
            GlobalLoader.fail();
            setBtn(submitBtn, false);
            showLoginAlert(err.message, "error");
        }
    }

    // ======= URL STATE MANAGEMENT =======
    function syncUrlToState(docId = null, replace = false) {
        const params = new URLSearchParams();
        params.set('collection', activeFilter);
        if (activeFilter === 'security') {
            params.set('tab', activeSecurityTab);
            params.set('page', currentSecurityPage);
        } else {
            params.set('page', currentPage);
            params.set('limit', pageSize);
        }
        if (docId) params.set('doc', docId);
        const newUrl = `${window.location.pathname}?${params.toString()}`;
        
        const state = {
            collection: activeFilter,
            page: activeFilter === 'security' ? currentSecurityPage : currentPage,
            limit: activeFilter === 'security' ? null : pageSize,
            tab: activeFilter === 'security' ? activeSecurityTab : null,
            doc: docId || null
        };
        
        if (replace) {
            history.replaceState(state, '', newUrl);
        } else {
            history.pushState(state, '', newUrl);
        }
    }

    function readUrlState() {
        const params = new URLSearchParams(window.location.search);
        const collection = params.get('collection');
        const page = parseInt(params.get('page')) || 1;
        const limit = parseInt(params.get('limit'));
        const docId = params.get('doc');
        const tab = params.get('tab');

        if (limit && !isNaN(limit)) {
            pageSize = limit;
        }

        // Always populate the sidebar first, regardless of which panel is shown
        renderSidebarMenu();

        if (collection === 'security') {
            if (tab) activeSecurityTab = tab;
            currentSecurityPage = page;
            showSecurityControlPanel(true, tab || 'users');
            
            // If the URL did not have tab or page parameters, replaceState to keep address bar sync'd
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has('tab') || !urlParams.has('page')) {
                syncUrlToState(null, true);
            }
        } else if (collection && COLLECTION_META[collection]) {
            document.getElementById('security-control-panel').classList.add('hidden');
            document.getElementById('database-hub-panel').classList.remove('hidden');
            document.getElementById('sidebar-security-btn').classList.remove('text-slate-900', 'bg-slate-50', 'border-r-4', 'border-slate-900');
            document.getElementById('sidebar-security-btn').classList.add('text-slate-500');

            activeFilter = collection;
            currentPage = page;
            const meta = COLLECTION_META[collection];
            document.getElementById('breadcrumb-filter-name').innerText = meta.label;
            document.getElementById('table-active-title').innerText = meta.label;
            document.getElementById('header-hub-title').innerText = `GetMEDS - ${meta.label}`;
            refreshAdminDashboard();
        } else {
            refreshAdminDashboard();
        }

        if (docId) {
            setTimeout(() => openDocumentDetail(docId), 600);
        }
    }

    window.addEventListener('popstate', (event) => {
        const state = event.state;
        if (!state) return;

        if (state.collection === 'security') {
            if (state.tab) activeSecurityTab = state.tab;
            currentSecurityPage = state.page || 1;
            showSecurityControlPanel(true, state.tab || 'users');
        } else {
            document.getElementById('security-control-panel').classList.add('hidden');
            document.getElementById('database-hub-panel').classList.remove('hidden');
            document.getElementById('sidebar-security-btn').classList.remove('text-slate-900', 'bg-slate-50', 'border-r-4', 'border-slate-900');
            document.getElementById('sidebar-security-btn').classList.add('text-slate-500');

            activeFilter = state.collection || 'product';
            currentPage = state.page || 1;
            if (state.limit) pageSize = state.limit;
            const meta = COLLECTION_META[activeFilter];
            if (meta) {
                document.getElementById('breadcrumb-filter-name').innerText = meta.label;
                document.getElementById('table-active-title').innerText = meta.label;
                document.getElementById('header-hub-title').innerText = `GetMEDS - ${meta.label}`;
            }
            if (state.doc) {
                refreshAdminDashboard();
                setTimeout(() => openDocumentDetail(state.doc), 600);
            } else {
                closeDocumentDetail(true);
                refreshAdminDashboard();
            }
        }
    });

    // ======= DOCUMENT DETAIL PANEL =======
    let activeDetailDocId = null;

    async function openDocumentDetail(docId) {
        activeDetailDocId = docId;
        syncUrlToState(docId);

        const panel = document.getElementById('document-detail-panel');
        const backdrop = document.getElementById('document-detail-backdrop');
        const content = document.getElementById('detail-panel-content');
        const titleEl = document.getElementById('detail-panel-title');
        const idEl = document.getElementById('detail-panel-id');
        const badgeEl = document.getElementById('detail-panel-type-badge');
        const tsEl = document.getElementById('detail-panel-timestamps');

        // Show panel
        panel.classList.remove('translate-x-full');
        backdrop.classList.remove('opacity-0', 'pointer-events-none');
        backdrop.classList.add('opacity-100');

        // Loading state
        content.innerHTML = `<div class="flex items-center justify-center py-16 text-slate-300"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>`;
        idEl.textContent = docId;
        titleEl.textContent = 'Loading...';

        try {
            const res = await fetch(getAdminApiUrl(`document/${docId}`));
            if (!res.ok) throw new Error('Failed to load document.');
            const data = await res.json();
            const doc = data.document;

            const meta = COLLECTION_META[doc._type] || { label: doc._type, badge: 'bg-slate-50 text-slate-600 border-slate-100/50' };
            const fieldDefs = FIELD_SCHEMAS[doc._type] || [];

            // Update header
            const primaryLabel = doc.name || doc.title || doc.question || doc.sessionId || doc._id;
            titleEl.textContent = primaryLabel;
            idEl.innerHTML = `<span>${doc._id}</span> <a href="/admin/document/${doc._id}" class="ml-2 text-[9px] font-bold text-blue-500 hover:text-blue-700 underline underline-offset-2 transition">Open Full Edit →</a>`;
            badgeEl.textContent = meta.label;
            badgeEl.className = `text-[9px] font-extrabold px-2.5 py-0.5 rounded-full border ${meta.badge}`;

            // Timestamps
            const created = doc._createdAt ? new Date(doc._createdAt).toLocaleString() : '—';
            const updated = doc._updatedAt ? new Date(doc._updatedAt).toLocaleString() : '—';
            tsEl.innerHTML = `<i class="fa-solid fa-clock mr-1"></i>Created: ${created}`;

            // Build field rows from FIELD_SCHEMAS definition
            let html = `<div class="flex flex-col gap-5">`;

            // Show _id at top
            html += renderDetailField('Document ID', `<span class="font-mono text-[10px] text-slate-700 break-all">${escapeHtml(doc._id)}</span>`);

            fieldDefs.forEach(field => {
                const val = doc[field.name];
                let display;
                if (val === undefined || val === null || val === '') {
                    display = `<span class="text-slate-300 italic text-xs">—</span>`;
                } else if (field.name === 'availability') {
                    display = val === true
                        ? `<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-green-50 text-green-600 border-green-100">In Stock</span>`
                        : `<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-rose-50 text-rose-500 border-rose-100">Out of Stock</span>`;
                } else if ((field.name === 'keywords' || field.name === 'subCategories') && Array.isArray(val)) {
                    display = val.map(k => `<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-slate-100 text-slate-600">${escapeHtml(k)}</span>`).join(' ');
                } else if (field.name === 'category') {
                    const catId = val?._ref || val;
                    const cat = (window.cachedCategories || []).find(c => c._id === catId);
                    display = `<span class="text-xs font-semibold text-slate-700">${escapeHtml(cat?.title || catId || '—')}</span>`;
                } else if (val && typeof val === 'object' && val._ref) {
                    const cat = (window.cachedCategories || []).find(c => c._id === val._ref);
                    const label = cat ? (cat.title || cat.name) : val._ref;
                    display = `<span class="text-xs font-semibold text-slate-700">${escapeHtml(label)}</span>`;
                } else if (field.type === 'slug') {
                    const slugVal = val?.current || val;
                    display = `<span class="text-xs font-semibold text-slate-700 font-mono bg-slate-50 px-2 py-1 rounded border border-slate-100">${escapeHtml(String(slugVal))}</span>`;
                } else if (field.type === 'image') {
                    const imgRef = val?.asset?._ref || val?._ref || val;
                    if (imgRef && typeof imgRef === 'string' && imgRef.split('-').length >= 4) {
                        display = `<div class="mt-1"><img src="${buildSanityImageUrl(imgRef)}" class="max-w-[150px] max-h-[150px] rounded-xl border border-slate-200/60 object-cover shadow-sm hover:scale-105 transition duration-200"></div>`;
                    } else {
                        display = `<span class="text-slate-300 italic text-xs">— No Image —</span>`;
                    }
                } else if (field.type === 'object_array' && Array.isArray(val)) {
                    display = `<div class="flex flex-col gap-2 mt-1">` + val.map((item, idx) => {
                        const textProps = [];
                        let itemImg = '';
                        Object.entries(item).forEach(([k, v]) => {
                            if (v && typeof v === 'object' && v.asset && v.asset._ref) {
                                itemImg = `<img src="${buildSanityImageUrl(v.asset._ref)}" class="w-8 h-8 rounded object-cover border border-slate-100">`;
                            } else if (v && typeof v === 'object' && v._ref) {
                                const refDoc = (window.cachedCategories || []).find(c => c._id === v._ref);
                                textProps.push(`<span class="font-bold">${k}:</span> ${refDoc?.title || refDoc?.name || v._ref}`);
                            } else if (typeof v !== 'object') {
                                textProps.push(`<span class="font-bold">${k}:</span> ${v}`);
                            }
                        });
                        const imgCol = itemImg ? `<div class="flex-shrink-0">${itemImg}</div>` : '';
                        const textCol = textProps.length > 0 ? `<div class="text-[10px] text-slate-600 flex flex-col">${textProps.join('')}</div>` : '<span class="text-slate-400 italic">Empty Item</span>';
                        return `<div class="flex items-center gap-3 bg-slate-50/50 p-2 rounded-lg border border-slate-100">
                            <span class="text-[9px] font-extrabold text-slate-400">#${idx + 1}</span>
                            ${imgCol}
                            ${textCol}
                        </div>`;
                    }).join('') + `</div>`;
                } else if (field.type === 'number') {
                    display = `<span class="font-extrabold text-slate-800 text-sm">₱${Number(val).toLocaleString()}</span>`;
                } else if (field.type === 'textarea') {
                    display = `<p class="text-xs text-slate-600 leading-relaxed whitespace-pre-wrap">${escapeHtml(String(val))}</p>`;
                } else {
                    display = `<span class="text-xs font-semibold text-slate-700">${escapeHtml(String(val))}</span>`;
                }
                html += renderDetailField(field.label, display);
            });

            html += `</div>`;
            content.innerHTML = html;

        } catch (err) {
            content.innerHTML = `<div class="text-center py-12 text-rose-500"><i class="fa-solid fa-triangle-exclamation text-xl mb-2"></i><p class="text-xs font-bold mt-2">${escapeHtml(err.message)}</p></div>`;
        }
    }

            <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest">${escapeHtml(label)}</span>
            <div>${valueHtml}</div>
        </div>`;

            message: 'Are you sure you want to delete this document? This action cannot be undone.',
            confirmText: 'Yes, Delete'

    // ======= BULK SELECTION =======
    let selectedIds = new Set();

    function toggleRowSelection(cb) {
        const id = cb.dataset.id;
        if (cb.checked) selectedIds.add(id);
        else selectedIds.delete(id);
        updateBulkBar();
        // Highlight row
        cb.closest('tr').classList.toggle('bg-blue-50/60', cb.checked);
    }

    function toggleSelectAll(checked) {
        document.querySelectorAll('.row-checkbox').forEach(cb => {
            cb.checked = checked;
            const id = cb.dataset.id;
            if (checked) selectedIds.add(id);
            else selectedIds.delete(id);
            cb.closest('tr').classList.toggle('bg-blue-50/60', checked);
        });
        updateBulkBar();
    }

    function updateBulkBar() {
        const bar = document.getElementById('bulk-action-bar');
        const countEl = document.getElementById('bulk-count');
        if (selectedIds.size > 0) {
            bar.classList.remove('hidden');
            bar.classList.add('flex');
            countEl.textContent = selectedIds.size;
        } else {
            bar.classList.add('hidden');
            bar.classList.remove('flex');
        }
    }

    function clearBulkSelection() {
        selectedIds.clear();

            title: 'Bulk Deletion',
            message: `Are you sure you want to delete ${ids.length} selected document(s)? This action cannot be undone.`,
            confirmText: `Yes, Delete ${ids.length}`
        })) return;
        const btn = document.querySelector('[onclick="confirmBulkDelete()"]');
        if (btn) setBtn(btn, true, `<i class="fa-solid fa-spinner fa-spin text-[10px]"></i> Deleting ${ids.length}...`);
        GlobalLoader.start();
        try {
            const res = await fetch(getAdminApiUrl('bulk'), {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail);
            GlobalLoader.done();
            showToast(`${ids.length} document(s) deleted successfully.`, 'success');
            clearBulkSelection();
            refreshAdminDashboard();
            if (btn) setBtn(btn, false);
        } catch(e) {
            GlobalLoader.fail();
            showToast('Bulk delete failed: ' + e.message, 'error');
            if (btn) setBtn(btn, false);
        }
    }

    // Patches a single table cell in the DOM immediately — no full refresh needed
    function patchTableCell(docId, field, value, fieldDef) {
        const row = document.querySelector(`tr[data-id="${docId}"]`);
        if (!row) return;
        const schema = TABLE_SCHEMAS[activeFilter] || [];
        const colIndex = schema.findIndex(c => c.key === field);
        if (colIndex === -1) return;
        // +2 because first cell is checkbox, second is ID
        const cells = row.querySelectorAll('td');
        const targetCell = cells[colIndex + 2];
        if (!targetCell) return;

        let display = '';
        const type = fieldDef?.type;
        if (type === 'price') {
            display = value != null
                ? `<span class="font-extrabold text-slate-800">₱${Number(value).toLocaleString()}</span>`
                : '<span class="text-slate-300">—</span>';
        } else if (type === 'availability') {
            display = value === true
                ? '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-green-50 text-green-600 border-green-100">In Stock</span>'
                : '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-rose-50 text-rose-500 border-rose-100">Out of Stock</span>';
        } else {
            const txt = String(value ?? '—');
            display = fieldDef?.truncate
                ? `<span class="block truncate max-w-[200px] text-slate-500">${escapeHtml(txt)}</span>`
                : `<span class="font-semibold text-slate-700">${escapeHtml(txt)}</span>`;
        }
        targetCell.innerHTML = display;
        // Flash the cell green briefly to signal the update
        targetCell.style.transition = 'background 0.2s';
        targetCell.style.background = '#dcfce7';
        setTimeout(() => { targetCell.style.background = ''; }, 800);
    }

    async function executeBulkEdit() {
        const field = document.getElementById('bulk-edit-field').value;
        const valEl = document.getElementById('bulk-edit-value');
        if (!field || !valEl || !valEl.value.toString().trim()) {
            showToast('Select a field and enter a value.', 'warning'); return;
        }

        let value = valEl.value;
        const fieldDef = (TABLE_SCHEMAS[activeFilter] || []).find(f => f.key === field);
        if (fieldDef?.type === 'availability') value = value === 'true';
        else if (fieldDef?.type === 'price') value = parseFloat(value);

        const ids = [...selectedIds];
        const total = ids.length;

        // Switch modal to progress view
        document.getElementById('bulk-edit-form-section').classList.add('hidden');
        document.getElementById('bulk-edit-progress-section').classList.remove('hidden');
        document.getElementById('bulk-edit-progress-section').classList.add('flex');
        document.getElementById('bulk-edit-apply-btn').disabled = true;
        document.getElementById('bulk-edit-apply-btn').innerHTML = '<i class="fa-solid fa-spinner fa-spin text-[10px]"></i> Running...';
        document.getElementById('bulk-edit-cancel-btn').disabled = true;

        const log = document.getElementById('bulk-edit-log');
        const progressBar = document.getElementById('bulk-progress-bar');
        const progressLabel = document.getElementById('bulk-progress-label');
        const progressFraction = document.getElementById('bulk-progress-fraction');

        // Pre-populate all rows as "pending"
        const logRows = {};
        ids.forEach(id => {
            const el = document.createElement('div');
            el.id = `blog-${id}`;
            el.className = 'flex items-center gap-2.5 py-2 border-b border-slate-50 last:border-0';
            el.innerHTML = `
                <div id="blog-icon-${id}" class="w-5 h-5 rounded-full bg-slate-100 flex items-center justify-center shrink-0">
                    <i class="fa-solid fa-clock text-[8px] text-slate-400"></i>
                </div>
                <span class="font-mono text-[10px] text-slate-500 flex-1 truncate">${escapeHtml(id)}</span>
                <span id="blog-status-${id}" class="text-[9px] font-bold text-slate-400">Pending</span>`;
            log.appendChild(el);
            logRows[id] = el;
        });

        let done = 0, failed = 0;

        for (let i = 0; i < ids.length; i++) {
            const id = ids[i];

            // Mark as "applying"
            document.getElementById(`blog-icon-${id}`).innerHTML =
                '<i class="fa-solid fa-spinner fa-spin text-[8px] text-blue-500"></i>';
            document.getElementById(`blog-icon-${id}`).className =
                'w-5 h-5 rounded-full bg-blue-50 flex items-center justify-center shrink-0';
            document.getElementById(`blog-status-${id}`).textContent = 'Applying...';
            document.getElementById(`blog-status-${id}`).className = 'text-[9px] font-bold text-blue-500';

            // Scroll log to bottom so current item is always visible
            log.scrollTop = log.scrollHeight;

            // Update header label
            progressLabel.textContent = `Applying to ${id}`;
            progressFraction.textContent = `${i + 1} / ${total}`;
            progressBar.style.width = `${Math.round(((i) / total) * 100)}%`;

            try {
                const res = await fetch(getAdminApiUrl(`document/${id}`), {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [field]: value })
                });

                if (res.ok) {
                    done++;
                    document.getElementById(`blog-icon-${id}`).innerHTML =
                        '<i class="fa-solid fa-check text-[8px] text-green-600"></i>';
                    document.getElementById(`blog-icon-${id}`).className =
                        'w-5 h-5 rounded-full bg-green-100 flex items-center justify-center shrink-0';
                    document.getElementById(`blog-status-${id}`).textContent = 'Updated';
                    document.getElementById(`blog-status-${id}`).className = 'text-[9px] font-bold text-green-600';
                    // Immediately patch the table row cell — no full refresh needed
                    patchTableCell(id, field, value, fieldDef);
                } else {
                    throw new Error('API error');
                }
            } catch(e) {
                failed++;
                document.getElementById(`blog-icon-${id}`).innerHTML =
                    '<i class="fa-solid fa-xmark text-[8px] text-rose-500"></i>';
                document.getElementById(`blog-icon-${id}`).className =
                    'w-5 h-5 rounded-full bg-rose-100 flex items-center justify-center shrink-0';
                document.getElementById(`blog-status-${id}`).textContent = 'Failed';
                document.getElementById(`blog-status-${id}`).className = 'text-[9px] font-bold text-rose-500';
            }
        }

        // Final state
        progressBar.style.width = '100%';
        progressBar.className = failed === 0
            ? 'h-1.5 rounded-full bg-gradient-to-r from-green-400 to-emerald-500 transition-all duration-300'
            : 'h-1.5 rounded-full bg-gradient-to-r from-amber-400 to-orange-500 transition-all duration-300';
        progressLabel.textContent = failed === 0 ? `All ${done} documents updated!` : `${done} updated, ${failed} failed`;
        progressFraction.textContent = `${done} / ${total}`;

        document.getElementById('bulk-edit-apply-btn').innerHTML =
            `<i class="fa-solid fa-check text-[10px]"></i> Done`;
        document.getElementById('bulk-edit-apply-btn').disabled = false;
        document.getElementById('bulk-edit-apply-btn').onclick = () => {
            closeBulkEditModal();
            clearBulkSelection();
            document.getElementById('bulk-edit-apply-btn').onclick = executeBulkEdit;
        };
        document.getElementById('bulk-edit-cancel-btn').disabled = false;
        document.getElementById('bulk-edit-cancel-btn').textContent = 'Close';

        if (failed > 0) showToast(`${done} updated, ${failed} failed.`, 'warning');
        else showToast(`${done} document(s) updated successfully!`, 'success');
    }

            });
            
            if (!res.ok) throw new Error(await res.text());

            const categoryAlert = document.getElementById('category-separator-alert');

    window.proceedToDuplicatesConfig = function() {
        if (!lastPreviewRows || lastPreviewRows.length === 0) return;

        container.innerHTML = headers.map(h => {
            const norm = h.toLowerCase().replace(/[^a-z0-9]/g, '');

            let isChecked = false;
            if (activeFilter === 'product') {
                if (norm === 'brandname' || norm === 'genericname' || norm === 'strength' || norm === 'genericnamebrandnamestrength') {
                    isChecked = true;
                }
            } else {
                // Default check name or first column
                if (norm === 'name' || norm === 'title' || headers.indexOf(h) === 0) {
                    isChecked = true;
                }
            }
            return `
                <label class="flex items-center gap-2 p-2 hover:bg-slate-100 rounded-lg cursor-pointer transition select-none">
                    <input type="checkbox" value="${escapeHtml(h)}" class="id-column-checkbox rounded border-slate-300 text-blue-600 focus:ring-blue-500 h-3.5 w-3.5" ${isChecked ? 'checked' : ''}>
                    <span class="text-[10px] font-bold text-slate-700 truncate">${escapeHtml(h)}</span>

        }).join('');
        
        goToImportStep('duplicates');

    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

        const container = document.getElementById('import-live-logs');
        if (!container) return;
        
        // Remove the default helper text on first insertion

        if (helperText && (helperText.textContent.includes('System ready') || helperText.textContent.includes('Initiating dry-run'))) {
            helperText.remove();
        }

        const line = document.createElement('div');
        if (type === 'error') {
            line.className = 'text-rose-400 font-semibold';
            line.innerHTML = `<span class="text-rose-500 font-bold">[ERR]</span> ${escapeHtml(msg)}`;
        } else if (type === 'warning') {
            line.className = 'text-amber-400 font-semibold';
            line.innerHTML = `<span class="text-amber-500 font-bold">[WARN]</span> ${escapeHtml(msg)}`;
        } else {
            line.className = 'text-slate-300';
            line.innerHTML = `<span class="text-blue-400 font-bold">[INFO]</span> ${escapeHtml(msg)}`;
        }
        container.appendChild(line);
        container.scrollTop = container.scrollHeight;

        // Immediately transition to progress step so the user sees immediate system response
        goToImportStep('progress');
        
        // Reset and prime logs console
        const logContainer = document.getElementById('import-live-logs');
        if (logContainer) {
            logContainer.innerHTML = '<div class="text-slate-500">// Initiating dry-run duplicate check...</div>';
        }
        
        const progressBar = document.getElementById('import-progress-bar');
        const progressPercent = document.getElementById('import-progress-percent');
        const progressCounts = document.getElementById('import-progress-counts');
        const progressTitle = document.getElementById('import-progress-status-title');
        
        progressBar.style.width = '10%';
        progressPercent.textContent = '10%';
        progressCounts.textContent = `Analyzing ${importParsedRowsCount} entries...`;
        progressTitle.textContent = 'Checking database for duplicate records...';

        appendLiveLog('Connecting to backend to verify dataset schema and IDs...', 'info');

        if (strategy === 'ask') {
            try {
                const formData = new FormData();
                formData.append('file', importFileObject);
                formData.append('dry_run', 'true');
                formData.append('id_columns', JSON.stringify(selectedIdCols));
                
                const splitCategories = document.getElementById('import-split-categories')?.checked ?? false;
                formData.append('split_categories', splitCategories ? 'true' : 'false');

                const isAuto = document.getElementById('import-auto-mapping')?.checked ?? true;
                if (!isAuto) {
                    const mappings = {};
                    document.querySelectorAll('.mapping-select').forEach(sel => {
                        const header = sel.getAttribute('data-header');
                        const target = sel.value;
                        if (header && target) mappings[header] = target;
                    });
                    formData.append('mappings', JSON.stringify(mappings));
                }

                const token = document.getElementById('admin-secret-token')?.value || 'getmeds-admin-secret-key';
                const res = await fetch(getAdminApiUrl(`bulk/import/${activeFilter}`), {
                    method: 'POST',
                    headers: { 'X-Admin-Token': token },
                    body: formData
                });
                
                if (res.status === 409) {
                    const data = await res.json();
                    if (data.detail && data.detail.startsWith('file_exists:')) {
                        const filename = data.detail.split('file_exists:')[1];
                        document.getElementById('overwrite-filename').textContent = filename;
                        document.getElementById('overwrite-confirm-modal').classList.remove('hidden');
                        document.getElementById('overwrite-confirm-modal').classList.add('flex');
                        appendLiveLog(`File validation alert: ${filename} already exists. Prompting for overwrite confirmation.`, 'warning');
                        goToImportStep('duplicates');
                        return;
                    }
                }

                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();
                
                // Print all dry-run analysis logs returned from backend
                if (data.logs && data.logs.length > 0) {
                    data.logs.forEach(logLine => {
                        appendLiveLog(logLine, logLine.includes('WARNING') || logLine.includes('Skipping') ? 'warning' : 'info');
                    });
                }
                
                if (data.duplicates > 0) {
                    appendLiveLog(`Dry-run verification completed. Found ${data.duplicates} duplicate database records. Prompting strategy selection.`, 'warning');
                    // Show duplicate warning confirmation dialog
                    document.getElementById('duplicate-count').textContent = data.duplicates;
                    document.getElementById('duplicate-confirm-modal').classList.remove('hidden');
                    document.getElementById('duplicate-confirm-modal').classList.add('flex');
                    goToImportStep('duplicates');
                } else {
                    appendLiveLog('Dry-run completed successfully with 0 database duplicates. Initiating streaming import...', 'info');
                    runRealStreamingImport('skip', selectedIdCols);
                }
            } catch (err) {
                appendLiveLog(`Dry-run analysis failed: ${err.message}`, 'error');
                showToast(err.message || 'Dry run analysis failed', 'error');
                goToImportStep('duplicates');
            }
        } else {
            appendLiveLog(`Initiating import directly using strategy: ${strategy}`, 'info');
            runRealStreamingImport(strategy, selectedIdCols);
        }
    };

    async function runRealStreamingImport(duplicateAction, idColumns, overwriteFile = false) {
        goToImportStep('progress');
        
        // Reset progress bar but preserve prior dry-run logs in the console
        const progressBar = document.getElementById('import-progress-bar');
        const progressPercent = document.getElementById('import-progress-percent');
        const progressCounts = document.getElementById('import-progress-counts');
        const progressTitle = document.getElementById('import-progress-status-title');
        
        progressBar.style.width = '0%';
        progressPercent.textContent = '0%';
        progressCounts.textContent = `0 / ${importParsedRowsCount} entries processed`;
        progressTitle.textContent = 'Initiating import...';

        appendLiveLog('Establishing streaming connection with Sanity backend...', 'info');

        const token = document.getElementById('admin-secret-token')?.value || 'getmeds-admin-secret-key';
        const formData = new FormData();
        formData.append('file', importFileObject);
        formData.append('overwrite', overwriteFile ? 'true' : 'false');
        
        const splitCategories = document.getElementById('import-split-categories')?.checked ?? false;
        formData.append('split_categories', splitCategories ? 'true' : 'false');

        if (duplicateAction) {
            formData.append('duplicate_action', duplicateAction);
        }
        if (idColumns && idColumns.length > 0) {
            formData.append('id_columns', JSON.stringify(idColumns));
        }

        const isAuto = document.getElementById('import-auto-mapping')?.checked ?? true;
        if (!isAuto) {
            const mappings = {};
            document.querySelectorAll('.mapping-select').forEach(sel => {
                const header = sel.getAttribute('data-header');
                const target = sel.value;
                if (header && target) mappings[header] = target;
            });
            formData.append('mappings', JSON.stringify(mappings));
        }

        try {
            const response = await fetch(getAdminApiUrl(`bulk/import/${activeFilter}`), {
                method: 'POST',
                headers: { 'X-Admin-Token': token },
                body: formData
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText || 'Import process failed');
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            appendLiveLog('Streaming connection established. Importing dataset records...', 'info');

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // Keep remaining incomplete line

                for (const line of lines) {
                    if (!line.trim()) continue;
                    try {
                        const data = JSON.parse(line);
                        if (data.status === 'progress') {
                            const pct = Math.round((data.processed / data.total) * 100);
                            progressBar.style.width = `${pct}%`;
                            progressPercent.textContent = `${pct}%`;
                            progressCounts.textContent = `${data.processed} / ${data.total} entries processed`;
                            progressTitle.textContent = `Importing ${data.current_name}...`;
                            
                            // Print the live log yielded from backend
                            if (data.log) {
                                appendLiveLog(data.log, data.log_type || 'info');
                            }
                        } else if (data.status === 'done') {
                            appendLiveLog(`Seeding finished. Successfully imported ${data.imported} records, failed ${data.failed}.`, 'info');
                            showImportResult(data);
                            return;
                        }
                    } catch (parseErr) {
                        console.error('Failed to parse streaming line:', line, parseErr);
                    }
                }
            }

            // Flush final buffer line
            if (buffer.trim()) {
                try {
                    const data = JSON.parse(buffer);
                    if (data.status === 'done') {
                        appendLiveLog(`Seeding finished. Successfully imported ${data.imported} records, failed ${data.failed}.`, 'info');
                        showImportResult(data);
                        return;
                    }
                } catch (e) {}
            }
            
            showToast('Import finished, but status is unconfirmed.', 'warning');
            goToImportStep('result');

        } catch (err) {
            appendLiveLog(`Import process terminated with error: ${err.message}`, 'error');
            showToast(err.message || 'Streaming import failed', 'error');
            goToImportStep('duplicates');
        }
    }

    window.confirmOverwriteImport = function() {
        closeOverwriteModal();
        const cols = getSelectedIdColumns();
        runRealStreamingImport('ask', cols, true);
    };

    window.closeOverwriteModal = function() {
        document.getElementById('overwrite-confirm-modal').classList.add('hidden');
        document.getElementById('overwrite-confirm-modal').classList.remove('flex');
    };

    window.confirmDuplicateAction = function(action) {
        closeDuplicateModal();
        const cols = getSelectedIdColumns();
        runRealStreamingImport(action, cols, false);
    };

    window.closeDuplicateModal = function() {
        document.getElementById('duplicate-confirm-modal').classList.add('hidden');
        document.getElementById('duplicate-confirm-modal').classList.remove('flex');
    };

    function showImportResult(data, error) {
        goToImportStep('result');
        const box = document.getElementById('import-errors-box');
        const list = document.getElementById('import-errors-list');
        box.classList.add('hidden');
        list.innerHTML = '';

        if (error) {
            document.getElementById('import-result-icon').innerHTML = '<i class="fa-solid fa-xmark text-3xl text-rose-500"></i>';
            document.getElementById('import-result-icon').className = 'w-16 h-16 rounded-2xl bg-rose-100 flex items-center justify-center';
            document.getElementById('import-result-title').textContent = 'Import Failed';
            document.getElementById('import-result-body').textContent = error;
        } else {
            document.getElementById('import-result-icon').innerHTML = '<i class="fa-solid fa-check text-3xl text-green-500"></i>';
            document.getElementById('import-result-icon').className = 'w-16 h-16 rounded-2xl bg-green-100 flex items-center justify-center';
            document.getElementById('import-result-title').textContent = `${data.imported} of ${data.total} records imported!`;
            document.getElementById('import-result-body').textContent = data.failed > 0 ? `${data.failed} rows had errors.` : 'All records created successfully.';
            if (data.errors && data.errors.length > 0) {
                box.classList.remove('hidden');
                list.innerHTML = data.errors.map(e =>
                    `<p class="text-[10px] text-rose-600 font-mono">Row ${e.row}: ${escapeHtml(e.error)}</p>`
                ).join('');
            }
        }
        refreshAdminDashboard();
    }

    function downloadTemplate() {
        const fields = IMPORT_FIELD_SCHEMAS[activeFilter] || [];
        const csv = fields.join(',') + '\n';
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${activeFilter}_template.csv`;
        a.click();
    }

    async function loadSchemasAndInit() {
        const session = localStorage.getItem('getmeds_admin_session');
        let token = 'getmeds-admin-secret-key';
        if (session) {
            try { token = JSON.parse(session).token || 'getmeds-admin-secret-key'; }
            catch(e) { token = 'getmeds-admin-secret-key'; }
        }
        try {
            const res = await fetch('/api/admin/schemas', {
                headers: { 'X-Admin-Token': token }
            });
            if (res.ok) {
                const data = await res.json();
                FIELD_SCHEMAS = data.field_schemas || {};
                TABLE_SCHEMAS = data.table_schemas || {};
                IMPORT_FIELD_SCHEMAS = data.import_field_schemas || {};
                COLLECTION_META = data.collection_meta || {};
                IMAGE_COLLECTIONS = data.image_collections || [];
                SIDEBAR_CONFIG = data.sidebar_config || [];
                window.sanityProjectId = data.sanity_project_id;
                window.sanityDataset = data.sanity_dataset;
            }
        } catch(e) {
            console.error("Failed to load dynamic schemas:", e);
        }
        
        // Run Auth Check
        initAdminAuth();

        // Read URL state on load (restores collection/page/doc from URL)
        readUrlState();
    }

    loadSchemasAndInit();

</script>
