    function openFormModal() {
        const modal = document.getElementById('forms-creator-modal');
        modal.classList.remove('opacity-0', 'pointer-events-none');
        modal.querySelector('.transform').classList.replace('scale-95', 'scale-100');

        // Default select the active sidebar filter if it exists in the forms specs
        if (activeFilter !== 'all' && FIELD_SCHEMAS[activeFilter]) {
            activeFormTab = activeFilter;
        } else {
            activeFormTab = 'product';
        }

        renderModalTabs();
        renderDynamicFormFields(activeFormTab);
    }

    function closeFormModal() {
        const modal = document.getElementById('forms-creator-modal');
        modal.classList.add('opacity-0', 'pointer-events-none');
        modal.querySelector('.transform').classList.replace('scale-100', 'scale-95');
        showAlert('', '');
    }

    function renderModalTabs() {
        const container = document.getElementById('modal-tab-container');
        let html = '';

        Object.keys(FIELD_SCHEMAS).forEach(key => {
            const meta = COLLECTION_META[key];
            const isActive = activeFormTab === key;

            html += `
                <button type="button" onclick="switchFormTab('${key}')" id="tab-btn-${key}" class="flex-grow text-center py-2 rounded text-[10px] font-bold transition duration-300 flex flex-col items-center gap-1 ${isActive
                    ? 'admin-tab-btn active text-white font-extrabold shadow-md'
                    : 'admin-tab-btn text-slate-500 hover:bg-slate-200/50'
                }">
                    <i class="fa-solid ${meta.icon} text-xs"></i><span>${meta.label}</span>
                </button>
            `;
        });

        container.innerHTML = html;
    }

    function switchFormTab(tabId) {
        activeFormTab = tabId;
        renderModalTabs();
        renderDynamicFormFields(tabId);
        showAlert('', '');
    }

    function renderDynamicFormFields(type) {
        const container = document.getElementById('dynamic-fields-container');
        document.getElementById('dynamic-doc-type').value = type;

        const fields = FIELD_SCHEMAS[type] || [];
        let html = '';

        fields.forEach(field => {
            const reqAttr = field.required ? 'required' : '';
            const stepAttr = field.step ? `step="${field.step}"` : '';

            html += `<div class="flex flex-col gap-1">
                <label class="text-[9px] font-extrabold text-slate-400 uppercase tracking-wide">${field.label}</label>`;

            if (field.type === 'textarea') {
                html += `<textarea name="${field.name}" ${reqAttr} rows="3" class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700 resize-none" placeholder="${field.placeholder || ''}"></textarea>`;
            } else if (field.type === 'select') {
                const optHtml = field.options.map(opt => `<option value="${opt.value}">${opt.label}</option>`).join('');
                html += `<select name="${field.name}" class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700">${optHtml}</select>`;
            } else if (field.type === 'category_select') {
                const opts = (window.cachedCategories || []).map(c => `<option value="${c._id}">${escapeHtml(c.title)}</option>`).join('');
                html += `<select name="${field.name}" id="modal-product-category-select" class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700">
                    <option value="">— Select a Category —</option>
                    ${opts}
                </select>`;
            } else if (field.type === 'subcategory_select') {
                html += `<select name="${field.name}" id="modal-product-subcategory-select" class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700" disabled>
                    <option value="">— Select a Category first —</option>
                </select>`;
            } else {
                html += `<input type="${field.type}" name="${field.name}" ${reqAttr} ${stepAttr} class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700" placeholder="${field.placeholder || ''}">`;
            }

            html += `</div>`;
        });

        container.innerHTML = html;

        // Setup dynamic categories connection in the popup modal
        if (type === 'product') {
            setTimeout(() => {
                const catSelect = document.getElementById('modal-product-category-select');
                if (catSelect) {
                    catSelect.addEventListener('change', (e) => {
                        const catId = e.target.value;
                        const subSelect = document.getElementById('modal-product-subcategory-select');
                        if (!subSelect) return;
                        
                        if (!catId) {
                            subSelect.innerHTML = '<option value="">— Select a Category first —</option>';
                            subSelect.disabled = true;
                            return;
                        }
                        
                        const selectedCat = (window.cachedCategories || []).find(c => c._id === catId);
                        const subs = selectedCat?.subCategories || [];
                        
                        if (subs.length === 0) {
                            subSelect.innerHTML = '<option value="">— No sub-categories available —</option>';
                            subSelect.disabled = false;
                        } else {
                            subSelect.innerHTML = '<option value="">— Select a Sub-Category —</option>' +
                                subs.map(s => `<option value="${s}">${escapeHtml(s)}</option>`).join('');
                            subSelect.disabled = false;
                        }
                    });
                }
            }, 50);
        }
    }

    function showAlert(msg, type) {
        const alertBox = document.getElementById('form-alert');
        if (!msg) {
            alertBox.classList.add('hidden');
            return;
        }
        alertBox.className = `rounded-md p-3 text-[10px] font-semibold flex items-center gap-2 animate-pulse ${type === 'success' ? 'bg-green-500/10 text-success border border-green-500/20' : 'bg-rose-500/10 text-rose-500 border border-rose-500/20'
            }`;
        alertBox.innerHTML = `
            <i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark'}"></i>
            <span>${msg}</span>
        `;
        alertBox.classList.remove('hidden');
    }

    async function submitDynamicForm(event) {
        event.preventDefault();
        const form = event.target;
        const docType = document.getElementById('dynamic-doc-type').value;
        const token = document.getElementById('admin-secret-token').value;

        const submitBtn = form.querySelector('button[type="submit"]');
        const originalHTML = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-[10px]"></i> Saving to database...';

        const formData = new FormData(form);
        const payload = {};

        formData.forEach((value, key) => {
            if (key === '_type') return;

            const schemaDef = FIELD_SCHEMAS[docType].find(f => f.name === key);
            if (schemaDef) {
                if (schemaDef.type === 'number') {
                    payload[key] = parseFloat(value);
                } else if (schemaDef.name === 'availability') {
                    payload[key] = value === 'true';
                } else if (schemaDef.name === 'keywords' || schemaDef.name === 'subCategories') {
                    payload[key] = value.split(',').map(k => k.trim()).filter(Boolean);
                } else if (schemaDef.type === 'category_select') {
                    payload[key] = value ? { _type: 'reference', _ref: value } : null;
                } else {
                    payload[key] = value;
                }
            } else {
                payload[key] = value;
            }
        });

        try {
            const res = await fetch(`/api/admin/collection/${docType}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-Token': token
                },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.detail || 'Failed to submit knowledge.');
            }

            showAlert('Knowledge added successfully!', 'success');
            form.reset();
            setTimeout(() => {
                closeFormModal();
                refreshAdminDashboard();
            }, 1000);
        } catch (err) {
            showAlert(err.message, 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalHTML;
        }
    }

    // Global Table Pagination States
    let currentPage = 1;
    const pageSize = 5;
    let totalDocuments = 0;

    async function refreshAdminDashboard() {
        GlobalLoader.start();
        renderTableSkeleton();
        renderHeaderStatsSkeleton();
        renderSidebarMenu();
        renderTableHeaders(activeFilter);
        clearBulkSelection && clearBulkSelection();

        try {
            try {
                const catRes = await fetch(getAdminApiUrl(`documents?collection=category&page=1&limit=100`));
                if (catRes.ok) {
                    const catData = await catRes.json();
                    window.cachedCategories = catData.documents || [];
                }
            } catch(e) {
                console.error('Failed to pre-cache categories:', e);
            }

            const docsRes = await fetch(getAdminApiUrl(`documents?collection=${activeFilter}&page=${currentPage}&limit=${pageSize}`));
            if (!docsRes.ok) throw new Error('Unreachable or unauthorized.');

            const data = await docsRes.json();
            loadedDocuments = data.documents || [];
            totalDocuments = data.total || 0;

            renderHeaderStats(totalDocuments);
            renderDocuments();
            renderPagination();
            GlobalLoader.done();
        } catch (err) {
            GlobalLoader.fail();
            showToast('Failed to load data. Check backend connection.', 'error');
            console.error('[Admin Panel] Refresh error:', err);
            const schema = TABLE_SCHEMAS[activeFilter] || [];
            const colCount = schema.length + 3;
            const list = document.getElementById('knowledge-feed-list');
            list.innerHTML = `<tr><td colspan="${colCount}" class="text-center py-12 text-rose-500 font-bold"><i class="fa-solid fa-triangle-exclamation text-lg mb-2"></i><p class="text-[10px]">Verify backend connection or Sanity client token.</p></td></tr>`;
        }
    }

    function renderHeaderStats(activeCount) {
        const container = document.getElementById('header-stats-container');
        if (!container) return;
        const meta = COLLECTION_META[activeFilter] || { label: activeFilter };
        container.innerHTML = `
            <div class="border-l border-slate-200/80 pl-4">
                <div class="flex items-baseline gap-1">
                    <span class="text-xl font-extrabold text-slate-800">${activeCount}</span>
                    <span class="text-[10px] text-slate-400 font-semibold">Active</span>
                </div>
                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">${meta.label}</span>
            </div>
        `;
    }

    function renderSidebarMenu() {
        const nav = document.getElementById('sidebar-menu-nav');
        if (!nav) return;

        let allowedCollections = [];
        let roleActionPerms = null;
        try {
            const session = JSON.parse(localStorage.getItem('getmeds_admin_session') || '{}');
            allowedCollections = session.allowedCollections || [];
            roleActionPerms = session.roleActionPerms || null;
            // Security Officer — no content collections
            if (session.role === 'Security Officer') allowedCollections = [];
        } catch(e) {}

        let html = ``;
        Object.keys(COLLECTION_META).forEach(key => {
            // RBAC Enforcement: Hide collection if role doesn't have at least read access
            if (allowedCollections.length > 0 && !allowedCollections.includes(key)) return;

            const meta = COLLECTION_META[key];
            const isActive = activeFilter === key;

            html += `
                <a href="javascript:void(0)" onclick="setActiveFilter('${key}')" class="flex items-center justify-between px-3 py-2 rounded-md text-xs font-semibold ${
                    isActive
                        ? 'bg-slate-50 border-r-4 border-slate-900 text-slate-900'
                        : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                } transition duration-200">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid ${meta.icon} text-sm"></i>
                        <span>${meta.label}</span>
                    </div>
                </a>
            `;
        });
        nav.innerHTML = html;

        // Apply action-level enforcement for current collection
        if (roleActionPerms) {
            applyActionControlEnforcement(roleActionPerms);
        }
    }

    function setActiveFilter(filterKey) {
        activeFilter = filterKey;
        currentPage = 1;

        // ── Panel visibility: always guarantee the correct panel is shown ──
        // If the security panel is currently open, close it and show the DB hub.
        const secPanel = document.getElementById('security-control-panel');
        const hubPanel = document.getElementById('database-hub-panel');
        const secBtn   = document.getElementById('sidebar-security-btn');
        if (secPanel && !secPanel.classList.contains('hidden')) {
            secPanel.classList.add('hidden');
        }
        if (hubPanel && hubPanel.classList.contains('hidden')) {
            hubPanel.classList.remove('hidden');
        }
        if (secBtn) {
            secBtn.classList.remove('text-slate-900', 'bg-slate-50', 'border-r-4', 'border-slate-900');
            secBtn.classList.add('text-slate-500');
        }

        // ── Update breadcrumbs and page title ──
        const meta = COLLECTION_META[filterKey];
        const titleLabel = meta ? meta.label : 'Products';
        document.getElementById('breadcrumb-filter-name').innerText = titleLabel;
        document.getElementById('table-active-title').innerText = titleLabel;
        document.getElementById('header-hub-title').innerText = meta ? `GetMEDS - ${meta.label}` : 'GetMEDS Active Hub';

        syncUrlToState();
        refreshAdminDashboard();

        // Apply action-level RBAC enforcement for new collection
        try {
            const session = JSON.parse(localStorage.getItem('getmeds_admin_session') || '{}');
            if (session.roleActionPerms) applyActionControlEnforcement(session.roleActionPerms);
        } catch(e) {}
    }

    function renderTableHeaders(collection) {
        const thead = document.getElementById('table-header-row');
        if (!thead) return;
        const schema = TABLE_SCHEMAS[collection] || [];
        const cols = schema.map(c => `<th class="px-6 py-4">${c.label}</th>`).join('');
        thead.innerHTML = `<tr class="bg-slate-50/50 text-[10px] font-bold text-slate-400 uppercase border-b border-slate-100"><th class="px-6 py-4 w-12"><input type="checkbox" id="select-all-checkbox" class="rounded border-slate-300" onchange="toggleSelectAll(this.checked)"></th><th class="px-6 py-4">ID</th>${cols}<th class="px-6 py-4 w-12"></th></tr>`;
    }

    function renderDocRow(doc) {
        const schema = TABLE_SCHEMAS[activeFilter] || [];
        const cells = schema.map(col => {
            const val = doc[col.key];
            let display;
            if (col.type === 'price') {
                display = (val != null) ? `<span class="font-extrabold text-slate-800">₱${Number(val).toLocaleString()}</span>` : '<span class="text-slate-300">—</span>';
            } else if (col.type === 'availability') {
                display = val === true
                    ? '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-green-50 text-green-600 border-green-100">In Stock</span>'
                    : '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-rose-50 text-rose-500 border-rose-100">Out of Stock</span>';
            } else if (col.type === 'keywords') {
                const kw = Array.isArray(val) ? val.join(', ') : (val ?? '—');
                display = `<span class="text-slate-500">${escapeHtml(kw)}</span>`;
            } else {

    function changePage(page) {
        if (page < 1 || page > Math.ceil(totalDocuments / pageSize)) return;
        currentPage = page;
        syncUrlToState();
        refreshAdminDashboard();
    }

    function renderPagination() {
        const infoSpan = document.getElementById('pagination-info');
        const pagesDiv = document.getElementById('pagination-pages');
        if (!infoSpan || !pagesDiv) return;

        if (totalDocuments === 0) {
            infoSpan.innerText = "Showing 0 to 0 of 0 entries";
            pagesDiv.innerHTML = "";
            return;
        }

        const startIdx = (currentPage - 1) * pageSize + 1;
        const endIdx = Math.min(currentPage * pageSize, totalDocuments);
        infoSpan.innerText = `Showing ${startIdx} to ${endIdx} of ${totalDocuments} entries`;

        const totalPages = Math.ceil(totalDocuments / pageSize);
        let html = ``;

        // Prev Button
        const prevDisabled = currentPage === 1;
        html += `
            <button onclick="changePage(${currentPage - 1})" ${prevDisabled ? 'disabled' : ''} class="px-2.5 py-1.5 rounded-lg border border-slate-200 text-[10px] font-extrabold ${prevDisabled ? 'text-slate-300 bg-slate-50/50 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 transition'}">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
        `;

        // Page numbers
        for (let i = 1; i <= totalPages; i++) {
            const isActive = currentPage === i;
            html += `
                <button onclick="changePage(${i})" class="w-8 h-8 flex items-center justify-center rounded-lg text-[10px] font-extrabold transition border ${isActive
                    ? 'bg-gradient-to-tr from-[#0D99FF] to-indigo-600 border-indigo-600 text-white shadow-md shadow-[#0D99FF]/10'
                    : 'border-slate-200 text-slate-600 hover:bg-slate-50'
                }">
                    ${i}
                </button>
            `;
        }

        // Next Button
        const nextDisabled = currentPage === totalPages;
        html += `
            <button onclick="changePage(${currentPage + 1})" ${nextDisabled ? 'disabled' : ''} class="px-2.5 py-1.5 rounded-lg border border-slate-200 text-[10px] font-extrabold ${nextDisabled ? 'text-slate-300 bg-slate-50/50 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 transition'}">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        `;

        pagesDiv.innerHTML = html;
    }

    async function deleteKnowledgeDocument(docId, btn) {
        if (!await customConfirm({
            title: 'Delete Document',
            message: 'Are you sure you want to delete this document? This action cannot be undone.',
            confirmText: 'Yes, Delete'
        })) return;
        if (btn) setBtn(btn, true, '<i class="fa-solid fa-spinner fa-spin text-xs text-rose-500"></i>');
        GlobalLoader.start();

        try {
            const res = await fetch(getAdminApiUrl(`document/${docId}`), {
                method: 'DELETE'
            });

            if (!res.ok) throw new Error('Could not delete document.');
            GlobalLoader.done();
            showToast('Document deleted successfully.', 'success');
            refreshAdminDashboard();
            if (btn) setBtn(btn, false);
        } catch (err) {
            GlobalLoader.fail();
            showToast(err.message, 'error');
            if (btn) setBtn(btn, false);
        }
    }

    async function refreshSecurityDashboard() {
        const token = document.getElementById('admin-secret-token').value;
        try {
            if (activeSecurityTab === 'users') {
                renderSecurityUsersSkeleton();
                const usersRes = await fetch('/api/admin/security/users', { headers: { 'X-Admin-Token': token } });
                if (usersRes.ok) {
                    loadedSecurityUsers = await usersRes.json();
                    renderSecurityUsers();
                    updateSecurityStats();
                    setSupabaseBadgeActive();
                } else {
                    const errText = await usersRes.text();
                    throw new Error(errText || `Server returned status ${usersRes.status}`);
                }
            } else if (activeSecurityTab === 'policies') {
                const container = document.getElementById('rbac-role-panel-container');
                if (container) container.innerHTML = '<div class="text-center py-12 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>';
                const accessRes = await fetch('/api/admin/security/role-permissions', { headers: { 'X-Admin-Token': token } });
                if (accessRes.ok) {
                    const data = await accessRes.json();
                    renderRbacMatrix(data);
                    setSupabaseBadgeActive();
                } else {
                    const errText = await accessRes.text();
                    throw new Error(errText || `Server returned status ${accessRes.status}`);
                }
            } else if (activeSecurityTab === 'logs') {
                renderSecurityLogsSkeleton();
                const logsRes = await fetch(`/api/admin/security/logs?page=${currentSecurityPage}&limit=${securityPageSize}`, { headers: { 'X-Admin-Token': token } });
                if (logsRes.ok) {
                    const data = await logsRes.json();
                    loadedSecurityLogs = data.logs || [];
                    totalSecurityLogs = data.total || 0;
                    renderSecurityLogs();
                    renderSecurityLogsPagination();
                    setSupabaseBadgeActive();
                } else {
                    const errText = await logsRes.text();
                    throw new Error(errText || `Server returned status ${logsRes.status}`);
                }
            }
        } catch (err) {
            console.error('Failed to load security dashboard:', err);
            setSupabaseBadgeError(err.message || err);
            
            // Render nice error states in the DOM container
            if (activeSecurityTab === 'users') {
                renderSecurityUsersError(err.message || err);
            } else if (activeSecurityTab === 'policies') {
                renderRbacMatrixError(err.message || err);
            } else if (activeSecurityTab === 'logs') {
                renderSecurityLogsError(err.message || err);
            }
        }
    }

    // ============================================================
    //  ACTION CONTROL — ROLE-BASED PERMISSION MATRIX
    //  Format: { role: { collection: ['read','create','edit','delete'] } }
    // ============================================================

    const RBAC_ACTIONS = ['read', 'create', 'edit', 'delete'];
    const RBAC_ACTION_LABELS = { read: 'Read', create: 'Create', edit: 'Edit', delete: 'Delete' };
    const RBAC_ACTION_COLORS = { read: 'text-sky-600', create: 'text-emerald-600', edit: 'text-amber-600', delete: 'text-rose-600' };

    let currentRbacData = null;
    let activeRbacRole = null;
    // localRbacPerms: { role: { collection: { read:bool, create:bool, edit:bool, delete:bool } } }
    let localRbacPerms = {};
    // localRbacRoles: string[] — tracks all roles including newly added ones
    let localRbacRoles = [];

    function renderRbacMatrix(data) {
        currentRbacData = data;
        const roles = data.roles || [];
        // data.permissions new format: { role: { collection: [actions] } }
        // Also support legacy format: { collection: [roles] }
        const rawPerms = data.permissions || {};

        // Detect legacy format: if any value is an array of strings (not objects), it's legacy
        const isLegacy = Object.values(rawPerms).some(v => Array.isArray(v));

        localRbacRoles = [...roles];
        localRbacPerms = {};

        const allPermKeys = [...Object.keys(COLLECTION_META), ...Object.keys(SYSTEM_SECTION_META)];

        if (isLegacy) {
            // Migrate: legacy { collection: [roles_with_write_access] } → new format
            // Give legacy write-roles: read+create+edit+delete; others: read only
            roles.forEach(role => {
                localRbacPerms[role] = {};
                allPermKeys.forEach(col => {
                    const hasWrite = (rawPerms[col] || []).includes(role);
                    // For _security in legacy, only give to roles that previously had write access
                    localRbacPerms[role][col] = {
                        read: true,
                        create: hasWrite,
                        edit: hasWrite,
                        delete: hasWrite
                    };
                });
            });
        } else {
            roles.forEach(role => {
                localRbacPerms[role] = {};
                allPermKeys.forEach(col => {
                    const actions = (rawPerms[role] || {})[col] || [];
                    localRbacPerms[role][col] = {
                        read: actions.includes('read'),
                        create: actions.includes('create'),
                        edit: actions.includes('edit'),
                        delete: actions.includes('delete')
                    };
                });
            });
        }

        // Set default active role
        if (!activeRbacRole || !localRbacRoles.includes(activeRbacRole)) {
            activeRbacRole = localRbacRoles[0] || null;
        }

        renderRbacRoleTabs();
        renderRbacRolePanel();
    }

    function onRbacCheckboxChange(cb) {
        const role = cb.getAttribute('data-role');
        const col = cb.getAttribute('data-collection');
        const action = cb.getAttribute('data-action');
        if (!localRbacPerms[role]) localRbacPerms[role] = {};
        if (!localRbacPerms[role][col]) localRbacPerms[role][col] = { read: false, create: false, edit: false, delete: false };
        localRbacPerms[role][col][action] = cb.checked;

        // If any write action is checked, auto-check read
        if ((action === 'create' || action === 'edit' || action === 'delete') && cb.checked) {
            localRbacPerms[role][col]['read'] = true;
            const readCb = document.querySelector(`input[data-role="${CSS.escape(role)}"][data-collection="${col}"][data-action="read"]`);
            if (readCb) readCb.checked = true;
        }
    }

    function confirmAddRole() {
        const input = document.getElementById('new-role-name-input');
        const name = input.value.trim();
        if (!name) { showToast('Role name is required.', 'error'); return; }
        if (localRbacRoles.includes(name)) { showToast('Role already exists.', 'error'); return; }

        localRbacRoles.push(name);
        localRbacPerms[name] = {};
        [...Object.keys(COLLECTION_META), ...Object.keys(SYSTEM_SECTION_META)].forEach(col => {
            localRbacPerms[name][col] = { read: false, create: false, edit: false, delete: false };

    function deleteRbacRole(role) {
        if (!confirm(`Delete role "${role}"? All its permissions will be removed.`)) return;
        localRbacRoles = localRbacRoles.filter(r => r !== role);
        delete localRbacPerms[role];
        if (activeRbacRole === role) activeRbacRole = localRbacRoles[0] || null;
        renderRbacRoleTabs();
        renderRbacRolePanel();
        showToast(`Role "${role}" removed. Save to persist.`, 'success');
    }

    async function saveRbacMatrix() {
        const token = document.getElementById('admin-secret-token').value;
        const btn = document.getElementById('rbac-save-btn');

        // Build new-format permissions: { role: { collection: [actions] } }
        const newPerms = {};
        const allPermKeys = [...Object.keys(COLLECTION_META), ...Object.keys(SYSTEM_SECTION_META)];
        localRbacRoles.forEach(role => {
            newPerms[role] = {};
            allPermKeys.forEach(col => {
                const p = (localRbacPerms[role] || {})[col] || {};
                const actions = RBAC_ACTIONS.filter(a => p[a]);
                newPerms[role][col] = actions;
            });
        });

        const prevHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/admin/security/role-permissions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
                body: JSON.stringify({ permissions: newPerms, format: 'v2' })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Failed to save permissions');

            showToast('Action control permissions saved.', 'success');

            // Update session's allowed collections and re-render sidebar
            const session = JSON.parse(localStorage.getItem('getmeds_admin_session') || '{}');
            if (session.role) {
                const rolePerms = newPerms[session.role] || {};
                // A collection is "accessible" if the role has at least read
                const allowed = Object.keys(rolePerms).filter(col => (rolePerms[col] || []).includes('read'));
                session.allowedCollections = allowed;
                session.roleActionPerms = rolePerms;
                localStorage.setItem('getmeds_admin_session', JSON.stringify(session));
                renderSidebarMenu();
                applyActionControlEnforcement(rolePerms);
            }
        } catch (err) {
            showToast(err.message, 'error');
        } finally {
            btn.innerHTML = prevHtml;
            btn.disabled = false;
        }
    }

    // Enforce action-level controls in the UI (hide/disable buttons user can't use)
    function applyActionControlEnforcement(rolePerms) {
        // rolePerms: { collection: ['read','create','edit','delete'] }
        if (!rolePerms) return;

        // ── Security panel sidebar button ──
        const secBtn = document.getElementById('sidebar-security-btn');
        if (secBtn) {
            const secActions = rolePerms['_security'] || [];
            if (secActions.includes('read')) {
                secBtn.classList.remove('hidden');
            } else {
                secBtn.classList.add('hidden');
                // If currently on security panel, bounce back to DB hub
                const secPanel = document.getElementById('security-control-panel');
                if (secPanel && !secPanel.classList.contains('hidden')) {
                    hideSecurityControlPanel();
                }
            }
        }

        // ── Collection-level action enforcement ──
        const col = activeFilter;
        if (col === 'security') return;
        const actions = rolePerms[col] || [];

        // Create button
        const createBtn = document.getElementById('create-doc-btn');
        if (createBtn) {
            if (actions.includes('create')) {
                createBtn.classList.remove('hidden', 'opacity-50', 'pointer-events-none');
            } else {
                createBtn.classList.add('hidden');
            }
        }

        // Edit/Delete buttons inside table rows — controlled via CSS class on tbody
        const tbody = document.getElementById('documents-table-body');
        if (tbody) {
            if (!actions.includes('edit')) tbody.classList.add('rbac-no-edit');
            else tbody.classList.remove('rbac-no-edit');
            if (!actions.includes('delete')) tbody.classList.add('rbac-no-delete');
            else tbody.classList.remove('rbac-no-delete');
        }
    }

    function changeSecurityPage(page) {
        if (page < 1 || page > Math.ceil(totalSecurityLogs / securityPageSize)) return;

    function renderSecurityLogsPagination() {
        const infoSpan = document.getElementById('sec-pagination-info');
        const pagesDiv = document.getElementById('sec-pagination-pages');
        if (!infoSpan || !pagesDiv) return;

        if (totalSecurityLogs === 0) {
            infoSpan.innerText = "Showing 0 to 0 of 0 entries";
            pagesDiv.innerHTML = "";
            return;
        }

        const startIdx = (currentSecurityPage - 1) * securityPageSize + 1;
        const endIdx = Math.min(currentSecurityPage * securityPageSize, totalSecurityLogs);
        infoSpan.innerText = `Showing ${startIdx} to ${endIdx} of ${totalSecurityLogs} entries`;

        const totalPages = Math.ceil(totalSecurityLogs / securityPageSize);
        let html = ``;

        // Prev Button
        const prevDisabled = currentSecurityPage === 1;
        html += `
            <button onclick="changeSecurityPage(${currentSecurityPage - 1})" ${prevDisabled ? 'disabled' : ''} class="px-2.5 py-1.5 rounded-lg border border-slate-200 text-[10px] font-extrabold ${prevDisabled ? 'text-slate-300 bg-slate-50/50 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 transition'}">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
        `;

        // Page numbers
        for (let i = 1; i <= totalPages; i++) {
            const isActive = currentSecurityPage === i;
            html += `
                <button onclick="changeSecurityPage(${i})" class="w-8 h-8 flex items-center justify-center rounded-lg text-[10px] font-extrabold transition border ${isActive
                    ? 'bg-gradient-to-tr from-[#0D99FF] to-indigo-600 border-indigo-600 text-white shadow-md shadow-[#0D99FF]/10'
                    : 'border-slate-200 text-slate-600 hover:bg-slate-50'
                }">
                    ${i}
                </button>
            `;
        }

        // Next Button
        const nextDisabled = currentSecurityPage === totalPages;
        html += `
            <button onclick="changeSecurityPage(${currentSecurityPage + 1})" ${nextDisabled ? 'disabled' : ''} class="px-2.5 py-1.5 rounded-lg border border-slate-200 text-[10px] font-extrabold ${nextDisabled ? 'text-slate-300 bg-slate-50/50 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 transition'}">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        `;

        pagesDiv.innerHTML = html;
    }

    // Intercept native fetch globally — auto-injects auth token + drives GlobalLoader
    const originalFetch = window.fetch;
    window.fetch = async function (url, options = {}) {
        const isAdminApi = typeof url === 'string' && url.startsWith('/api/admin/');

        if (isAdminApi) {
            GlobalLoader.start();
            const session = localStorage.getItem('getmeds_admin_session');
            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    if (sessionData.token) {
                        options.headers = options.headers || {};
                        options.headers['X-Admin-Token'] = sessionData.token;
                    }
                } catch (e) { }
            }
        }

        let response;
        try {
            response = await originalFetch(url, options);
        } catch (netErr) {
            if (isAdminApi) GlobalLoader.fail();
            throw netErr;
        }

        if (isAdminApi) {
            if (response.ok || response.status === 404) GlobalLoader.done();
            else GlobalLoader.fail();
        }

        // If access token is expired (401), execute transparent silent token refresh rotation
        if (response.status === 401 && !url.includes('/auth/login') && !url.includes('/auth/refresh')) {
            try {
                const refreshRes = await originalFetch('/api/admin/auth/refresh', { method: 'POST' });
                if (refreshRes.ok) {
                    const refreshData = await refreshRes.json();
                    const session = localStorage.getItem('getmeds_admin_session');
                    if (session) {
                        const sessionData = JSON.parse(session);
                        sessionData.token = refreshData.token;
                        if (refreshData.allowedCollections) {
                            sessionData.allowedCollections = refreshData.allowedCollections;
                        }
                        if (refreshData.roleActionPerms) {
                            sessionData.roleActionPerms = refreshData.roleActionPerms;
                        }
                        localStorage.setItem('getmeds_admin_session', JSON.stringify(sessionData));
                        const tokenInput = document.getElementById('admin-secret-token');
                        if (tokenInput) tokenInput.value = refreshData.token;
                        options.headers = options.headers || {};
                        options.headers['X-Admin-Token'] = refreshData.token;
                        response = await originalFetch(url, options);
                    }
                } else {
                    showToast('Session expired — please log in again.', 'warning');
                    await handleLogout();
                }
            } catch (err) {
                await handleLogout();
            }
        }
        return response;
    };

    async function handleLoginSubmit(event) {
        event.preventDefault();
        const passcode = document.getElementById('login-passcode').value;
        const alertBox = document.getElementById('login-alert-box');
        const submitBtn = document.getElementById('login-btn-submit');

        if (!passcode) {
            showLoginAlert("Please enter your secret passcode key.", "error");
            return;
        }

        setBtn(submitBtn, true, '<i class="fa-solid fa-spinner fa-spin text-xs"></i> <span>Verifying identity...</span>');
        alertBox.classList.add('hidden');
        GlobalLoader.start();

        try {
            const res = await originalFetch('/api/admin/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ passcode })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.detail || "Authentication failed.");
            }

            const sessionData = {
                username: data.username,
                role: data.role,
                permissions: data.permissions,
                allowedCollections: data.allowedCollections || [],
                roleActionPerms: data.roleActionPerms || null,
                token: data.token
            };
            localStorage.setItem('getmeds_admin_session', JSON.stringify(sessionData));
            personalizeOperatorUI(sessionData);

            showLoginAlert("Authentication successful! Loading console...", "success");
            GlobalLoader.done();

            setTimeout(() => {
                hideLoginOverlay();
                setBtn(submitBtn, false);
                refreshAdminDashboard();
            }, 900);

        } catch (err) {
            GlobalLoader.fail();
            setBtn(submitBtn, false);
            showLoginAlert(err.message, "error");
        }
    }

    function showLoginAlert(message, type) {

        }
    }

    // Initialize Authentication on load
    function initAdminAuth() {
        const session = localStorage.getItem('getmeds_admin_session');
        if (session) {
            try {

                personalizeOperatorUI(sessionData);
                hideLoginOverlay();

    // ======= URL STATE MANAGEMENT =======
    function syncUrlToState(docId = null, replace = false) {
        const params = new URLSearchParams();
        params.set('collection', activeFilter);
        if (activeFilter === 'security') {
            params.set('tab', activeSecurityTab);
            params.set('page', currentSecurityPage);
        } else {
            params.set('page', currentPage);
        }
        if (docId) params.set('doc', docId);
        const newUrl = `${window.location.pathname}?${params.toString()}`;
        
        const state = {
            collection: activeFilter,
            page: activeFilter === 'security' ? currentSecurityPage : currentPage,
            tab: activeFilter === 'security' ? activeSecurityTab : null,
            doc: docId || null
        };
        
        if (replace) {
            history.replaceState(state, '', newUrl);
        } else {
            history.pushState(state, '', newUrl);
        }
    }

    function readUrlState() {
        const params = new URLSearchParams(window.location.search);
        const collection = params.get('collection');
        const page = parseInt(params.get('page')) || 1;
        const docId = params.get('doc');
        const tab = params.get('tab');

        // Always populate the sidebar first, regardless of which panel is shown
        renderSidebarMenu();

        if (collection === 'security') {
            if (tab) activeSecurityTab = tab;
            currentSecurityPage = page;
            showSecurityControlPanel(true, tab || 'users');
            
            // If the URL did not have tab or page parameters, replaceState to keep address bar sync'd
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has('tab') || !urlParams.has('page')) {
                syncUrlToState(null, true);
            }
        } else if (collection && COLLECTION_META[collection]) {
            document.getElementById('security-control-panel').classList.add('hidden');
            document.getElementById('database-hub-panel').classList.remove('hidden');
            document.getElementById('sidebar-security-btn').classList.remove('text-slate-900', 'bg-slate-50', 'border-r-4', 'border-slate-900');
            document.getElementById('sidebar-security-btn').classList.add('text-slate-500');

            activeFilter = collection;
            currentPage = page;
            const meta = COLLECTION_META[collection];
            document.getElementById('breadcrumb-filter-name').innerText = meta.label;
            document.getElementById('table-active-title').innerText = meta.label;
            document.getElementById('header-hub-title').innerText = `GetMEDS - ${meta.label}`;
            refreshAdminDashboard();
        } else {
            refreshAdminDashboard();
        }

        if (docId) {
            setTimeout(() => openDocumentDetail(docId), 600);
        }
    }

    window.addEventListener('popstate', (event) => {
        const state = event.state;
        if (!state) return;

        if (state.collection === 'security') {
            if (state.tab) activeSecurityTab = state.tab;
            currentSecurityPage = state.page || 1;
            showSecurityControlPanel(true, state.tab || 'users');
        } else {
            document.getElementById('security-control-panel').classList.add('hidden');
            document.getElementById('database-hub-panel').classList.remove('hidden');
            document.getElementById('sidebar-security-btn').classList.remove('text-slate-900', 'bg-slate-50', 'border-r-4', 'border-slate-900');
            document.getElementById('sidebar-security-btn').classList.add('text-slate-500');

            activeFilter = state.collection || 'product';
            currentPage = state.page || 1;
            const meta = COLLECTION_META[activeFilter];
            if (meta) {
                document.getElementById('breadcrumb-filter-name').innerText = meta.label;
                document.getElementById('table-active-title').innerText = meta.label;
                document.getElementById('header-hub-title').innerText = `GetMEDS - ${meta.label}`;

                refreshAdminDashboard();
                setTimeout(() => openDocumentDetail(state.doc), 600);
            } else {
                closeDocumentDetail(true);

            }
        }
    });

    // ======= DOCUMENT DETAIL PANEL =======
    let activeDetailDocId = null;

    async function openDocumentDetail(docId) {
        activeDetailDocId = docId;
        syncUrlToState(docId);

        const panel = document.getElementById('document-detail-panel');
        const backdrop = document.getElementById('document-detail-backdrop');
        const content = document.getElementById('detail-panel-content');
        const titleEl = document.getElementById('detail-panel-title');
        const idEl = document.getElementById('detail-panel-id');
        const badgeEl = document.getElementById('detail-panel-type-badge');
        const tsEl = document.getElementById('detail-panel-timestamps');

        // Show panel
        panel.classList.remove('translate-x-full');
        backdrop.classList.remove('opacity-0', 'pointer-events-none');
        backdrop.classList.add('opacity-100');

        // Loading state
        content.innerHTML = `<div class="flex items-center justify-center py-16 text-slate-300"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>`;
        idEl.textContent = docId;
        titleEl.textContent = 'Loading...';

        try {
            const res = await fetch(getAdminApiUrl(`document/${docId}`));
            if (!res.ok) throw new Error('Failed to load document.');
            const data = await res.json();
            const doc = data.document;

            const meta = COLLECTION_META[doc._type] || { label: doc._type, badge: 'bg-slate-50 text-slate-600 border-slate-100/50' };
            const fieldDefs = FIELD_SCHEMAS[doc._type] || [];

            // Update header
            const primaryLabel = doc.name || doc.title || doc.question || doc.sessionId || doc._id;
            titleEl.textContent = primaryLabel;
            idEl.innerHTML = `<span>${doc._id}</span> <a href="/admin/document/${doc._id}" class="ml-2 text-[9px] font-bold text-blue-500 hover:text-blue-700 underline underline-offset-2 transition">Open Full Edit →</a>`;
            badgeEl.textContent = meta.label;
            badgeEl.className = `text-[9px] font-extrabold px-2.5 py-0.5 rounded-full border ${meta.badge}`;

            // Timestamps
            const created = doc._createdAt ? new Date(doc._createdAt).toLocaleString() : '—';
            const updated = doc._updatedAt ? new Date(doc._updatedAt).toLocaleString() : '—';
            tsEl.innerHTML = `<i class="fa-solid fa-clock mr-1"></i>Created: ${created}`;

            // Build field rows from FIELD_SCHEMAS definition
            let html = `<div class="flex flex-col gap-5">`;

            // Show _id at top
            html += renderDetailField('Document ID', `<span class="font-mono text-[10px] text-slate-700 break-all">${escapeHtml(doc._id)}</span>`);

            fieldDefs.forEach(field => {
                const val = doc[field.name];
                let display;
                if (val === undefined || val === null || val === '') {
                    display = `<span class="text-slate-300 italic text-xs">—</span>`;
                } else if (field.name === 'availability') {
                    display = val === true
                        ? `<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-green-50 text-green-600 border-green-100">In Stock</span>`
                        : `<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-rose-50 text-rose-500 border-rose-100">Out of Stock</span>`;
                } else if ((field.name === 'keywords' || field.name === 'subCategories') && Array.isArray(val)) {
                    display = val.map(k => `<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-slate-100 text-slate-600">${escapeHtml(k)}</span>`).join(' ');
                } else if (field.name === 'category') {
                    const catId = val?._ref || val;
                    const cat = (window.cachedCategories || []).find(c => c._id === catId);
                    display = `<span class="text-xs font-semibold text-slate-700">${escapeHtml(cat?.title || catId || '—')}</span>`;
                } else if (field.type === 'number') {
                    display = `<span class="font-extrabold text-slate-800 text-sm">₱${Number(val).toLocaleString()}</span>`;
                } else if (field.type === 'textarea') {
                    display = `<p class="text-xs text-slate-600 leading-relaxed whitespace-pre-wrap">${escapeHtml(String(val))}</p>`;
                } else {
                    display = `<span class="text-xs font-semibold text-slate-700">${escapeHtml(String(val))}</span>`;
                }
                html += renderDetailField(field.label, display);
            });

            html += `</div>`;
            content.innerHTML = html;

        } catch (err) {
            content.innerHTML = `<div class="text-center py-12 text-rose-500"><i class="fa-solid fa-triangle-exclamation text-xl mb-2"></i><p class="text-xs font-bold mt-2">${escapeHtml(err.message)}</p></div>`;
        }
    }

    function renderDetailField(label, valueHtml) {
        return `<div class="flex flex-col gap-1.5 border-b border-slate-50 pb-4">
            <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest">${escapeHtml(label)}</span>
            <div>${valueHtml}</div>
        </div>`;
    }

        if (!activeDetailDocId) return;
        if (!await customConfirm({
            title: 'Delete Document',
            message: 'Are you sure you want to delete this document? This action cannot be undone.',
            confirmText: 'Yes, Delete'
        })) return;
        const docId = activeDetailDocId;

        if (btn) setBtn(btn, true, '<i class="fa-solid fa-spinner fa-spin text-xs"></i> Deleting...');
        GlobalLoader.start();
        try {
            const res = await fetch(getAdminApiUrl(`document/${docId}`), { method: 'DELETE' });
            if (!res.ok) throw new Error('Could not delete document.');
            GlobalLoader.done();
            showToast('Document deleted successfully.', 'success');
            closeDocumentDetail();
            refreshAdminDashboard();
            if (btn) setBtn(btn, false);
        } catch (err) {
            GlobalLoader.fail();

    // Patches a single table cell in the DOM immediately — no full refresh needed
    function patchTableCell(docId, field, value, fieldDef) {
        const row = document.querySelector(`tr[data-id="${docId}"]`);
        if (!row) return;
        const schema = TABLE_SCHEMAS[activeFilter] || [];
        const colIndex = schema.findIndex(c => c.key === field);
        if (colIndex === -1) return;
        // +2 because first cell is checkbox, second is ID
        const cells = row.querySelectorAll('td');
        const targetCell = cells[colIndex + 2];
        if (!targetCell) return;

        let display = '';
        const type = fieldDef?.type;
        if (type === 'price') {
            display = value != null
                ? `<span class="font-extrabold text-slate-800">₱${Number(value).toLocaleString()}</span>`
                : '<span class="text-slate-300">—</span>';
        } else if (type === 'availability') {
            display = value === true
                ? '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-green-50 text-green-600 border-green-100">In Stock</span>'
                : '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-rose-50 text-rose-500 border-rose-100">Out of Stock</span>';
        } else {
            const txt = String(value ?? '—');
            display = fieldDef?.truncate
                ? `<span class="block truncate max-w-[200px] text-slate-500">${escapeHtml(txt)}</span>`
                : `<span class="font-semibold text-slate-700">${escapeHtml(txt)}</span>`;
        }
        targetCell.innerHTML = display;
        // Flash the cell green briefly to signal the update
        targetCell.style.transition = 'background 0.2s';
        targetCell.style.background = '#dcfce7';
        setTimeout(() => { targetCell.style.background = ''; }, 800);
    }

    async function executeBulkEdit() {
        const field = document.getElementById('bulk-edit-field').value;
        const valEl = document.getElementById('bulk-edit-value');
        if (!field || !valEl || !valEl.value.toString().trim()) {
            showToast('Select a field and enter a value.', 'warning'); return;
        }

        let value = valEl.value;
        const fieldDef = (TABLE_SCHEMAS[activeFilter] || []).find(f => f.key === field);
        if (fieldDef?.type === 'availability') value = value === 'true';
        else if (fieldDef?.type === 'price') value = parseFloat(value);

        const ids = [...selectedIds];
        const total = ids.length;

        // Switch modal to progress view
        document.getElementById('bulk-edit-form-section').classList.add('hidden');
        document.getElementById('bulk-edit-progress-section').classList.remove('hidden');
        document.getElementById('bulk-edit-progress-section').classList.add('flex');
        document.getElementById('bulk-edit-apply-btn').disabled = true;
        document.getElementById('bulk-edit-apply-btn').innerHTML = '<i class="fa-solid fa-spinner fa-spin text-[10px]"></i> Running...';
        document.getElementById('bulk-edit-cancel-btn').disabled = true;

        const log = document.getElementById('bulk-edit-log');
        const progressBar = document.getElementById('bulk-progress-bar');
        const progressLabel = document.getElementById('bulk-progress-label');
        const progressFraction = document.getElementById('bulk-progress-fraction');

        // Pre-populate all rows as "pending"
        const logRows = {};
        ids.forEach(id => {
            const el = document.createElement('div');
            el.id = `blog-${id}`;
            el.className = 'flex items-center gap-2.5 py-2 border-b border-slate-50 last:border-0';
            el.innerHTML = `
                <div id="blog-icon-${id}" class="w-5 h-5 rounded-full bg-slate-100 flex items-center justify-center shrink-0">
                    <i class="fa-solid fa-clock text-[8px] text-slate-400"></i>
                </div>
                <span class="font-mono text-[10px] text-slate-500 flex-1 truncate">${escapeHtml(id)}</span>
                <span id="blog-status-${id}" class="text-[9px] font-bold text-slate-400">Pending</span>`;
            log.appendChild(el);
            logRows[id] = el;
        });

        let done = 0, failed = 0;

        for (let i = 0; i < ids.length; i++) {
            const id = ids[i];

            // Mark as "applying"
            document.getElementById(`blog-icon-${id}`).innerHTML =
                '<i class="fa-solid fa-spinner fa-spin text-[8px] text-blue-500"></i>';
            document.getElementById(`blog-icon-${id}`).className =
                'w-5 h-5 rounded-full bg-blue-50 flex items-center justify-center shrink-0';
            document.getElementById(`blog-status-${id}`).textContent = 'Applying...';
            document.getElementById(`blog-status-${id}`).className = 'text-[9px] font-bold text-blue-500';

            // Scroll log to bottom so current item is always visible
            log.scrollTop = log.scrollHeight;

            // Update header label
            progressLabel.textContent = `Applying to ${id}`;
            progressFraction.textContent = `${i + 1} / ${total}`;
            progressBar.style.width = `${Math.round(((i) / total) * 100)}%`;

            try {
                const res = await fetch(getAdminApiUrl(`document/${id}`), {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [field]: value })
                });

                if (res.ok) {
                    done++;
                    document.getElementById(`blog-icon-${id}`).innerHTML =
                        '<i class="fa-solid fa-check text-[8px] text-green-600"></i>';
                    document.getElementById(`blog-icon-${id}`).className =
                        'w-5 h-5 rounded-full bg-green-100 flex items-center justify-center shrink-0';
                    document.getElementById(`blog-status-${id}`).textContent = 'Updated';
                    document.getElementById(`blog-status-${id}`).className = 'text-[9px] font-bold text-green-600';
                    // Immediately patch the table row cell — no full refresh needed
                    patchTableCell(id, field, value, fieldDef);
                } else {
                    throw new Error('API error');
                }
            } catch(e) {
                failed++;
                document.getElementById(`blog-icon-${id}`).innerHTML =
                    '<i class="fa-solid fa-xmark text-[8px] text-rose-500"></i>';
                document.getElementById(`blog-icon-${id}`).className =
                    'w-5 h-5 rounded-full bg-rose-100 flex items-center justify-center shrink-0';
                document.getElementById(`blog-status-${id}`).textContent = 'Failed';
                document.getElementById(`blog-status-${id}`).className = 'text-[9px] font-bold text-rose-500';
            }
        }

        // Final state
        progressBar.style.width = '100%';
        progressBar.className = failed === 0
            ? 'h-1.5 rounded-full bg-gradient-to-r from-green-400 to-emerald-500 transition-all duration-300'
            : 'h-1.5 rounded-full bg-gradient-to-r from-amber-400 to-orange-500 transition-all duration-300';
        progressLabel.textContent = failed === 0 ? `All ${done} documents updated!` : `${done} updated, ${failed} failed`;
        progressFraction.textContent = `${done} / ${total}`;

        document.getElementById('bulk-edit-apply-btn').innerHTML =
            `<i class="fa-solid fa-check text-[10px]"></i> Done`;
        document.getElementById('bulk-edit-apply-btn').disabled = false;
        document.getElementById('bulk-edit-apply-btn').onclick = () => {
            closeBulkEditModal();
            clearBulkSelection();
            document.getElementById('bulk-edit-apply-btn').onclick = executeBulkEdit;
        };
        document.getElementById('bulk-edit-cancel-btn').disabled = false;
        document.getElementById('bulk-edit-cancel-btn').textContent = 'Close';

        if (failed > 0) showToast(`${done} updated, ${failed} failed.`, 'warning');
        else showToast(`${done} document(s) updated successfully!`, 'success');
    }

        document.getElementById('import-collection-label').textContent = meta.label;
        const fields = IMPORT_FIELD_SCHEMAS[activeFilter] || [];
        document.getElementById('import-field-chips').innerHTML = fields.map(f =>
            `<span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 border border-slate-200 font-mono">${f}</span>`
        ).join('');
        const m = document.getElementById('import-modal');
        m.classList.remove('hidden'); m.classList.add('flex');
    }
    function closeImportModal() {
        const m = document.getElementById('import-modal');
        m.classList.add('hidden'); m.classList.remove('flex');
    }
    function handleImportDrop(e) {
        e.preventDefault();
        document.getElementById('import-drop-zone').classList.remove('border-blue-400','bg-blue-50/40');
        const file = e.dataTransfer.files[0];
        if (file) processImportFile(file);
    }
    function handleImportFileSelect(e) {
        const file = e.target.files[0];
        if (file) processImportFile(file);
    }

    async function processImportFile(file) {
        importFileObject = file;
        document.getElementById('import-file-info').innerHTML =
            `<i class="fa-solid fa-file text-blue-400 text-sm"></i><span class="text-[10px] font-semibold text-slate-600">${escapeHtml(file.name)} (${(file.size/1024).toFixed(1)} KB)</span>`;

        const ext = file.name.split('.').pop().toLowerCase();
        let rows = [];
        try {
            if (ext === 'json') {
                const text = await file.text();
                const parsed = JSON.parse(text);
                rows = Array.isArray(parsed) ? parsed : [parsed];
            } else if (ext === 'csv') {
                const text = await file.text();
                const lines = text.split('\n').filter(l => l.trim());
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                rows = lines.slice(1).map(line => {
                    const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                    return Object.fromEntries(headers.map((h,i) => [h, vals[i] ?? '']));
                });
            } else if (ext === 'xlsx' || ext === 'xls') {
                // For XLSX, we show "ready to upload" — backend parses it
                rows = [{ note: 'XLSX preview not available in browser — backend will parse on import.' }];
            }
        } catch(e) {
            alert('Could not parse file: ' + e.message); return;
        }
        importParsedRows = rows;
        showImportPreview(rows, ext === 'xlsx' || ext === 'xls');
    }

    function showImportPreview(rows, isXlsx) {
        document.getElementById('import-step-upload').classList.add('hidden');
        document.getElementById('import-step-preview').classList.remove('hidden');
        document.getElementById('import-step-preview').classList.add('flex');
        document.getElementById('import-total-rows').textContent = `${rows.length} rows detected`;
        if (isXlsx) {
            document.getElementById('import-preview-thead').innerHTML = '<tr><th class="px-4 py-2">Note</th></tr>';
            document.getElementById('import-preview-tbody').innerHTML = '<tr><td class="px-4 py-2 text-xs text-slate-600">XLSX file ready — click Import to process via backend.</td></tr>';
        } else {
            const previewRows = rows.slice(0, 5);
            const headers = previewRows.length > 0 ? Object.keys(previewRows[0]) : [];
            document.getElementById('import-preview-thead').innerHTML = `<tr>${headers.map(h => `<th class="px-4 py-2">${escapeHtml(h)}</th>`).join('')}</tr>`;
            document.getElementById('import-preview-tbody').innerHTML = previewRows.map(row =>
                `<tr class="hover:bg-slate-50">${headers.map(h => `<td class="px-4 py-2 max-w-[120px] truncate">${escapeHtml(String(row[h] ?? ''))}</td>`).join('')}</tr>`
            ).join('');
        }
        document.getElementById('import-action-btn').disabled = false;
        document.getElementById('import-btn-label').textContent = `Import ${importParsedRows.length} Records`;
    }

    async function executeImport() {
        if (!importFileObject) return;
        const token = document.getElementById('admin-secret-token')?.value || 'getmeds-admin-secret-key';
        const btn = document.getElementById('import-action-btn');
        btn.disabled = true;
        document.getElementById('import-btn-label').textContent = 'Importing...';
        const formData = new FormData();
        formData.append('file', importFileObject);
        try {
            const res = await fetch(getAdminApiUrl(`bulk/import/${activeFilter}`), {
                method: 'POST',
                headers: { 'X-Admin-Token': token },
                body: formData
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail);
            showImportResult(data);
        } catch(e) {
            showImportResult(null, e.message);
        }
    }

    function showImportResult(data, error) {
        document.getElementById('import-step-preview').classList.add('hidden');
        document.getElementById('import-step-preview').classList.remove('flex');
        const step = document.getElementById('import-step-result');
        step.classList.remove('hidden'); step.classList.add('flex');
        if (error) {
            document.getElementById('import-result-icon').innerHTML = '<i class="fa-solid fa-xmark text-3xl text-rose-500"></i>';
            document.getElementById('import-result-icon').className = 'w-16 h-16 rounded-2xl bg-rose-100 flex items-center justify-center';
            document.getElementById('import-result-title').textContent = 'Import Failed';
            document.getElementById('import-result-body').textContent = error;
        } else {
            document.getElementById('import-result-icon').innerHTML = '<i class="fa-solid fa-check text-3xl text-green-500"></i>';
            document.getElementById('import-result-icon').className = 'w-16 h-16 rounded-2xl bg-green-100 flex items-center justify-center';
            document.getElementById('import-result-title').textContent = `${data.imported} of ${data.total} records imported!`;
            document.getElementById('import-result-body').textContent = data.failed > 0 ? `${data.failed} rows had errors.` : 'All records created successfully.';
            if (data.errors && data.errors.length > 0) {
                document.getElementById('import-errors-box').classList.remove('hidden');
                document.getElementById('import-errors-list').innerHTML = data.errors.map(e =>
                    `<p class="text-[10px] text-rose-600 font-mono">Row ${e.row}: ${escapeHtml(e.error)}</p>`
                ).join('');
            }
            document.getElementById('import-action-btn').innerHTML = '<i class="fa-solid fa-rotate-right text-[10px]"></i> <span>Done</span>';
            document.getElementById('import-action-btn').disabled = false;
            document.getElementById('import-action-btn').onclick = () => { closeImportModal(); refreshAdminDashboard(); };
        }
    }

    function downloadTemplate() {
        const fields = IMPORT_FIELD_SCHEMAS[activeFilter] || [];
        const csv = fields.join(',') + '\n';
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${activeFilter}_template.csv`;
        a.click();
    }

    // Run Auth Check
    initAdminAuth();

    // Read URL state on load (restores collection/page/doc from URL)
    readUrlState();

</script>
