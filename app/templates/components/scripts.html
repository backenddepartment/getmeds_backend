    async function uploadAssetFile(file, progressCallback) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/admin/assets/upload', true);
            
            const session = JSON.parse(localStorage.getItem('getmeds_admin_session') || '{}');
            const token = session.token || document.getElementById('admin-secret-token')?.value || '';
            if (token) {
                xhr.setRequestHeader('X-Admin-Token', token);
            }
            xhr.setRequestHeader('Content-Type', file.type || 'image/jpeg');

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable && progressCallback) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressCallback(percent);
                }
            };

            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (data.status === 'success' && data.assetRef) {
                            resolve(data.assetRef);
                        } else {
                            reject(new Error(data.detail || 'Asset upload failed.'));
                        }
                    } catch (err) {
                        reject(err);
                    }
                } else {
                    reject(new Error(`Server error: ${xhr.status}`));
                }
            };

            xhr.onerror = () => reject(new Error('Network error.'));
            xhr.send(file);
        });
    }

    function buildSanityImageUrl(ref) {
        if (!ref) return '';
        const parts = ref.split('-');
        if (parts.length < 4) return '';
        const id = parts[1];
        const dimensions = parts[2];
        const ext = parts[3];
        const projectId = window.sanityProjectId || 's7ocz8zp';
        const dataset = window.sanityDataset || 'production';
        return `https://cdn.sanity.io/images/${projectId}/${dataset}/${id}-${dimensions}.${ext}`;
    }

    function renderDynamicFormFields(type) {
        const container = document.getElementById('dynamic-fields-container');
        document.getElementById('dynamic-doc-type').value = type;

        const fields = FIELD_SCHEMAS[type] || [];
        let html = '';

        fields.forEach(field => {
            const reqAttr = field.required ? 'required' : '';
            const stepAttr = field.step ? `step="${field.step}"` : '';

            html += `<div class="flex flex-col gap-1">
                <label class="text-[9px] font-extrabold text-slate-400 uppercase tracking-wide">${field.label}</label>`;

            if (field.type === 'textarea') {
                html += `<textarea name="${field.name}" ${reqAttr} rows="3" class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700 resize-none" placeholder="${field.placeholder || ''}"></textarea>`;
            } else if (field.type === 'select') {
                const optHtml = field.options.map(opt => `<option value="${opt.value}">${opt.label}</option>`).join('');
                html += `<select name="${field.name}" class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700">${optHtml}</select>`;
            } else if (field.type === 'category_select') {
                const opts = (window.cachedCategories || []).map(c => `<option value="${c._id}">${escapeHtml(c.title)}</option>`).join('');
                html += `<select name="${field.name}" id="modal-product-category-select" class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700">
                    <option value="">— Select a Category —</option>
                    ${opts}
                </select>`;
            } else if (field.type === 'subcategory_select') {
                html += `<select name="${field.name}" id="modal-product-subcategory-select" class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700" disabled>
                    <option value="">— Select a Category first —</option>
                </select>`;
            } else if (field.type === 'reference_select') {
                html += `<select name="${field.name}" id="modal-ref-select-${field.name}" class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700">
                    <option value="">— Loading referenced options... —</option>
                </select>`;
                setTimeout(() => {
                    const el = document.getElementById(`modal-ref-select-${field.name}`);
                    if (el) populateReferenceSelect(el, field.to, '');
                }, 50);
            } else {
                html += `<input type="${field.type}" name="${field.name}" ${reqAttr} ${stepAttr} class="border border-slate-200 focus:border-slate-400 focus:outline-none rounded-md px-3.5 py-2 text-xs bg-white text-slate-700" placeholder="${field.placeholder || ''}">`;
            }

            html += `</div>`;
        });

        container.innerHTML = html;

        // Setup dynamic categories connection in the popup modal
        if (type === 'product') {
            setTimeout(() => {
                const catSelect = document.getElementById('modal-product-category-select');
                if (catSelect) {
                    catSelect.addEventListener('change', (e) => {
                        const catId = e.target.value;
                        const subSelect = document.getElementById('modal-product-subcategory-select');
                        if (!subSelect) return;
                        
                        if (!catId) {
                            subSelect.innerHTML = '<option value="">— Select a Category first —</option>';
                            subSelect.disabled = true;
                            return;
                        }
                        
                        const selectedCat = (window.cachedCategories || []).find(c => c._id === catId);
                        const subs = selectedCat?.subCategories || [];
                        
                        if (subs.length === 0) {
                            subSelect.innerHTML = '<option value="">— No sub-categories available —</option>';
                            subSelect.disabled = false;
                        } else {
                            subSelect.innerHTML = '<option value="">— Select a Sub-Category —</option>' +
                                subs.map(s => `<option value="${s}">${escapeHtml(s)}</option>`).join('');
                            subSelect.disabled = false;
                        }
                    });
                }
            }, 50);
        }
    }

    function showAlert(msg, type) {
        const alertBox = document.getElementById('form-alert');
        if (!msg) {
            alertBox.classList.add('hidden');
            return;
        }
        alertBox.className = `rounded-md p-3 text-[10px] font-semibold flex items-center gap-2 animate-pulse ${type === 'success' ? 'bg-green-500/10 text-success border border-green-500/20' : 'bg-rose-500/10 text-rose-500 border border-rose-500/20'

        alertBox.innerHTML = `
            <i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark'}"></i>
            <span>${msg}</span>
        `;
        alertBox.classList.remove('hidden');
    }

    async function submitDynamicForm(event) {
        event.preventDefault();
        const form = event.target;
        const docType = document.getElementById('dynamic-doc-type').value;
        const token = document.getElementById('admin-secret-token').value;

        const submitBtn = form.querySelector('button[type="submit"]');
        const originalHTML = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-[10px]"></i> Saving to database...';

        const formData = new FormData(form);
        const payload = {};

        formData.forEach((value, key) => {
            if (key === '_type') return;

            const schemaDef = FIELD_SCHEMAS[docType].find(f => f.name === key);
            if (schemaDef) {
                if (schemaDef.type === 'number') {
                    payload[key] = parseFloat(value);
                } else if (schemaDef.name === 'availability') {
                    payload[key] = value === 'true';
                } else if (schemaDef.name === 'keywords' || schemaDef.name === 'subCategories') {
                    payload[key] = value.split(',').map(k => k.trim()).filter(Boolean);
                } else if (schemaDef.type === 'chip_array') {
                    try {
                        payload[key] = JSON.parse(value);
                    } catch(e) {
                        payload[key] = [];
                    }
                } else if (schemaDef.type === 'category_select') {
                    payload[key] = value ? { _type: 'reference', _ref: value } : null;
                } else {
                    payload[key] = value;
                }
            } else {
                payload[key] = value;
            }
        });

        try {
            const res = await fetch(`/api/admin/collection/${docType}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-Token': token
                },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.detail || 'Failed to submit knowledge.');
            }

            showAlert('Knowledge added successfully!', 'success');
            form.reset();
            setTimeout(() => {
                closeFormModal();
                refreshAdminDashboard();
            }, 1000);
        } catch (err) {
            showAlert(err.message, 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalHTML;
        }
    }

    async function refreshAdminDashboard() {
        const meta = COLLECTION_META[activeFilter];
        const isSingleton = meta && meta.viewType === 'singleton';

        GlobalLoader.start();
        renderSidebarMenu();

        if (isSingleton) {
            // ── Singleton Mode: Load document directly into form editor ──
            await loadSingletonEditor(activeFilter, meta);
            GlobalLoader.done();
            return;
        }

        // ── Table Mode: Standard paginated table ──
        renderTableSkeleton();
        renderHeaderStatsSkeleton();
        renderTableHeaders(activeFilter);
        clearBulkSelection && clearBulkSelection();

        // Show table UI, hide singleton editor
        const hubPanel = document.getElementById('database-hub-panel');
        const singletonEditor = document.getElementById('singleton-editor-panel');
        if (singletonEditor) singletonEditor.classList.add('hidden');
        if (hubPanel) hubPanel.classList.remove('hidden');

        try {
            try {
                const catRes = await fetch(getAdminApiUrl(`documents?collection=category&page=1&limit=100`));
                if (catRes.ok) {
                    const catData = await catRes.json();
                    window.cachedCategories = catData.documents || [];
                }
            } catch(e) {
                console.error('Failed to pre-cache categories:', e);
            }

            const docsRes = await fetch(getAdminApiUrl(`documents?collection=${activeFilter}&page=${currentPage}&limit=${pageSize}`));
            if (!docsRes.ok) throw new Error('Unreachable or unauthorized.');

            const data = await docsRes.json();
            loadedDocuments = data.documents || [];
            totalDocuments = data.total || 0;

            renderHeaderStats(totalDocuments);
            renderDocuments();
            renderPagination();
            GlobalLoader.done();
        } catch (err) {
            GlobalLoader.fail();
            showToast('Failed to load data. Check backend connection.', 'error');
            console.error('[Admin Panel] Refresh error:', err);
            const schema = TABLE_SCHEMAS[activeFilter] || [];
            const colCount = schema.length + 3;
            const list = document.getElementById('knowledge-feed-list');
            list.innerHTML = `<tr><td colspan="${colCount}" class="text-center py-12 text-rose-500 font-bold"><i class="fa-solid fa-triangle-exclamation text-lg mb-2"></i><p class="text-[10px]">Verify backend connection or Sanity client token.</p></td></tr>`;
        }
    }

    async function loadSingletonEditor(collection, meta) {
        const singletonId = meta.singletonId;
        const hubPanel = document.getElementById('database-hub-panel');
        if (hubPanel) hubPanel.classList.add('hidden');

        // Create or get singleton editor panel
        let editorPanel = document.getElementById('singleton-editor-panel');
        if (!editorPanel) {
            editorPanel = document.createElement('div');
            editorPanel.id = 'singleton-editor-panel';
            editorPanel.className = 'flex-1 flex flex-col bg-white overflow-y-auto';
            hubPanel.parentNode.insertBefore(editorPanel, hubPanel.nextSibling);
        }
        editorPanel.classList.remove('hidden');

        // Loading skeleton
        editorPanel.innerHTML = `
            <div class="p-8 animate-pulse">
                <div class="w-48 h-6 skeleton rounded-md mb-6"></div>
                <div class="space-y-4">
                    <div class="w-full h-10 skeleton rounded-md"></div>
                    <div class="w-full h-10 skeleton rounded-md"></div>
                    <div class="w-full h-10 skeleton rounded-md"></div>
                    <div class="w-3/4 h-10 skeleton rounded-md"></div>
                </div>
            </div>
        `;

        try {
            const res = await fetch(getAdminApiUrl(`document/${singletonId}`));
            let docData = {};
            if (res.ok) {
                const json = await res.json();
                docData = json.document || {};
            }

            const fields = FIELD_SCHEMAS[collection] || [];
            renderSingletonForm(editorPanel, collection, meta, docData, fields, singletonId);
        } catch (err) {
            editorPanel.innerHTML = `
                <div class="p-8 text-center">
                    <i class="fa-solid fa-triangle-exclamation text-2xl text-amber-500 mb-3"></i>
                    <p class="text-sm font-bold text-slate-700 mb-1">Could not load ${escapeHtml(meta.label)}</p>
                    <p class="text-xs text-slate-400">Document ID: ${singletonId}</p>
                    <p class="text-xs text-slate-400 mt-1">${escapeHtml(err.message)}</p>
                </div>
            `;
        }
    }

    function renderSingletonForm(container, collection, meta, docData, fields, singletonId) {
        let fieldsHtml = '';

        fields.forEach(field => {
            const currentVal = docData[field.name];
            fieldsHtml += renderFieldHtml(field, currentVal, '', singletonId);
        });

        // Status badge
        let statusHtml = '';
        if (docData._id) {
            const st = docData._status || 'published';
            const stColors = { draft: 'bg-amber-50 text-amber-600 border-amber-200', modified: 'bg-blue-50 text-blue-600 border-blue-200', published: 'bg-emerald-50 text-emerald-600 border-emerald-200' };

        } else {
            statusHtml = `<span class="text-[9px] font-extrabold px-2 py-0.5 rounded-full border bg-slate-50 text-slate-400 border-slate-200">Not Created</span>`;
        }

        container.innerHTML = `

                <!-- Header -->
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <div class="flex items-center gap-3 mb-1">
                            <i class="fa-solid ${meta.icon || 'fa-file-lines'} text-lg text-indigo-500"></i>
                            <h1 class="text-xl font-extrabold text-slate-800">${escapeHtml(meta.label)}</h1>
                            ${statusHtml}
                        </div>
                        <p class="text-xs text-slate-400 font-medium">Edit the content configuration for this page.</p>
                    </div>
                </div>

                <!-- Alert -->
                <div id="singleton-alert" class="hidden rounded-lg p-3 text-xs font-semibold mb-6"></div>

                <!-- Form -->
                <form id="singleton-form" onsubmit="submitSingletonForm(event, '${collection}', '${singletonId}')" class="space-y-5">
                    ${fieldsHtml}

                    <!-- Actions -->
                    <div class="flex items-center gap-3 pt-4 border-t border-slate-100">
                        <button type="submit" id="singleton-save-btn" class="px-5 py-2.5 bg-gradient-to-r from-indigo-500 to-blue-600 text-white text-xs font-extrabold rounded-lg shadow-md hover:shadow-lg hover:from-indigo-600 hover:to-blue-700 transition duration-200">
                            <i class="fa-solid fa-floppy-disk mr-1.5"></i> Save Changes
                        </button>
                        <button type="button" onclick="refreshAdminDashboard()" class="px-4 py-2.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 transition">
                            <i class="fa-solid fa-rotate-right mr-1"></i> Discard
                        </button>
                    </div>
                </form>
            </div>
        `;

        // Evaluate hidden conditions on load, and attach events
        setTimeout(() => {
            evaluateSingletonHiddenFields();
            const formEl = document.getElementById('singleton-form');
            if (formEl) {
                formEl.addEventListener('input', evaluateSingletonHiddenFields);
                formEl.addEventListener('change', evaluateSingletonHiddenFields);
            }
        }, 50);
    }

    function renderFieldHtml(field, currentVal, pathPrefix = '', singletonId = '') {
        const namePath = pathPrefix ? `${pathPrefix}.${field.name}` : field.name;
        const displayVal = (currentVal !== undefined && currentVal !== null) ? currentVal : (field.initialValue || '');
        const idSafeName = namePath.replace(/[\[\]\.]/g, '-');

        // Handle hidden conditions
        let hiddenAttr = '';
        if (field.hidden_condition) {
            const condField = field.hidden_condition.field;
            const condOp = field.hidden_condition.operator;
            const condVal = field.hidden_condition.value;
            const fullCondField = pathPrefix ? `${pathPrefix}.${condField}` : condField;
            hiddenAttr = `data-hidden-field="${fullCondField}" data-hidden-op="${condOp}" data-hidden-val="${condVal}"`;
        }

        let html = `<div class="singleton-field-group mb-4" ${hiddenAttr}>`;

        if (field.type === 'object') {
            const objVal = currentVal || {};
            const schemaType = field.schemaType || 'object';
            html += `
            <div class="border border-slate-200 rounded-xl p-5 bg-slate-50/20 space-y-4 shadow-sm">
                <div class="flex items-center gap-2 pb-2 border-b border-slate-100">
                    <i class="fa-solid fa-cube text-indigo-400 text-xs"></i>
                    <h4 class="text-xs font-bold text-slate-700 uppercase tracking-wider">${escapeHtml(field.label)}</h4>
                </div>
                ${field.description ? `<p class="text-[10px] text-slate-400 -mt-2">${escapeHtml(field.description)}</p>` : ''}
                <input type="hidden" name="${namePath}._type" value="${schemaType}">
                <div class="space-y-4">`;
                
            (field.fields || []).forEach(subField => {
                html += renderFieldHtml(subField, objVal[subField.name], namePath, singletonId);
            });

    function renderSingletonArrayField(field, arrVal, namePath, singletonId) {
        const nestedFields = field.fields || [];

        const idSafeName = namePath.replace(/[\[\]\.]/g, '-');
        let html = `
        <div class="border border-slate-200 rounded-xl p-5 bg-slate-50/20 space-y-4 shadow-sm">
            <div class="flex items-center justify-between pb-2 border-b border-slate-100">

                </div>
            </div>
            ${field.description ? `<p class="text-[10px] text-slate-400 -mt-2">${escapeHtml(field.description)}</p>` : ''}

        arrVal.forEach((item, idx) => {
            const itemPath = `${namePath}[${idx}]`;
            const idSafeItem = itemPath.replace(/[\[\]\.]/g, '-');
            html += `
            <div class="border border-slate-200 rounded-xl p-5 bg-white relative group shadow-sm">
                <button type="button" onclick="removeSingletonArrayItem('${namePath}', ${idx})" class="absolute top-3 right-3 text-slate-300 hover:text-rose-500 transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
                <input type="hidden" name="${itemPath}._type" value="${schemaType}">
                <div class="space-y-4 pt-2">`;
            
            nestedFields.forEach(nf => {
                const subVal = item ? item[nf.name] : undefined;
                html += renderFieldHtml(nf, subVal, itemPath, singletonId);
            });
            
            html += `</div></div>`;
        });

        html += `</div>
            <button type="button" onclick="addSingletonArrayItem('${namePath}')" class="mt-2 inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 transition shadow-sm">
                <i class="fa-solid fa-plus text-[9px]"></i> Add Item
            </button>
        </div>`;
        return html;
    }

    function addSingletonArrayItem(namePath) {
        const idSafeName = namePath.replace(/[\[\]\.]/g, '-');
        const container = document.getElementById(`arr-field-${idSafeName}`);
        if (!container) return;
        
        const schema = FIELD_SCHEMAS[activeFilter] || [];
        const arrField = getFieldDefByPath(namePath, schema);
        if (!arrField || !arrField.fields) return;

        const idx = container.children.length;
        const itemPath = `${namePath}[${idx}]`;
        const schemaType = arrField.schemaType || 'object';

        let html = `
        <div class="border border-slate-200 rounded-xl p-5 bg-white relative group shadow-sm">
            <button type="button" onclick="this.closest('.relative').remove(); reindexSingletonArray('${namePath}')" class="absolute top-3 right-3 text-slate-300 hover:text-rose-500 transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
            <input type="hidden" name="${itemPath}._type" value="${schemaType}">
            <div class="space-y-4 pt-2">`;
        
        arrField.fields.forEach(nf => {
            html += renderFieldHtml(nf, undefined, itemPath, '');
        });
        
        html += `</div></div>`;
        container.insertAdjacentHTML('beforeend', html);
        reindexSingletonArray(namePath);
    }

    function removeSingletonArrayItem(fieldName, idx) {
        const idSafeName = fieldName.replace(/[\[\]\.]/g, '-');
        const container = document.getElementById(`arr-field-${idSafeName}`);
        if (!container || !container.children[idx]) return;
        container.children[idx].remove();
        reindexSingletonArray(fieldName);
        
        // Trigger evaluateHiddenFields in case the array removal affects conditions
        evaluateSingletonHiddenFields();
    }

    function reindexSingletonArray(namePath) {
        const idSafeName = namePath.replace(/[\[\]\.]/g, '-');
        const container = document.getElementById(`arr-field-${idSafeName}`);
        if (!container) return;
        
        Array.from(container.children).forEach((child, idx) => {
            const inputs = child.querySelectorAll('[name]');
            inputs.forEach(input => {
                const name = input.getAttribute('name');
                const regex = new RegExp(`^(${escapeRegExp(namePath)})\\[\\d+\\](.*)$`);
                const match = name.match(regex);
                if (match) {
                    const newName = `${match[1]}[${idx}]${match[2]}`;
                    input.setAttribute('name', newName);
                    
                    // Update id elements if any
                    const oldId = input.getAttribute('id');
                    if (oldId) {
                        const newId = newName.replace(/[\[\]\.]/g, '-');
                        input.setAttribute('id', newId);
                    }
                }
            });
            
            // Update trash button index
            const removeBtn = child.querySelector('button[onclick^="removeSingletonArrayItem"]');
            if (removeBtn) {
                removeBtn.setAttribute('onclick', `removeSingletonArrayItem('${namePath}', ${idx})`);
            }
        });
    }

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function setNestedValue(obj, keyPath, value) {
        const parts = keyPath.split('.');
        let current = obj;
        for (let i = 0; i < parts.length - 1; i++) {
            const part = parts[i];
            const arrayMatch = part.match(/^([^\[]+)\[(\d+)\]$/);
            if (arrayMatch) {
                const arrName = arrayMatch[1];
                const idx = parseInt(arrayMatch[2]);
                if (!current[arrName]) current[arrName] = [];
                if (!current[arrName][idx]) current[arrName][idx] = {};
                current = current[arrName][idx];
            } else {
                if (!current[part]) current[part] = {};
                current = current[part];
            }
        }
        
        const lastPart = parts[parts.length - 1];
        const arrayMatch = lastPart.match(/^([^\[]+)\[(\d+)\]$/);
        if (arrayMatch) {
            const arrName = arrayMatch[1];
            const idx = parseInt(arrayMatch[2]);
            if (!current[arrName]) current[arrName] = [];
            current[arrName][idx] = value;
        } else {
            current[lastPart] = value;
        }
    }

    function getFieldDefByPath(path, schema) {
        const normalized = path.replace(/\[\d+\]/g, '');
        const parts = normalized.split('.');
        
        let currentFields = schema;
        let result = null;
        
        for (let i = 0; i < parts.length; i++) {
            const part = parts[i];
            const field = currentFields.find(f => f.name === part);
            if (!field) return null;
            if (i === parts.length - 1) {
                result = field;
            } else {
                currentFields = field.fields || [];
            }
        }
        return result;
    }

    async function handleSingletonImageUploadLocal(event, idSafeName) {
        const file = event.target.files[0];
        if (!file) return;

        const emptyState = document.getElementById(`img-empty-${idSafeName}`);
        const filledState = document.getElementById(`img-filled-${idSafeName}`);
        const progContainer = document.getElementById(`img-progress-container-${idSafeName}`);
        const progBar = document.getElementById(`img-progress-bar-${idSafeName}`);
        const progText = document.getElementById(`img-progress-text-${idSafeName}`);
        const previewImg = document.getElementById(`img-preview-${idSafeName}`);
        const filenameText = document.getElementById(`img-filename-${idSafeName}`);
        const inputVal = document.getElementById(`img-value-${idSafeName}`);
        const libBtn = document.getElementById(`img-lib-btn-${idSafeName}`);

        emptyState.classList.add('hidden');
        if (libBtn) libBtn.classList.add('hidden');
        progContainer.classList.remove('hidden');
        progBar.style.width = '0%';
        progText.textContent = '0%';

        try {
            const assetRef = await uploadAssetFile(file, (percent) => {
                progBar.style.width = `${percent}%`;
                progText.textContent = `${percent}%`;
            });
            
            inputVal.value = assetRef;
            previewImg.src = buildSanityImageUrl(assetRef);
            filenameText.textContent = file.name;
            
            progContainer.classList.add('hidden');
            filledState.classList.remove('hidden');
            showToast('Image uploaded successfully!', 'success');
        } catch (err) {
            console.error('Failed to upload image:', err);
            showToast(err.message || 'Image upload failed.', 'error');
            emptyState.classList.remove('hidden');
            if (libBtn) libBtn.classList.remove('hidden');
            progContainer.classList.add('hidden');
        }
    }

    // --- CHIP ARRAY HELPERS ---
    function removeChip(idSafeName, idx) {
        const hiddenInput = document.getElementById(`hidden-${idSafeName}`);
        let arr = [];
        try {
            arr = JSON.parse(hiddenInput.value || '[]');
        } catch (e) {}
        arr.splice(idx, 1);
        hiddenInput.value = JSON.stringify(arr);
        renderChipsUI(idSafeName, arr);
    }

    function handleChipInput(event, idSafeName) {
        if (event.key === 'Enter') {
            event.preventDefault();
            const input = event.target;
            const val = input.value.trim();
            if (val) {
                const hiddenInput = document.getElementById(`hidden-${idSafeName}`);
                let arr = [];
                try {
                    arr = JSON.parse(hiddenInput.value || '[]');
                } catch (e) {}
                if (!arr.includes(val)) {
                    arr.push(val);
                    hiddenInput.value = JSON.stringify(arr);
                    renderChipsUI(idSafeName, arr);
                }
            }
            input.value = '';
        }
    }

    function renderChipsUI(idSafeName, arr) {
        const listEl = document.querySelector(`#chip-container-${idSafeName} .chips-list`);
        if (!listEl) return;
        listEl.innerHTML = arr.map((item, idx) => `
            <span class="inline-flex items-center gap-1 bg-indigo-50 text-indigo-600 border border-indigo-100/50 text-xs px-2.5 py-1 rounded-full font-medium">
                <span>${escapeHtml(item)}</span>

                    <i class="fa-solid fa-xmark text-[10px]"></i>
                </button>
            </span>
        `).join('');
    }

    function evaluateSingletonHiddenFields() {
        const form = document.getElementById('singleton-form');
        if (!form) return;
        
        const elements = form.querySelectorAll('[data-hidden-field]');
        elements.forEach(el => {
            const condField = el.getAttribute('data-hidden-field');
            const condOp = el.getAttribute('data-hidden-op');
            const condValStr = el.getAttribute('data-hidden-val');
            
            let condVal = condValStr;
            if (condValStr === 'true') condVal = true;
            else if (condValStr === 'false') condVal = false;
            else if (/^-?\d+$/.test(condValStr)) condVal = parseInt(condValStr);
            else if (/^-?\d+\.\d+$/.test(condValStr)) condVal = parseFloat(condValStr);
            
            const inputEl = form.querySelector(`[name="${condField}"]`);
            let currentVal = undefined;
            if (inputEl) {
                if (inputEl.tagName === 'SELECT' && (inputEl.value === 'true' || inputEl.value === 'false')) {
                    currentVal = inputEl.value === 'true';
                } else if (inputEl.type === 'checkbox') {
                    currentVal = inputEl.checked;
                } else {
                    currentVal = inputEl.value;
                }
            } else {
                const imgVal = form.querySelector(`#img-value-${condField.replace(/[\[\]\.]/g, '-')}`);
                if (imgVal) {
                    currentVal = imgVal.value;
                }
            }
            
            let isHidden = false;
            if (currentVal !== undefined) {
                if (condOp === 'eq') {
                    isHidden = (currentVal === condVal);
                } else if (condOp === 'neq') {
                    isHidden = (currentVal !== condVal);
                }
            }
            
            if (isHidden) {
                el.classList.add('hidden');
                const innerInput = el.querySelector('input, select, textarea');
                if (innerInput) innerInput.removeAttribute('required');
            } else {
                el.classList.remove('hidden');
            }
        });
    }

    async function submitSingletonForm(event, collection, singletonId) {
        event.preventDefault();
        const form = document.getElementById('singleton-form');
        const btn = document.getElementById('singleton-save-btn');
        const alertEl = document.getElementById('singleton-alert');
        const originalHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

        const formData = new FormData(form);
        const payload = {};
        const fields = FIELD_SCHEMAS[collection] || [];

        formData.forEach((value, key) => {
            const fieldDef = getFieldDefByPath(key, fields);
            
            let parsedVal = value;
            if (fieldDef) {
                if (fieldDef.type === 'number') {
                    parsedVal = parseFloat(value) || 0;
                } else if (fieldDef.type === 'select' && (value === 'true' || value === 'false')) {
                    parsedVal = value === 'true';
                } else if (fieldDef.type === 'chip_array') {
                    try {
                        parsedVal = JSON.parse(value);
                    } catch(e) {
                        parsedVal = [];
                    }
                } else if (fieldDef.type === 'image') {
                    if (value) {
                        parsedVal = {
                            _type: 'image',
                            asset: {
                                _type: 'reference',
                                _ref: value
                            }
                        };
                    } else {
                        parsedVal = null;
                    }
                }
            }
            
            setNestedValue(payload, key, parsedVal);
        });

        try {
            const res = await fetch(getAdminApiUrl(`document/${singletonId}`), {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Save failed.');
            }

            // Auto-publish after save
            await fetch(getAdminApiUrl(`document/${singletonId}/publish`), { method: 'POST' });

            alertEl.className = 'rounded-lg p-3 text-xs font-semibold mb-6 bg-emerald-50 text-emerald-600 border border-emerald-200 flex items-center gap-2';
            alertEl.innerHTML = '<i class="fa-solid fa-circle-check"></i> Changes saved and published successfully.';
            alertEl.classList.remove('hidden');
            showToast('Changes saved successfully.', 'success');
            setTimeout(() => alertEl.classList.add('hidden'), 3000);
        } catch (err) {
            alertEl.className = 'rounded-lg p-3 text-xs font-semibold mb-6 bg-rose-50 text-rose-500 border border-rose-200 flex items-center gap-2';
            alertEl.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> ${escapeHtml(err.message)}`;
            alertEl.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalHTML;
        }
    }

    function renderDocRow(doc) {
        const schema = TABLE_SCHEMAS[activeFilter] || [];
        const cells = schema.map(col => {
            const val = doc[col.key];
            let display;
            if (col.type === 'price') {
                display = (val != null) ? `<span class="font-extrabold text-slate-800">₱${Number(val).toLocaleString()}</span>` : '<span class="text-slate-300">—</span>';
            } else if (col.type === 'availability') {
                display = val === true
                    ? '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-green-50 text-green-600 border-green-100">In Stock</span>'
                    : '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full border bg-rose-50 text-rose-500 border-rose-100">Out of Stock</span>';
            } else if (col.type === 'keywords') {
                const kw = Array.isArray(val) ? val.join(', ') : (val ?? '—');
                display = `<span class="text-slate-500">${escapeHtml(kw)}</span>`;
            } else if (val && typeof val === 'object' && val._ref) {
                const cat = (window.cachedCategories || []).find(c => c._id === val._ref);
                const label = cat ? (cat.title || cat.name) : val._ref;
                display = `<span class="font-semibold text-slate-700">${escapeHtml(label)}</span>`;
            } else {
                const txt = String(val ?? '—');
                display = col.truncate
                    ? `<span class="block truncate max-w-[200px] text-slate-500" title="${escapeHtml(txt)}">${escapeHtml(txt)}</span>`
                    : `<span class="font-semibold text-slate-700">${escapeHtml(txt)}</span>`;
            }
            return `<td class="px-6 py-3.5 text-xs">${display}</td>`;
        }).join('');
        let statusBadge = '';
        if (doc._status === 'draft') {
            statusBadge = `<span class="ml-2 text-[8px] font-extrabold px-1.5 py-0.5 rounded border bg-amber-50 text-amber-600 border-amber-200">Draft</span>`;
        } else if (doc._status === 'modified') {

        return `<tr class="hover:bg-blue-50/30 transition duration-150 cursor-pointer group" data-id="${doc._id}" onclick="openDocumentDetail('${doc._id}')">

    function changePage(page) {
        if (page < 1 || page > Math.ceil(totalDocuments / pageSize)) return;
        currentPage = page;
        syncUrlToState();
        refreshAdminDashboard();
    }

    function getPageRange(current, total) {
        const range = [];
        const delta = 1;
        for (let i = 1; i <= total; i++) {
            if (i === 1 || i === total || (i >= current - delta && i <= current + delta)) {
                range.push(i);
            }
        }
        const withEllipses = [];
        let l;
        for (const i of range) {
            if (l !== undefined) {
                if (i - l === 2) {
                    withEllipses.push(l + 1);
                } else if (i - l > 2) {
                    withEllipses.push('...');
                }
            }
            withEllipses.push(i);
            l = i;
        }
        return withEllipses;
    }

    function renderPagination() {
        const infoSpan = document.getElementById('pagination-info');
        const pagesDiv = document.getElementById('pagination-pages');
        if (!infoSpan || !pagesDiv) return;

        // Sync dropdown selected value
        const sizeSelect = document.getElementById('page-size-select');
        if (sizeSelect) {
            sizeSelect.value = pageSize;
        }

        if (totalDocuments === 0) {
            infoSpan.innerText = "Showing 0 to 0 of 0 entries";
            pagesDiv.innerHTML = "";
            return;
        }

        const startIdx = (currentPage - 1) * pageSize + 1;
        const endIdx = Math.min(currentPage * pageSize, totalDocuments);
        infoSpan.innerText = `Showing ${startIdx} to ${endIdx} of ${totalDocuments} entries`;

        const totalPages = Math.ceil(totalDocuments / pageSize);
        let html = ``;

        // Prev Button
        const prevDisabled = currentPage === 1;
        html += `
            <button onclick="changePage(${currentPage - 1})" ${prevDisabled ? 'disabled' : ''} class="px-2.5 py-1.5 rounded-lg border border-slate-200 text-[10px] font-extrabold ${prevDisabled ? 'text-slate-300 bg-slate-50/50 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 transition'}">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
        `;

        // Page numbers with ellipses
        const pageRange = getPageRange(currentPage, totalPages);
        for (const item of pageRange) {
            if (item === '...') {
                html += `
                    <span class="w-8 h-8 flex items-center justify-center text-[10px] font-extrabold text-slate-400">
                        ...
                    </span>
                `;
            } else {
                const isActive = currentPage === item;
                html += `
                    <button onclick="changePage(${item})" class="w-8 h-8 flex items-center justify-center rounded-lg text-[10px] font-extrabold transition border ${isActive
                        ? 'bg-gradient-to-tr from-[#0D99FF] to-indigo-600 border-indigo-600 text-white shadow-md shadow-[#0D99FF]/10'
                        : 'border-slate-200 text-slate-600 hover:bg-slate-50'
                    }">
                        ${item}
                    </button>
                `;
            }
        }

        // Next Button
        const nextDisabled = currentPage === totalPages;
        html += `
            <button onclick="changePage(${currentPage + 1})" ${nextDisabled ? 'disabled' : ''} class="px-2.5 py-1.5 rounded-lg border border-slate-200 text-[10px] font-extrabold ${nextDisabled ? 'text-slate-300 bg-slate-50/50 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 transition'}">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        `;

        pagesDiv.innerHTML = html;
    }

    async function deleteKnowledgeDocument(docId, btn) {
        if (!await customConfirm({
            title: 'Delete Document',
            message: 'Are you sure you want to delete this document? This action cannot be undone.',
            confirmText: 'Yes, Delete'
        })) return;
        if (btn) setBtn(btn, true, '<i class="fa-solid fa-spinner fa-spin text-xs text-rose-500"></i>');
        GlobalLoader.start();

        try {
            const res = await fetch(getAdminApiUrl(`document/${docId}`), {
                method: 'DELETE'
            });

            if (!res.ok) throw new Error('Could not delete document.');
            GlobalLoader.done();
            showToast('Document deleted successfully.', 'success');
            refreshAdminDashboard();
            if (btn) setBtn(btn, false);
        } catch (err) {
            GlobalLoader.fail();
            showToast(err.message, 'error');
            if (btn) setBtn(btn, false);
        }

        const term = document.getElementById('document-search').value.toLowerCase();
        const schema = TABLE_SCHEMAS[activeFilter] || [];
        const colCount = schema.length + 3;
        const filtered = loadedDocuments.filter(doc => {
            return Object.values(doc).some(v => String(v ?? '').toLowerCase().includes(term));
        });
        const list = document.getElementById('knowledge-feed-list');
        if (filtered.length === 0) {
            list.innerHTML = `<tr><td colspan="${colCount}" class="text-center py-12 text-slate-400"><i class="fa-solid fa-box-open text-lg mb-2"></i><p class="text-[10px] font-bold">No matching records found.</p></td></tr>`;
            return;
        }
        list.innerHTML = filtered.map(doc => renderDocRow(doc)).join('');
    }

    async function loadMediaGallery() {
        const loader = document.getElementById('media-loading-indicator');
        const grid = document.getElementById('media-grid');
        const emptyState = document.getElementById('media-empty-state');
        
        if(loader) loader.classList.remove('hidden');
        if(grid) grid.innerHTML = '';
        if(emptyState) emptyState.classList.add('hidden');

        try {
            const token = document.getElementById('admin-secret-token')?.value || 'getmeds-admin-secret-key';
            const res = await fetch(getAdminApiUrl('media'), {
                headers: { 'X-Admin-Token': token }
            });
            const json = await res.json();
            
            if (!json.success || !json.data || json.data.length === 0) {
                if(emptyState) { emptyState.classList.remove('hidden'); emptyState.classList.add('flex'); }
            } else {
                const projectId = json.project_id || window.ENV_SANITY_PROJECT_ID || 'cbb7tdhx';
                const dataset = json.dataset || window.ENV_SANITY_DATASET || 'production';
                
                if(grid) {
                    grid.innerHTML = json.data.map(asset => {
                        const isImg = asset._type === 'sanity.imageAsset';
                        let previewUrl = '';
                        let fileUrl = asset.url;
                        let name = asset.originalFilename || asset._id;
                        let sizeStr = asset.size ? (asset.size / 1024).toFixed(1) + ' KB' : 'Unknown size';
                        
                        if (isImg) {
                            const parts = asset._id.split('-');
                            if (parts.length >= 4) {
                                const ext = parts.pop();
                                const dims = parts.pop();
                                const ref = parts.slice(1).join('-');
                                previewUrl = `https://cdn.sanity.io/images/${projectId}/${dataset}/${ref}-${dims}.${ext}?w=400&h=300&fit=crop`;
                                if (!fileUrl) {
                                    fileUrl = `https://cdn.sanity.io/images/${projectId}/${dataset}/${ref}-${dims}.${ext}`;
                                }
                            } else if (asset.url) {
                                previewUrl = asset.url;
                            }
                        } else {
                            // Construct fileUrl for non-images if not present
                            if (!fileUrl) {
                                const parts = asset._id.split('-');
                                if (parts.length >= 3) {
                                    const ext = parts.pop();
                                    const ref = parts.slice(1).join('-');
                                    fileUrl = `https://cdn.sanity.io/files/${projectId}/${dataset}/${ref}.${ext}`;
                                }
                            }
                        }
                        
                        // Select nice modern file icon depending on extension
                        const ext = name.split('.').pop().toLowerCase();
                        let iconHtml = '<i class="fa-solid fa-file text-4xl text-slate-400 group-hover:-translate-y-1 transition duration-300"></i>';
                        if (ext === 'xlsx' || ext === 'xls') {
                            iconHtml = '<i class="fa-solid fa-file-excel text-4xl text-emerald-500 group-hover:-translate-y-1 transition duration-300"></i>';
                        } else if (ext === 'csv') {
                            iconHtml = '<i class="fa-solid fa-file-csv text-4xl text-blue-500 group-hover:-translate-y-1 transition duration-300"></i>';
                        } else if (ext === 'json') {
                            iconHtml = '<i class="fa-solid fa-file-code text-4xl text-amber-500 group-hover:-translate-y-1 transition duration-300"></i>';
                        } else if (ext === 'pdf') {
                            iconHtml = '<i class="fa-solid fa-file-pdf text-4xl text-rose-500 group-hover:-translate-y-1 transition duration-300"></i>';
                        }
                        
                        return `
                            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden hover:shadow-lg transition duration-300 group cursor-pointer flex flex-col h-full relative" onclick="if('${fileUrl}') window.open('${fileUrl}', '_blank')">
                                <div class="h-32 bg-slate-50 flex items-center justify-center relative overflow-hidden border-b border-slate-100 shrink-0">
                                    ${isImg && previewUrl ? `
                                        <img src="${previewUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" />
                                    ` : `
                                        <div class="flex flex-col items-center gap-2">
                                            ${iconHtml}
                                            <span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-slate-200/60 text-slate-600 uppercase tracking-wider">${ext}</span>
                                        </div>
                                    `}
                                </div>
                                <div class="p-3 flex flex-col gap-1 flex-grow justify-between">
                                    <span class="text-xs font-bold text-slate-700 truncate w-full" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
                                    <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-100/60">
                                        <div class="flex flex-col text-[8px] text-slate-400 font-medium">
                                            <span>${sizeStr}</span>
                                            <span>${new Date(asset._createdAt).toLocaleDateString()}</span>
                                        </div>
                                        <div class="flex items-center gap-1.5">
                                            ${fileUrl ? `
                                                <button onclick="navigator.clipboard.writeText('${fileUrl}').then(() => showToast('URL copied to clipboard!', 'success')); event.stopPropagation();" class="w-6 h-6 rounded-md hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-600 transition" title="Copy URL">
                                                    <i class="fa-solid fa-copy text-[10px]"></i>
                                                </button>
                                                <a href="${fileUrl}" target="_blank" download class="w-6 h-6 rounded-md hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-600 transition" title="Download" onclick="event.stopPropagation();">
                                                    <i class="fa-solid fa-download text-[10px]"></i>
                                                </a>
                                            ` : ''}
                                            <button onclick="deleteMediaAsset('${asset._id}'); event.stopPropagation();" class="w-6 h-6 rounded-md hover:bg-rose-50 flex items-center justify-center text-slate-400 hover:text-rose-600 transition" title="Delete Asset">
                                                <i class="fa-solid fa-trash text-[10px]"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            }
        } catch (e) {
            console.error('Failed to load media:', e);
            if(emptyState) { emptyState.classList.remove('hidden'); emptyState.classList.add('flex'); }
        } finally {
            if(loader) loader.classList.add('hidden');
        }
    }

    let lastMediaDeleteId = null;

    window.deleteMediaAsset = async function(docId) {
        lastMediaDeleteId = docId;
        const token = document.getElementById('admin-secret-token')?.value || 'getmeds-admin-secret-key';
        
        GlobalLoader.start();
        try {
            // Check if deleting this file will affect seeded database records
            const checkRes = await fetch(getAdminApiUrl(`media/check-affected/${docId}`), {
                headers: { 'X-Admin-Token': token }
            });
            const checkData = await checkRes.json();
            GlobalLoader.done();
            
            if (checkData.is_import_file && checkData.affected_count > 0) {
                // Open cascade confirmation modal instead
                document.getElementById('cascade-filename').textContent = checkData.filename;
                document.getElementById('cascade-affected-count').textContent = checkData.affected_count;
                document.getElementById('cascade-delete-confirm-modal').classList.remove('hidden');
                document.getElementById('cascade-delete-confirm-modal').classList.add('flex');
                return;
            }
            
            // Fall back to standard confirmation if no records are affected
            if (!await customConfirm({
                title: 'Delete Media Asset',
                message: 'Are you sure you want to delete this media asset? This action cannot be undone.',
                confirmText: 'Yes, Delete'
            })) return;
            
            await performMediaDelete(docId, false);
        } catch (err) {
            GlobalLoader.fail();
            showToast(err.message || 'Failed to check asset connections', 'error');
        }
    };

    window.confirmCascadeDelete = async function() {
        closeCascadeDeleteModal();
        if (lastMediaDeleteId) {
            await performMediaDelete(lastMediaDeleteId, true);
        }
    };

    async function performMediaDelete(docId, deleteSeeded = false) {
        GlobalLoader.start();
        try {
            const token = document.getElementById('admin-secret-token')?.value || 'getmeds-admin-secret-key';
            const res = await fetch(getAdminApiUrl(`document/${docId}?delete_seeded=${deleteSeeded}`), {
                method: 'DELETE',
                headers: { 'X-Admin-Token': token }
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Could not delete asset.');
            
            GlobalLoader.done();
            if (deleteSeeded) {
                showToast(`Asset and ${data.deleted_seeded_count || 0} seeded records deleted successfully.`, 'success');
                refreshAdminDashboard();
            } else {
                showToast('Asset deleted successfully.', 'success');
            }
            loadMediaGallery();
        } catch (err) {
            GlobalLoader.fail();
            showToast(err.message || 'Failed to delete asset', 'error');
        }
    }

    async function refreshSecurityDashboard() {
        const token = document.getElementById('admin-secret-token').value;
        try {
            if (activeSecurityTab === 'users') {
                renderSecurityUsersSkeleton();
                const usersRes = await fetch('/api/admin/security/users', { headers: { 'X-Admin-Token': token } });
                if (usersRes.ok) {
                    loadedSecurityUsers = await usersRes.json();
                    renderSecurityUsers();
                    updateSecurityStats();
                    setSupabaseBadgeActive();
                } else {
                    const errText = await usersRes.text();
                    throw new Error(errText || `Server returned status ${usersRes.status}`);
                }
            } else if (activeSecurityTab === 'policies') {
                const container = document.getElementById('rbac-role-panel-container');
                if (container) container.innerHTML = '<div class="text-center py-12 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>';
                const accessRes = await fetch('/api/admin/security/role-permissions', { headers: { 'X-Admin-Token': token } });
                if (accessRes.ok) {
                    const data = await accessRes.json();
                    renderRbacMatrix(data);
                    setSupabaseBadgeActive();
                } else {
                    const errText = await accessRes.text();
                    throw new Error(errText || `Server returned status ${accessRes.status}`);
                }
            } else if (activeSecurityTab === 'logs') {
                renderSecurityLogsSkeleton();
                const logsRes = await fetch(`/api/admin/security/logs?page=${currentSecurityPage}&limit=${securityPageSize}`, { headers: { 'X-Admin-Token': token } });
                if (logsRes.ok) {
                    const data = await logsRes.json();
                    loadedSecurityLogs = data.logs || [];
                    totalSecurityLogs = data.total || 0;
                    renderSecurityLogs();
                    renderSecurityLogsPagination();
                    setSupabaseBadgeActive();
                } else {
                    const errText = await logsRes.text();
                    throw new Error(errText || `Server returned status ${logsRes.status}`);
                }
            }
        } catch (err) {
            console.error('Failed to load security dashboard:', err);
            setSupabaseBadgeError(err.message || err);
            
            // Render nice error states in the DOM container
            if (activeSecurityTab === 'users') {
                renderSecurityUsersError(err.message || err);
            } else if (activeSecurityTab === 'policies') {
                renderRbacMatrixError(err.message || err);
            } else if (activeSecurityTab === 'logs') {
                renderSecurityLogsError(err.message || err);
            }
        }
    }

    // ============================================================
    //  ACTION CONTROL — ROLE-BASED PERMISSION MATRIX
    //  Format: { role: { collection: ['read','create','edit','delete'] } }
    // ============================================================

    const RBAC_ACTIONS = ['read', 'create', 'edit', 'delete'];
    const RBAC_ACTION_LABELS = { read: 'Read', create: 'Create', edit: 'Edit', delete: 'Delete' };
    const RBAC_ACTION_COLORS = { read: 'text-sky-600', create: 'text-emerald-600', edit: 'text-amber-600', delete: 'text-rose-600' };

    let currentRbacData = null;
    let activeRbacRole = null;
    // localRbacPerms: { role: { collection: { read:bool, create:bool, edit:bool, delete:bool } } }
    let localRbacPerms = {};
    // localRbacRoles: string[] — tracks all roles including newly added ones
    let localRbacRoles = [];

    function renderRbacMatrix(data) {
        currentRbacData = data;
        const roles = data.roles || [];
        // data.permissions new format: { role: { collection: [actions] } }
        // Also support legacy format: { collection: [roles] }
        const rawPerms = data.permissions || {};

        // Detect legacy format: if any value is an array of strings (not objects), it's legacy
        const isLegacy = Object.values(rawPerms).some(v => Array.isArray(v));

        localRbacRoles = [...roles];
        localRbacPerms = {};

        const allPermKeys = [...Object.keys(COLLECTION_META), ...Object.keys(SYSTEM_SECTION_META), '_security'];

        if (isLegacy) {
            // Migrate: legacy { collection: [roles_with_write_access] } → new format
            // Give legacy write-roles: read+create+edit+delete; others: read only
            roles.forEach(role => {
                localRbacPerms[role] = {};
                allPermKeys.forEach(col => {
                    const hasWrite = (rawPerms[col] || []).includes(role);
                    // For _security in legacy, only give to roles that previously had write access
                    localRbacPerms[role][col] = {
                        read: true,
                        create: hasWrite,
                        edit: hasWrite,
                        delete: hasWrite
                    };
                });
            });
        } else {
            roles.forEach(role => {
                localRbacPerms[role] = {};
                allPermKeys.forEach(col => {
                    const actions = (rawPerms[role] || {})[col] || [];
                    localRbacPerms[role][col] = {
                        read: actions.includes('read'),
                        create: actions.includes('create'),
                        edit: actions.includes('edit'),
                        delete: actions.includes('delete')
                    };
                });
            });
        }

        // Set default active role
        if (!activeRbacRole || !localRbacRoles.includes(activeRbacRole)) {
            activeRbacRole = localRbacRoles[0] || null;
        }

        renderRbacRoleTabs();
        renderRbacRolePanel();
    }

    window.toggleSecurityAccess = function(role) {
        if (role.toLowerCase() === 'administrator') {
            showToast(`Cannot revoke security panel access from the core Administrator role.`, 'error');
            return;
        }

        try {
            const sessionStr = localStorage.getItem('getmeds_admin_session');
            if (sessionStr) {
                const sessionRole = JSON.parse(sessionStr).role;
                if (role === sessionRole) {
                    showToast(`Cannot revoke security panel access from your active role (${role}) to prevent lockout.`, 'error');
                    return;
                }
            }
        } catch(e) {}

        if (!localRbacPerms[role]) localRbacPerms[role] = {};
        
        const currentlyHasAccess = localRbacPerms[role]['_security'] && localRbacPerms[role]['_security']['read'];
        
        if (currentlyHasAccess) {
            localRbacPerms[role]['_security'] = { read: false, create: false, edit: false, delete: false };
            showToast(`Security panel access revoked for ${role}.`, 'info');
        } else {
            localRbacPerms[role]['_security'] = { read: true, create: true, edit: true, delete: true };
            showToast(`Security panel access granted to ${role}.`, 'success');
        }
        
        renderRbacRoleTabs(); // Re-render to update the key icon colors
    };

    function renderRbacRoleTabs() {
        const container = document.getElementById('rbac-role-tabs');
        if (!container) return;

        let html = '';
        localRbacRoles.forEach(role => {
            const isActive = role === activeRbacRole;
            const hasSecurityAccess = localRbacPerms[role] && localRbacPerms[role]['_security'] && localRbacPerms[role]['_security']['read'];
            const keyIconColor = hasSecurityAccess ? 'text-amber-400 drop-shadow-sm hover:text-amber-500 opacity-100' : 'text-slate-300 opacity-30 hover:opacity-100';

            html += `
                <div class="group flex items-center gap-0.5">
                    <button onclick="switchRbacRole('${escapeHtml(role)}')"
                        class="px-4 py-2 rounded-lg text-[11px] font-bold transition border ${
                            isActive
                                ? 'bg-slate-900 text-white border-slate-900 shadow-sm'
                                : 'bg-white text-slate-500 border-slate-200 hover:border-slate-400 hover:text-slate-800'
                        }">
                        <i class="fa-solid fa-user-shield text-[9px] mr-1.5 opacity-70"></i>${escapeHtml(role)}
                    </button>
                    
                    <button onclick="toggleSecurityAccess('${escapeHtml(role)}')" title="Toggle Security Panel Access"
                        class="ml-1 ${keyIconColor} transition text-[11px] px-1.5 hover:scale-110">
                        <i class="fa-solid fa-key"></i>
                    </button>

                    <button onclick="deleteRbacRole('${escapeHtml(role)}')" title="Delete role"
                        class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 transition text-[10px] px-1">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>`;
        });
        container.innerHTML = html;
    }

    function switchRbacRole(role) {
        activeRbacRole = role;
        renderRbacRoleTabs();
        renderRbacRolePanel();

    function renderRbacRolePanel() {
        const container = document.getElementById('rbac-role-panel-container');
        if (!container) return;

        if (!activeRbacRole) {
            container.innerHTML = `<div class="flex flex-col items-center justify-center py-16 text-slate-300">
                <i class="fa-solid fa-user-shield text-4xl mb-3"></i>
                <p class="text-xs font-bold">No roles configured. Add a role to get started.</p>
            </div>`;
            return;
        }

        const rolePerms = localRbacPerms[activeRbacRole] || {};
        // Build all sections: DB collections + system sections
        const allSections = [
            ...Object.keys(COLLECTION_META).map(col => ({ key: col, ...COLLECTION_META[col], isSystem: false })),
            ...Object.entries(SYSTEM_SECTION_META).map(([k, v]) => ({ key: k, ...v, isSystem: true }))
        ];

        let html = `
            <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-user-shield text-slate-400"></i>
                    <span class="text-xs font-extrabold text-slate-700">${escapeHtml(activeRbacRole)}</span>
                    <span class="text-[9px] text-slate-400 font-semibold">— access policy</span>
                </div>
                <div class="flex items-center gap-4">
                    ${RBAC_ACTIONS.map(a => `
                        <div class="flex flex-col items-center w-[52px]">
                            <span class="text-[9px] font-extrabold uppercase tracking-wider ${RBAC_ACTION_COLORS[a]}">${RBAC_ACTION_LABELS[a]}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
            <div class="divide-y divide-slate-100/80">`;

        let lastWasSystem = false;
        allSections.forEach(section => {
            const { key, label, icon, note, isSystem } = section;

            // Divider before system sections
            if (isSystem && !lastWasSystem) {
                html += `<div class="px-5 py-2 bg-amber-50/60 border-y border-amber-100 flex items-center gap-2">
                    <i class="fa-solid fa-lock text-amber-400 text-[10px]"></i>
                    <span class="text-[9px] font-extrabold uppercase tracking-wider text-amber-600">System Sections</span>
                </div>`;
            }
            lastWasSystem = isSystem;

            const colPerms = rolePerms[key] || { read: false, create: false, edit: false, delete: false };

            html += `
                <div class="flex items-center justify-between px-5 py-3 hover:bg-slate-50/40 transition ${isSystem ? 'bg-amber-50/20' : ''}">
                    <div class="flex items-start gap-2.5 min-w-[200px]">
                        <i class="fa-solid ${icon} ${isSystem ? 'text-amber-400' : 'text-slate-300'} text-xs w-4 text-center mt-0.5"></i>
                        <div>
                            <span class="text-xs font-semibold ${isSystem ? 'text-amber-700' : 'text-slate-700'}">${label}</span>
                            ${note ? `<p class="text-[9px] text-slate-400 font-medium mt-0.5 max-w-[280px]">${note}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        ${RBAC_ACTIONS.map(action => `
                            <div class="flex flex-col items-center gap-1 w-[52px]">
                                <input type="checkbox"
                                    data-role="${escapeHtml(activeRbacRole)}"
                                    data-collection="${key}"
                                    data-action="${action}"
                                    class="rbac-checkbox w-4 h-4 cursor-pointer rounded border-slate-300 focus:ring-2 focus:ring-slate-300 transition
                                        ${action === 'read' ? 'accent-sky-500' : action === 'create' ? 'accent-emerald-500' : action === 'edit' ? 'accent-amber-500' : 'accent-rose-500'}"
                                    onchange="onRbacCheckboxChange(this)"
                                    ${colPerms[action] ? 'checked' : ''}>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        });

        html += `</div>`;
        container.innerHTML = html;
    }

    function onRbacCheckboxChange(cb) {
        const role = cb.getAttribute('data-role');
        const col = cb.getAttribute('data-collection');
        const action = cb.getAttribute('data-action');
        if (!localRbacPerms[role]) localRbacPerms[role] = {};
        if (!localRbacPerms[role][col]) localRbacPerms[role][col] = { read: false, create: false, edit: false, delete: false };
        localRbacPerms[role][col][action] = cb.checked;

        // If any write action is checked, auto-check read
        if ((action === 'create' || action === 'edit' || action === 'delete') && cb.checked) {
            localRbacPerms[role][col]['read'] = true;
            const readCb = document.querySelector(`input[data-role="${CSS.escape(role)}"][data-collection="${col}"][data-action="read"]`);
            if (readCb) readCb.checked = true;
        }
    }

    function applyBulkRbacOperation() {
        if (!activeRbacRole) {
            showToast('No active role selected.', 'error');
            return;
        }

        const action = document.getElementById('bulk-target-action').value;
        const scope = document.getElementById('bulk-target-scope').value;
        const opType = document.getElementById('bulk-op-type').value;

        if (action === 'all' || scope === 'all') {
            showToast('Please select both a target action and target scope.', 'warning');
            return;
        }

        const role = activeRbacRole;
        if (!localRbacPerms[role]) localRbacPerms[role] = {};

        const isCheck = opType === 'check';
        const actionsToTarget = action === 'all_cols' ? RBAC_ACTIONS : [action];

        const allSections = [
            ...Object.keys(COLLECTION_META).map(col => ({ key: col, isSystem: false })),
            ...Object.entries(SYSTEM_SECTION_META).map(([k, v]) => ({ key: k, isSystem: true }))
        ];

        let targetSections = [];
        if (scope === 'all_sections') {
            targetSections = allSections;
        } else if (scope === 'schemas') {
            targetSections = allSections.filter(s => !s.isSystem);
        } else if (scope === 'system') {
            targetSections = allSections.filter(s => s.isSystem);
        }

        if (targetSections.length === 0) return;

        targetSections.forEach(section => {
            const key = section.key;
            if (!localRbacPerms[role][key]) {
                localRbacPerms[role][key] = { read: false, create: false, edit: false, delete: false };
            }
            
            actionsToTarget.forEach(act => {
                localRbacPerms[role][key][act] = isCheck;
                
                // If checking any write action, auto-check read
                if (isCheck && (act === 'create' || act === 'edit' || act === 'delete')) {
                    localRbacPerms[role][key]['read'] = true;
                }
            });
        });

        // Re-render role panel to show changes in grid checkboxes
        renderRbacRolePanel();

        showToast(`Successfully applied bulk permissions to ${targetSections.length} sections.`, 'success');
    }

    function openAddRoleModal() {
        document.getElementById('add-role-modal').classList.remove('hidden');
        document.getElementById('new-role-name-input').value = '';
        setTimeout(() => document.getElementById('new-role-name-input').focus(), 100);
    }

    function closeAddRoleModal() {
        document.getElementById('add-role-modal').classList.add('hidden');
    }

    function confirmAddRole() {
        const input = document.getElementById('new-role-name-input');
        const name = input.value.trim();
        if (!name) { showToast('Role name is required.', 'error'); return; }
        if (localRbacRoles.includes(name)) { showToast('Role already exists.', 'error'); return; }

        localRbacRoles.push(name);
        localRbacPerms[name] = {};
        [...Object.keys(COLLECTION_META), ...Object.keys(SYSTEM_SECTION_META)].forEach(col => {
            localRbacPerms[name][col] = { read: false, create: false, edit: false, delete: false };
        });

        activeRbacRole = name;
        closeAddRoleModal();
        renderRbacRoleTabs();
        renderRbacRolePanel();
        showToast(`Role "${name}" added. Configure permissions and save.`, 'success');
    }

    function deleteRbacRole(role) {
        if (role.toLowerCase() === 'administrator') {
            showToast(`Cannot delete the core Administrator role.`, 'error');
            return;
        }
        try {
            const sessionStr = localStorage.getItem('getmeds_admin_session');
            if (sessionStr) {
                const sessionRole = JSON.parse(sessionStr).role;
                if (role === sessionRole) {
                    showToast(`Cannot delete your actively logged-in role (${role}).`, 'error');
                    return;
                }
            }
        } catch(e) {}

        if (!confirm(`Delete role "${role}"? All its permissions will be removed.`)) return;
        localRbacRoles = localRbacRoles.filter(r => r !== role);
        delete localRbacPerms[role];
        if (activeRbacRole === role) activeRbacRole = localRbacRoles[0] || null;
        renderRbacRoleTabs();
        renderRbacRolePanel();
        showToast(`Role "${role}" removed. Save to persist.`, 'success');
    }

    async function saveRbacMatrix() {
        const token = document.getElementById('admin-secret-token').value;
        const btn = document.getElementById('rbac-save-btn');

        // Build new-format permissions: { role: { collection: [actions] } }
        const newPerms = {};
        const allPermKeys = [...Object.keys(COLLECTION_META), ...Object.keys(SYSTEM_SECTION_META), '_security'];
        localRbacRoles.forEach(role => {
            newPerms[role] = {};
            allPermKeys.forEach(col => {
                const p = (localRbacPerms[role] || {})[col] || {};
                const actions = RBAC_ACTIONS.filter(a => p[a]);
                newPerms[role][col] = actions;
            });
        });

        const prevHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/admin/security/role-permissions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
                body: JSON.stringify({ permissions: newPerms, format: 'v2' })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Failed to save permissions');

            showToast('Action control permissions saved.', 'success');

            // Update session's allowed collections and re-render sidebar
            const session = JSON.parse(localStorage.getItem('getmeds_admin_session') || '{}');
            if (session.role) {
                const rolePerms = newPerms[session.role] || {};
                // A collection is "accessible" if the role has at least read
                const allowed = Object.keys(rolePerms).filter(col => (rolePerms[col] || []).includes('read'));
                session.allowedCollections = allowed;
                session.roleActionPerms = rolePerms;
                localStorage.setItem('getmeds_admin_session', JSON.stringify(session));
                renderSidebarMenu();
                applyActionControlEnforcement(rolePerms);
            }
        } catch (err) {
            showToast(err.message, 'error');
        } finally {
            btn.innerHTML = prevHtml;
            btn.disabled = false;
        }
    }

    // Enforce action-level controls in the UI (hide/disable buttons user can't use)
    function applyActionControlEnforcement(rolePerms) {
        // rolePerms: { collection: ['read','create','edit','delete'] }
        if (!rolePerms) return;

        // ── Security panel sidebar button ──
        const secBtn = document.getElementById('sidebar-security-btn');
        if (secBtn) {
            const secActions = rolePerms['_security'] || [];
            if (secActions.includes('read')) {
                secBtn.classList.remove('hidden');
            } else {
                secBtn.classList.add('hidden');
                // If currently on security panel, bounce back to DB hub
                const secPanel = document.getElementById('security-control-panel');
                if (secPanel && !secPanel.classList.contains('hidden')) {
                    hideSecurityControlPanel();
                }
            }
        }

        // ── Collection-level action enforcement ──
        const col = activeFilter;
        if (col === 'security') return;
        const actions = rolePerms[col] || [];

        // Create button
        const createBtn = document.getElementById('create-doc-btn');
        if (createBtn) {
            if (actions.includes('create')) {
                createBtn.classList.remove('hidden', 'opacity-50', 'pointer-events-none');
            } else {
                createBtn.classList.add('hidden');
            }
        }

        // Edit/Delete buttons inside table rows — controlled via CSS class on tbody
        const tbody = document.getElementById('documents-table-body');
        if (tbody) {
            if (!actions.includes('edit')) tbody.classList.add('rbac-no-edit');
            else tbody.classList.remove('rbac-no-edit');
            if (!actions.includes('delete')) tbody.classList.add('rbac-no-delete');
            else tbody.classList.remove('rbac-no-delete');
        }
    }

    function renderSecurityLogs() {
